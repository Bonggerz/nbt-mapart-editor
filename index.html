            activeCurveDraft.draggingControl = true;
            updateCurveControlPoint(x, z);
            renderActiveCurveDraft();
            return true;
        }

        function updateCurveControlPoint(x, z) {
            if (!activeCurveDraft) return;
            if (activeCurveDraft.phase === 0) {
                activeCurveDraft.c1x = x;
                activeCurveDraft.c1z = z;
            } else {
                activeCurveDraft.c2x = x;
                activeCurveDraft.c2z = z;
            }
        }

        function finishCurveControlDrag(x, z) {
            if (!activeCurveDraft || !activeCurveDraft.draggingControl) return false;
            updateCurveControlPoint(x, z);
            activeCurveDraft.draggingControl = false;
            activeCurveDraft.phase += 1;
            if (activeCurveDraft.phase >= 2) {
                finalizeActiveCurveDraftToEditableShape();
            } else {
                renderActiveCurveDraft();
            }
            return true;
        }

        function clampShapeToMap(shape) {
            const bounds = normalizedShapeBounds(shape);
            let dx = 0;
            let dz = 0;

            if (bounds.left < 0) dx = -bounds.left;
            if (bounds.right + dx >= mapWidth) dx = mapWidth - 1 - bounds.right;
            if (bounds.top < 0) dz = -bounds.top;
            if (bounds.bottom + dz >= mapHeight) dz = mapHeight - 1 - bounds.bottom;

            return translateShapeDraft(shape, dx, dz);
        }

        function translateShapeDraft(shape, dx, dz) {
            const next = {
                ...shape,
                x0: shape.x0 + dx,
                x1: shape.x1 + dx,
                z0: shape.z0 + dz,
                z1: shape.z1 + dz
            };

            if (shape.tool === 'curve') {
                next.c1x = (shape.c1x ?? shape.x0) + dx;
                next.c1z = (shape.c1z ?? shape.z0) + dz;
                next.c2x = (shape.c2x ?? shape.x1) + dx;
                next.c2z = (shape.c2z ?? shape.z1) + dz;
            }

            return next;
        }

        function scaleValueToBounds(value, oldMin, oldMax, newMin, newMax) {
            if (oldMax === oldMin) return Math.round((newMin + newMax) / 2);
            return newMin + ((value - oldMin) / (oldMax - oldMin)) * (newMax - newMin);
        }

        function transformShapeDraftToBounds(draft, bounds, oldBounds) {
            if (draft.tool !== 'curve') {
                return {
                    ...draft,
                    x0: bounds.left,
                    z0: bounds.top,
                    x1: bounds.right,
                    z1: bounds.bottom
                };
            }

            return {
                ...draft,
                x0: scaleValueToBounds(draft.x0, oldBounds.left, oldBounds.right, bounds.left, bounds.right),
                z0: scaleValueToBounds(draft.z0, oldBounds.top, oldBounds.bottom, bounds.top, bounds.bottom),
                x1: scaleValueToBounds(draft.x1, oldBounds.left, oldBounds.right, bounds.left, bounds.right),
                z1: scaleValueToBounds(draft.z1, oldBounds.top, oldBounds.bottom, bounds.top, bounds.bottom),
                c1x: scaleValueToBounds(draft.c1x ?? draft.x0, oldBounds.left, oldBounds.right, bounds.left, bounds.right),
                c1z: scaleValueToBounds(draft.c1z ?? draft.z0, oldBounds.top, oldBounds.bottom, bounds.top, bounds.bottom),
                c2x: scaleValueToBounds(draft.c2x ?? draft.x1, oldBounds.left, oldBounds.right, bounds.left, bounds.right),
                c2z: scaleValueToBounds(draft.c2z ?? draft.z1, oldBounds.top, oldBounds.bottom, bounds.top, bounds.bottom)
            };
        }

        function clientDeltaToCellDelta(event) {
            const canvasRect = canvas.getBoundingClientRect();
            const cellWidth = canvasRect.width / mapWidth;
            const cellHeight = canvasRect.height / mapHeight;
            return {
                dx: Math.round((event.clientX - activeShapeInteraction.startClientX) / cellWidth),
                dz: Math.round((event.clientY - activeShapeInteraction.startClientY) / cellHeight)
            };
        }

        function resizedShapeFromInteraction(event) {
            const { dx, dz } = clientDeltaToCellDelta(event);
            const interaction = activeShapeInteraction;
            const bounds = { ...interaction.startBounds };
            const handle = interaction.handle;

            if (handle.includes("w")) bounds.left += dx;
            if (handle.includes("e")) bounds.right += dx;
            if (handle.includes("n")) bounds.top += dz;
            if (handle.includes("s")) bounds.bottom += dz;

            bounds.left = Math.max(0, Math.min(mapWidth - 1, bounds.left));
            bounds.right = Math.max(0, Math.min(mapWidth - 1, bounds.right));
            bounds.top = Math.max(0, Math.min(mapHeight - 1, bounds.top));
            bounds.bottom = Math.max(0, Math.min(mapHeight - 1, bounds.bottom));

            if (bounds.left > bounds.right) {
                const temp = bounds.left;
                bounds.left = bounds.right;
                bounds.right = temp;
            }
            if (bounds.top > bounds.bottom) {
                const temp = bounds.top;
                bounds.top = bounds.bottom;
                bounds.bottom = temp;
            }

            return transformShapeDraftToBounds(interaction.startDraft, bounds, interaction.startBounds);
        }

        function movedShapeFromInteraction(event) {
            const { dx, dz } = clientDeltaToCellDelta(event);
            const start = activeShapeInteraction.startDraft;
            return clampShapeToMap(translateShapeDraft(start, dx, dz));
        }

        function startShapeSelectionInteraction(event) {
            if (!activeShapeDraft || event.button !== 0) return;
            const handle = event.target.dataset ? event.target.dataset.handle : "";
            activeShapeInteraction = {
                mode: handle ? "resize" : "move",
                handle,
                startClientX: event.clientX,
                startClientY: event.clientY,
                startDraft: { ...activeShapeDraft },
                startBounds: normalizedShapeBounds(activeShapeDraft)
            };
            event.preventDefault();
            event.stopPropagation();
        }

        function moveShapeSelectionInteraction(event) {
            if (!activeShapeInteraction) return;
            activeShapeDraft = activeShapeInteraction.mode === "resize"
                ? resizedShapeFromInteraction(event)
                : movedShapeFromInteraction(event);
            renderActiveShapeDraft();
            event.preventDefault();
            event.stopPropagation();
        }

        function finishShapeSelectionInteraction(event) {
            if (!activeShapeInteraction) return;
            moveShapeSelectionInteraction(event);
            activeShapeInteraction = null;
            event.preventDefault();
            event.stopPropagation();
        }

        function activePaintLayerForSelection() {
            const layer = activeLayer();
            if (!layerCanPaint(layer)) return null;
            if (layer.kind !== "paint") {
                setPaletteStatus("Selections only work on paint layers. Add or select a paint layer first.");
                return null;
            }
            return layer;
        }

        function parseLayerCellKey(key) {
            const [x, z] = String(key).split(",").map(Number);
            return Number.isFinite(x) && Number.isFinite(z) ? { x, z } : null;
        }

        function pointInPolygon(x, z, polygon) {
            if (!polygon || polygon.length < 3) return false;
            const px = x + 0.5;
            const pz = z + 0.5;
            let inside = false;

            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const a = polygon[i];
                const b = polygon[j];
                const intersects = ((a.z > pz) !== (b.z > pz)) &&
                    (px < (b.x - a.x) * (pz - a.z) / ((b.z - a.z) || 1e-9) + a.x);
                if (intersects) inside = !inside;
            }

            return inside;
        }

        function cellsInRectangleSelection(layer, x0, z0, x1, z1) {
            const left = Math.min(x0, x1);
            const right = Math.max(x0, x1);
            const top = Math.min(z0, z1);
            const bottom = Math.max(z0, z1);
            const cells = [];

            for (const [key, item] of layer.cells.entries()) {
                const pos = parseLayerCellKey(key);
                if (!pos || pos.x < left || pos.x > right || pos.z < top || pos.z > bottom) continue;
                cells.push({ x: pos.x, z: pos.z, item: { ...item } });
            }

            return cells;
        }

        function cellsInLassoSelection(layer, polygon) {
            const bounds = boundsForPoints(polygon);
            const cells = [];

            for (const [key, item] of layer.cells.entries()) {
                const pos = parseLayerCellKey(key);
                if (!pos || pos.x < bounds.left || pos.x > bounds.right || pos.z < bounds.top || pos.z > bounds.bottom) continue;
                if (pointInPolygon(pos.x, pos.z, polygon)) {
                    cells.push({ x: pos.x, z: pos.z, item: { ...item } });
                }
            }

            return cells;
        }

        function selectionDisplayCells(selection = activeSelection) {
            if (!selection) return [];
            return selection.cells.map(cell => ({
                x: cell.x + selection.offsetX,
                z: cell.z + selection.offsetZ,
                item: cell.item
            })).filter(cell => cell.x >= 0 && cell.x < mapWidth && cell.z >= 0 && cell.z < mapHeight);
        }

        function selectionBounds(selection = activeSelection) {
            return boundsForPoints(selectionDisplayCells(selection), { left: 0, right: 0, top: 0, bottom: 0 });
        }

        function positionSelectionBox() {
            if (!shapeSelectionBox || !activeSelection || activeSelection.cells.length === 0) {
                hideShapeSelectionBox();
                return;
            }

            const bounds = selectionBounds();
            const canvasRect = canvas.getBoundingClientRect();
            const wrapperRect = canvas.parentElement.getBoundingClientRect();
            const cellWidth = canvasRect.width / mapWidth;
            const cellHeight = canvasRect.height / mapHeight;

            shapeSelectionBox.classList.add("visible", "selection-mode");
            shapeSelectionBox.style.left = `${canvasRect.left - wrapperRect.left + bounds.left * cellWidth}px`;
            shapeSelectionBox.style.top = `${canvasRect.top - wrapperRect.top + bounds.top * cellHeight}px`;
            shapeSelectionBox.style.width = `${Math.max(cellWidth, (bounds.right - bounds.left + 1) * cellWidth)}px`;
            shapeSelectionBox.style.height = `${Math.max(cellHeight, (bounds.bottom - bounds.top + 1) * cellHeight)}px`;
        }

        function renderActiveSelection() {
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            if (!activeSelection) {
                hideShapeSelectionBox();
                return;
            }

            if (activeSelection.floating) {
                for (const cell of selectionDisplayCells()) {
                    const info = layerCellInfo(cell.item);
                    if (!info) continue;
                    previewCtx.fillStyle = rgbToCss(colorForLayerCell(cell.item, cellAtGlobal(cell.x, cell.z)) || rgbForMapTone(info.color, "normal"));
                    previewCtx.fillRect(cell.x, cell.z, 1, 1);
                }
            }

            positionSelectionBox();
        }

        function cancelActiveSelection() {
            activeSelection = null;
            activeSelectionInteraction = null;
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            hideShapeSelectionBox();
        }

        function commitActiveSelection() {
            if (!activeSelection) return false;
            const selection = activeSelection;
            const layer = editorLayers.find(entry => entry.id === selection.layerId);
            cancelActiveSelection();

            if (!layer || layer.kind !== "paint") return false;
            if (selection.floating) {
                for (const cell of selectionDisplayCells(selection)) {
                    if (cell.x < 0 || cell.x >= mapWidth || cell.z < 0 || cell.z >= mapHeight) continue;
                    layer.cells.set(layerCellKey(cell.x, cell.z), { ...cell.item });
                }
                renderLayers();
                renderFullCanvas();
            }
            return selection.floating;
        }

        function beginFloatingSelectionMove(selection) {
            const layer = editorLayers.find(entry => entry.id === selection.layerId);
            if (!layer || layer.kind !== "paint") return false;

            if (!selection.undoSaved) {
                saveCurrentStateToUndo();
                selection.undoSaved = true;
            }

            if (!selection.floating) {
                for (const cell of selection.cells) {
                    layer.cells.delete(layerCellKey(cell.x, cell.z));
                }
                selection.floating = true;
                renderFullCanvas();
            }

            return true;
        }

        function clampSelectionOffset(selection, offsetX, offsetZ) {
            const sourceBounds = boundsForPoints(selection.cells);
            let x = offsetX;
            let z = offsetZ;
            if (sourceBounds.left + x < 0) x = -sourceBounds.left;
            if (sourceBounds.right + x >= mapWidth) x = mapWidth - 1 - sourceBounds.right;
            if (sourceBounds.top + z < 0) z = -sourceBounds.top;
            if (sourceBounds.bottom + z >= mapHeight) z = mapHeight - 1 - sourceBounds.bottom;
            return { offsetX: x, offsetZ: z };
        }

        function startSelectionInteraction(event) {
            if (!activeSelection || event.button !== 0) return false;
            if (!beginFloatingSelectionMove(activeSelection)) return false;
            activeSelectionInteraction = {
                startClientX: event.clientX,
                startClientY: event.clientY,
                startOffsetX: activeSelection.offsetX,
                startOffsetZ: activeSelection.offsetZ
            };
            event.preventDefault();
            event.stopPropagation();
            return true;
        }

        function moveSelectionInteraction(event) {
            if (!activeSelectionInteraction || !activeSelection) return;
            const canvasRect = canvas.getBoundingClientRect();
            const cellWidth = canvasRect.width / mapWidth;
            const cellHeight = canvasRect.height / mapHeight;
            const dx = Math.round((event.clientX - activeSelectionInteraction.startClientX) / cellWidth);
            const dz = Math.round((event.clientY - activeSelectionInteraction.startClientY) / cellHeight);
            const clamped = clampSelectionOffset(
                activeSelection,
                activeSelectionInteraction.startOffsetX + dx,
                activeSelectionInteraction.startOffsetZ + dz
            );
            activeSelection.offsetX = clamped.offsetX;
            activeSelection.offsetZ = clamped.offsetZ;
            renderActiveSelection();
            event.preventDefault();
            event.stopPropagation();
        }

        function finishSelectionInteraction(event) {
            if (!activeSelectionInteraction) return;
            moveSelectionInteraction(event);
            activeSelectionInteraction = null;
            event.preventDefault();
            event.stopPropagation();
        }

        function startSelectionBoxInteraction(event) {
            if (activeSelection) {
                startSelectionInteraction(event);
                return;
            }
            startShapeSelectionInteraction(event);
        }

        function previewSelectionRectangle(x0, z0, x1, z1) {
            const left = Math.min(x0, x1);
            const right = Math.max(x0, x1);
            const top = Math.min(z0, z1);
            const bottom = Math.max(z0, z1);
            previewCtx.save();
            previewCtx.strokeStyle = "#000";
            previewCtx.lineWidth = 1;
            previewCtx.setLineDash([3, 2]);
            previewCtx.strokeRect(left + 0.5, top + 0.5, Math.max(1, right - left), Math.max(1, bottom - top));
            previewCtx.restore();
        }

        function previewLassoPath(path) {
            if (!path || path.length === 0) return;
            previewCtx.save();
            previewCtx.strokeStyle = "#000";
            previewCtx.lineWidth = 1;
            previewCtx.setLineDash([3, 2]);
            previewCtx.beginPath();
            previewCtx.moveTo(path[0].x + 0.5, path[0].z + 0.5);
            for (let i = 1; i < path.length; i++) {
                previewCtx.lineTo(path[i].x + 0.5, path[i].z + 0.5);
            }
            previewCtx.stroke();
            previewCtx.restore();
        }

        function createSelectionFromCells(cells, layerId) {
            if (!cells || cells.length === 0) {
                setPaletteStatus("No paint-layer pixels found in that selection.");
                cancelActiveSelection();
                return false;
            }
            activeSelection = {
                layerId,
                cells,
                offsetX: 0,
                offsetZ: 0,
                floating: false,
                undoSaved: false
            };
            renderActiveSelection();
            return true;
        }

        function copyActiveSelectionToClipboard() {
            if (!activeSelection || activeSelection.cells.length === 0) {
                setPaletteStatus("No active paint-layer selection to copy.");
                return false;
            }

            const cells = selectionDisplayCells();
            const bounds = boundsForPoints(cells);
            selectionClipboard = {
                width: bounds.right - bounds.left + 1,
                height: bounds.bottom - bounds.top + 1,
                cells: cells.map(cell => ({
                    dx: cell.x - bounds.left,
                    dz: cell.z - bounds.top,
                    item: { ...cell.item }
                }))
            };
            setPaletteStatus(`Copied ${selectionClipboard.cells.length} selected pixels.`);
            return true;
        }

        function defaultPasteAnchor() {
            if (lastMouseX >= 0 && lastMouseX < mapWidth && lastMouseZ >= 0 && lastMouseZ < mapHeight) {
                return { x: lastMouseX, z: lastMouseZ };
            }

            const canvasRect = canvas.getBoundingClientRect();
            const containerRect = canvasContainer.getBoundingClientRect();
            const centerClientX = Math.max(canvasRect.left, Math.min(canvasRect.right - 1, containerRect.left + containerRect.width / 2));
            const centerClientY = Math.max(canvasRect.top, Math.min(canvasRect.bottom - 1, containerRect.top + containerRect.height / 2));
            const scaleX = mapWidth / canvasRect.width;
            const scaleY = mapHeight / canvasRect.height;
            return {
                x: Math.max(0, Math.min(mapWidth - 1, Math.floor((centerClientX - canvasRect.left) * scaleX))),
                z: Math.max(0, Math.min(mapHeight - 1, Math.floor((centerClientY - canvasRect.top) * scaleY)))
            };
        }

        function pasteSelectionClipboard() {
            if (!selectionClipboard || !selectionClipboard.cells || selectionClipboard.cells.length === 0) {
                setPaletteStatus("No copied selection to paste.");
                return false;
            }

            if (activeSelection) commitActiveSelection();
            if (activeShapeDraft) commitActiveShapeDraft();
            if (activeCurveDraft) commitActiveCurveDraft();

            const layer = activePaintLayerForSelection();
            if (!layer) return false;

            const anchor = defaultPasteAnchor();
            const maxLeft = Math.max(0, mapWidth - selectionClipboard.width);
            const maxTop = Math.max(0, mapHeight - selectionClipboard.height);
            const left = Math.max(0, Math.min(maxLeft, anchor.x - Math.floor(selectionClipboard.width / 2)));
            const top = Math.max(0, Math.min(maxTop, anchor.z - Math.floor(selectionClipboard.height / 2)));

            saveCurrentStateToUndo();
            activeSelection = {
                layerId: layer.id,
                cells: selectionClipboard.cells.map(cell => ({
                    x: left + cell.dx,
                    z: top + cell.dz,
                    item: { ...cell.item }
                })),
                offsetX: 0,
                offsetZ: 0,
                floating: true,
                undoSaved: true
            };
            renderActiveSelection();
            setPaletteStatus(`Pasted ${activeSelection.cells.length} pixels. Drag to move, click elsewhere to lock.`);
            return true;
        }

        function hideCursorSelectionFrame() {
            if (cursorSelectionFrame) cursorSelectionFrame.style.display = "none";
        }

        function showCursorSelectionFrame(x, z) {
            if (!cursorSelectionFrame || x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) {
                hideCursorSelectionFrame();
                return;
            }

            const canvasRect = canvas.getBoundingClientRect();
            const wrapperRect = canvas.parentElement.getBoundingClientRect();
            const cellWidth = canvasRect.width / mapWidth;
            const cellHeight = canvasRect.height / mapHeight;

            cursorSelectionFrame.style.display = "block";
            cursorSelectionFrame.style.left = `${canvasRect.left - wrapperRect.left + x * cellWidth}px`;
            cursorSelectionFrame.style.top = `${canvasRect.top - wrapperRect.top + z * cellHeight}px`;
            cursorSelectionFrame.style.width = `${cellWidth}px`;
            cursorSelectionFrame.style.height = `${cellHeight}px`;
        }

        function updateCursorPreview(x, z) {
            if (mapWidth === 0 || loadedFiles.length === 0) {
                hideCursorSelectionFrame();
                hideShapeSelectionBox();
                return;
            }

            if (activeShapeDraft && !isDrawing) {
                renderActiveShapeDraft();
                hideCursorSelectionFrame();
                return;
            }

            if (activeCurveDraft && !isDrawing) {
                renderActiveCurveDraft();
                hideCursorSelectionFrame();
                return;
            }

            if (activeSelection && !isDrawing) {
                renderActiveSelection();
                hideCursorSelectionFrame();
                return;
            }
            
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            
            if (isPanning) {
                if (!keepTextPreviewIfActive()) hideCursorSelectionFrame();
                return;
            }

            const size = parseInt(document.getElementById('brushSize').value) || 1;
            const offsetStart = Math.floor(size / 2);

            if (activeTool === 'text') {
                if (keepTextPreviewIfActive()) return;
                if (!validTextAnchor(x, z)) {
                    hideCursorSelectionFrame();
                    return;
                }
                showCursorSelectionFrame(x, z);
                return;
            }

            if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) {
                hideCursorSelectionFrame();
                return;
            }

            showCursorSelectionFrame(x, z);

            if (activeTool === 'picker') return;

            if (isDrawing && activeTool === 'rect-select') {
                previewSelectionRectangle(lineStartX, lineStartZ, x, z);
                return;
            }

            if (isDrawing && activeTool === 'lasso-select') {
                previewLassoPath(lassoPath);
                return;
            }

            if (isDrawing && isShapeTool()) {
                previewShape(activeTool, lineStartX, lineStartZ, x, z, size, offsetStart, arcFlipSide);
                return; 
            }

            if (activeTool === 'bucket') {
                previewCtx.fillStyle = previewFillStyleAt(x, z);
                previewCtx.fillRect(x, z, 1, 1);
                return;
            }
            
            previewBrush(x, z, size, offsetStart);
        }

        // --- HISTORY (UNDO/REDO) ---
        function createEditorSnapshot() {
            const states = new Int32Array(gridMap.length);
            const ys = new Int32Array(gridMap.length);
            for(let i=0; i<gridMap.length; i++) {
                if (gridMap[i]) {
                    states[i] = gridMap[i].blockRef.state.value;
                    ys[i] = gridMap[i].rawY;
                } else {
                    states[i] = -1;
                    ys[i] = -1;
                }
            }
            return {
                states,
                ys,
                layers: editorLayers.map(serializeLayer),
                activeLayerId,
                quickPaletteItems: quickPaletteItems.map(item => ({ ...item })),
                colorPickerSlots: colorPickerSlots.map(item => item ? { ...item } : null),
                selectedColorPickerSlotIndex,
                selectedColorId: selectedColor ? selectedColor.id : null,
                selectedTone,
                selectedBlockByColorId: { ...selectedBlockByColorId }
            };
        }

        function saveCurrentStateToUndo() {
            const snapshot = createEditorSnapshot();
            undoStack.push(snapshot);
            redoStack = []; 
            updateButtons();
        }

        function applySnapshot(snapshot) {
            const changedCells = [];
            for(let i=0; i<gridMap.length; i++) {
                const cell = gridMap[i];
                if (!cell) continue;

                const state = snapshot.states ? snapshot.states[i] : snapshot[i];
                const y = snapshot.ys ? snapshot.ys[i] : cell.rawY;
                if (state !== -1 && (cell.blockRef.state.value !== state || cell.rawY !== y)) {
                    const supportChange = supportChangeRecordForCell(cell);
                    cell.blockRef.state.value = state;
                    setCellY(cell, y);
                    updateCellMetadata(cell);
                    changedCells.push(supportChange);
                }
            }
            if (changedCells.length > 0) syncSupportsForCells(changedCells);
            if (snapshot.layers) {
                editorLayers = snapshot.layers.map(deserializeLayer);
                activeLayerId = snapshot.activeLayerId || (editorLayers[0] && editorLayers[0].id) || null;
                const maxLayerNumber = editorLayers.reduce((max, layer) => {
                    const match = String(layer.id).match(/layer-(\d+)/);
                    return match ? Math.max(max, Number(match[1])) : max;
                }, 0);
                nextLayerId = Math.max(nextLayerId, maxLayerNumber + 1);
            }
            if (snapshot.quickPaletteItems) {
                quickPaletteItems = snapshot.quickPaletteItems.map(validPaletteItem).filter(Boolean);
                saveQuickPalette();
            }
            if (snapshot.colorPickerSlots) {
                colorPickerSlots = snapshot.colorPickerSlots.map(item => item ? validPaletteItem(item) : null);
                while (colorPickerSlots.length < COLOR_PICKER_SLOT_ROW_LENGTHS.reduce((sum, count) => sum + count, 0)) {
                    colorPickerSlots.push(null);
                }
                colorPickerSlots = colorPickerSlots.slice(0, COLOR_PICKER_SLOT_ROW_LENGTHS.reduce((sum, count) => sum + count, 0));
                selectedColorPickerSlotIndex = Number.isInteger(snapshot.selectedColorPickerSlotIndex)
                    ? Math.max(0, Math.min(snapshot.selectedColorPickerSlotIndex, colorPickerSlots.length - 1))
                    : 0;
            }
            if (snapshot.selectedBlockByColorId) {
                for (const colorId in snapshot.selectedBlockByColorId) {
                    selectedBlockByColorId[colorId] = snapshot.selectedBlockByColorId[colorId];
                }
            }
            if (snapshot.selectedColorId && COLORS_BY_ID.has(snapshot.selectedColorId)) {
                selectedColor = COLORS_BY_ID.get(snapshot.selectedColorId);
            }
            if (snapshot.selectedTone) selectedTone = normalizeTone(snapshot.selectedTone);
            renderLayers();
            renderPaletteRows();
            renderFullCanvas();
        }

        function undoLastChange() {
            if (activeSelection) {
                commitActiveSelection();
            }
            if (activeCurveDraft) {
                commitActiveCurveDraft();
            }
            if (activeShapeDraft) {
                commitActiveShapeDraft();
            }
            if (undoStack.length === 0) return;
            const currentState = createEditorSnapshot();
            redoStack.push(currentState);
            
            const previousState = undoStack.pop();
            applySnapshot(previousState);
            updateButtons();
        }

        function redoLastChange() {
            if (activeSelection) {
                commitActiveSelection();
            }
            if (activeCurveDraft) {
                commitActiveCurveDraft();
            }
            if (activeShapeDraft) {
                commitActiveShapeDraft();
            }
            if (redoStack.length === 0) return;
            const currentState = createEditorSnapshot();
            undoStack.push(currentState);
            
            const nextState = redoStack.pop();
            applySnapshot(nextState);
            updateButtons();
        }

        undoBtn.addEventListener('click', undoLastChange);
        redoBtn.addEventListener('click', redoLastChange);

        function updateButtons() {
            undoBtn.disabled = undoStack.length === 0;
            redoBtn.disabled = redoStack.length === 0;
        }

        function getMouseCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = mapWidth / rect.width;
            const scaleY = mapHeight / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const z = Math.floor((e.clientY - rect.top) * scaleY);
            return {x, z};
        }

        // --- MOUSE EVENTS ---
        canvasContainer.addEventListener('contextmenu', e => e.preventDefault());

        ["dragenter", "dragover", "dragleave"].forEach(type => {
            canvasContainer.addEventListener(type, handleCanvasPaletteDragEvent, { passive: false });

        document.addEventListener("dragend", endPaletteDrag);
        document.addEventListener("drop", endPaletteDrag);
        document.addEventListener("mousedown", event => {
            if ((!activeSelection && !activeShapeDraft && !activeCurveDraft) || event.button !== 0) return;
            const target = event.target;
            if (shapeSelectionBox && shapeSelectionBox.contains(target)) return;
            if (target === canvas || target === previewCanvas) return;

            if (activeCurveDraft) commitActiveCurveDraft();

        canvasContainer.addEventListener('mouseleave', () => {
            if (activeSelection) {

        canvasContainer.addEventListener('mousedown', (e) => { 
            if (loadedFiles.length === 0) return;
            
            if (e.button === 0) { 
                if (activeShapeDraft) {
                    commitActiveShapeDraft();
                }
                if (activeSelection) {
                    commitActiveSelection();
                }

                const {x, z} = getMouseCoords(e);
                if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) {
                    updateCursorPreview(-1, -1);
                    return;
                }

                if (activeTool === 'curve' && activeCurveDraft) {
                    beginCurveControlDrag(x, z);
                    lastMouseX = x;
                    lastMouseZ = z;
                    return;
                }

                if (isSelectionTool()) {
                    const layer = activePaintLayerForSelection();
                    if (!layer) return;
                    clearPendingShapeStart();
                    isDrawing = true;
                    hasDrawnInCurrentStroke = false;
                    savedUndoInCurrentStroke = false;
                    lineStartX = x;
                    lineStartZ = z;
                    lassoPath = activeTool === 'lasso-select' ? [{ x, z }] : [];
                    lastMouseX = x;
                    lastMouseZ = z;
                    updateCursorPreview(x, z);
                    return;
                }

                if (isDeferredShapeTool()) {
                    beginPendingShapeStart(activeTool, x, z, e);
                    lastMouseX = x;
                    lastMouseZ = z;
                    updateCursorPreview(x, z);
                    return;
                }

                if (activeTool === 'text') {
                    clearPendingShapeStart();
                    lastMouseX = x;
                    lastMouseZ = z;
                    showTextToolPopup(x, z);
                    return;
                }

                if (activeTool === 'picker') {
                    clearPendingShapeStart();
                    const picked = selectColorFromCell(x, z);
                    lastMouseX = x;
                    lastMouseZ = z;
                    if (picked) restoreToolAfterPicker();
                    updateCursorPreview(x, z);
                    return;
                }

                if (activeTool === 'bucket') {
                    clearPendingShapeStart();
                    saveCurrentStateToUndo();
                    if (!applyBucketFill(x, z)) {
                        undoStack.pop();

                    lastMouseX = x;
                    lastMouseZ = z;
                    updateCursorPreview(x, z);
                    return;
                }

                clearPendingShapeStart();
                if (!isEditableShapeTool() && activeTool !== 'curve') {
                    saveCurrentStateToUndo();
                    savedUndoInCurrentStroke = true;
                }
                isDrawing = true; 
                hasDrawnInCurrentStroke = false;
                
                if (isShapeTool()) {
                    lineStartX = x;
                    lineStartZ = z;
                    arcFlipSide = e.shiftKey;
                } else {
                    if (applyBrush(x, z, true)) {
                        hasDrawnInCurrentStroke = true;
                    }
                }
                lastMouseX = x;
                lastMouseZ = z;
                updateCursorPreview(x, z);
            } 
            else if (e.button === 2) { 
                isPanning = true;
                startPanX = e.clientX;
                startPanY = e.clientY;
                startScrollLeft = canvasContainer.scrollLeft;
                startScrollTop = canvasContainer.scrollTop;
                document.body.style.cursor = 'grab';
                updateCursorPreview(-1, -1); 
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            if (activeSelectionInteraction) {
                moveSelectionInteraction(e);
                return;
            }
            if (activeShapeInteraction) {
                moveShapeSelectionInteraction(e);
                return;
            }
            if (activeCurveDraft && activeCurveDraft.draggingControl) {
                const {x, z} = getMouseCoords(e);
                updateCurveControlPoint(Math.max(0, Math.min(mapWidth - 1, x)), Math.max(0, Math.min(mapHeight - 1, z)));
                renderActiveCurveDraft();
                lastMouseX = x;
                lastMouseZ = z;
                return;
            }
            if (activeHudDrag || targetIsInFullscreenHud(e.target)) return;
            if (paletteDragActive) {
                restorePaletteDragScroll();
                return;
            }
            const {x, z} = getMouseCoords(e);

            if (pendingShapeStart) {
                if (!startDeferredShapeStroke(e, x, z)) {
                    lastMouseX = x;
                    lastMouseZ = z;
                    if (!isPanning) updateCursorPreview(x, z);
                    return;
                }
            }

            if (isDrawing) {
                if (activeTool === 'lasso-select') {
                    if (x !== lastMouseX || z !== lastMouseZ) {
                        if (x >= 0 && x < mapWidth && z >= 0 && z < mapHeight) {
                            lassoPath.push({ x, z });
                        }
                    }
                } else if (isSelectionTool()) {
                    // Selection preview layer handles visuals.
                } else if (isShapeTool()) {
                    arcFlipSide = e.shiftKey;
                    // Shape preview layer handles visuals.
                } else {
                    if (x !== lastMouseX || z !== lastMouseZ) {
                        if (drawLine(lastMouseX, lastMouseZ, x, z, true)) {
                            hasDrawnInCurrentStroke = true;
                        }
                    }
                }
            } else if (isPanning) {
                const dx = e.clientX - startPanX;
                const dy = e.clientY - startPanY;
                canvasContainer.scrollLeft = startScrollLeft - dx;
                canvasContainer.scrollTop = startScrollTop - dy;
            }
            
            lastMouseX = x;
            lastMouseZ = z;
            if (!isPanning) updateCursorPreview(x, z);
        });
        
        window.addEventListener('mouseup', (e) => { 
            if (activeSelectionInteraction) {
                finishSelectionInteraction(e);
                return;
            }
            if (activeShapeInteraction) {
                finishShapeSelectionInteraction(e);
                return;
            }
            if (activeCurveDraft && activeCurveDraft.draggingControl) {
                const {x, z} = getMouseCoords(e);
                finishCurveControlDrag(Math.max(0, Math.min(mapWidth - 1, x)), Math.max(0, Math.min(mapHeight - 1, z)));
                lastMouseX = x;
                lastMouseZ = z;
                updateCursorPreview(x, z);
                return;
            }
            if (pendingShapeStart) {
                clearPendingShapeStart();
                const {x, z} = getMouseCoords(e);
                isDrawing = false;
                savedUndoInCurrentStroke = false;
                lastMouseX = x;
                lastMouseZ = z;
                updateCursorPreview(x, z);
                return;
            }
            if (isDrawing) {
                if (isSelectionTool()) {
                    const layer = activePaintLayerForSelection();
                    if (layer) {
                        const {x, z} = getMouseCoords(e);
                        const clampedX = Math.max(0, Math.min(mapWidth - 1, x));
                        const clampedZ = Math.max(0, Math.min(mapHeight - 1, z));
                        if (activeTool === 'lasso-select') {
                            const last = lassoPath[lassoPath.length - 1];
                            if (!last || last.x !== clampedX || last.z !== clampedZ) {
                                lassoPath.push({ x: clampedX, z: clampedZ });
                            }
                        }
                        const cells = activeTool === 'rect-select'
                            ? cellsInRectangleSelection(layer, lineStartX, lineStartZ, clampedX, clampedZ)
                            : cellsInLassoSelection(layer, lassoPath.length >= 3 ? lassoPath : [
                                { x: lineStartX, z: lineStartZ },
                                { x: clampedX, z: lineStartZ },
                                { x: clampedX, z: clampedZ },
                                { x: lineStartX, z: clampedZ }
                            ]);
                        createSelectionFromCells(cells, layer.id);
                        hasDrawnInCurrentStroke = cells.length > 0;
                    }
                    lassoPath = [];
                } else if (isShapeTool()) {
                    const {x, z} = getMouseCoords(e);
                    const clampedX = Math.max(0, Math.min(mapWidth - 1, x));
                    const clampedZ = Math.max(0, Math.min(mapHeight - 1, z));
                    if (isDeferredShapeTool() && !shapeDragReachedMinimum(lineStartX, lineStartZ, clampedX, clampedZ)) {
                        hasDrawnInCurrentStroke = false;
                    } else if (activeTool === 'curve') {
                        const snapshot = currentShapeSelectionSnapshot();
                        if (snapshot) {
                            activeCurveDraft = {
                                tool: activeTool,
                                phase: 0,
                                x0: lineStartX,
                                z0: lineStartZ,
                                x1: clampedX,
                                z1: clampedZ,
                                c1x: lineStartX,
                                c1z: lineStartZ,
                                c2x: clampedX,
                                c2z: clampedZ,
                                brushSize: currentBrushSize(),
                                colorId: snapshot.colorId,
                                blockKey: snapshot.blockKey,
                                tone: snapshot.tone
                            };
                            hasDrawnInCurrentStroke = true;
                            renderActiveCurveDraft();
                        }
                    } else if (isEditableShapeTool()) {
                        const snapshot = currentShapeSelectionSnapshot();
                        if (snapshot) {
                            activeShapeDraft = {
                                tool: activeTool,
                                x0: lineStartX,
                                z0: lineStartZ,
                                x1: clampedX,
                                z1: clampedZ,
                                brushSize: currentBrushSize(),
                                colorId: snapshot.colorId,
                                blockKey: snapshot.blockKey,
                                tone: snapshot.tone,
                                flipSide: false
                            };
                            hasDrawnInCurrentStroke = true;
                            renderActiveShapeDraft();
                        }
                    } else {
                        if (drawShape(activeTool, lineStartX, lineStartZ, x, z, true, e.shiftKey)) {
                            hasDrawnInCurrentStroke = true;
                        }
                    }
                }

                if (!hasDrawnInCurrentStroke && savedUndoInCurrentStroke) {
                    undoStack.pop();
                    updateButtons();
                }
            }

            isDrawing = false; 
            savedUndoInCurrentStroke = false;
            isPanning = false;
            document.body.style.cursor = 'default';
            
            const {x, z} = getMouseCoords(e);
            updateCursorPreview(x, z);
        });

        function applyZoom() {
            const w = Math.floor(mapWidth * currentScale) + 'px';
            const h = Math.floor(mapHeight * currentScale) + 'px';
            canvas.style.width = w; canvas.style.height = h;
            previewCanvas.style.width = w; previewCanvas.style.height = h;
        }

        function isCanvasFullscreen() {
            return document.fullscreenElement === canvasContainer;
        }

        function minimumCanvasScale() {
            return isCanvasFullscreen() ? 0.1 : 0.5;
        }

        function centerCanvasView() {
            canvasContainer.scrollLeft = Math.max(0, (canvasContainer.scrollWidth - canvasContainer.clientWidth) / 2);
            canvasContainer.scrollTop = Math.max(0, (canvasContainer.scrollHeight - canvasContainer.clientHeight) / 2);
        }

        function fitCanvasToFullscreen() {
            if (!isCanvasFullscreen() || mapWidth === 0 || mapHeight === 0) return;

            const fitScale = Math.min(
                canvasContainer.clientWidth / mapWidth,
                canvasContainer.clientHeight / mapHeight
            );
            currentScale = Math.max(minimumCanvasScale(), Math.min(30, fitScale));
            applyZoom();

            requestAnimationFrame(() => {
                centerCanvasView();
                updateCursorPreview(lastMouseX, lastMouseZ);
            });
        }

        function targetIsInFullscreenHud(target) {
            return !!(fullscreenHudOverlay && target && fullscreenHudOverlay.contains(target));
        }

        function clampHudPanel(panel, left, top) {
            const maxLeft = Math.max(0, window.innerWidth - panel.offsetWidth);
            const maxTop = Math.max(0, window.innerHeight - panel.offsetHeight);
            panel.style.left = `${Math.max(0, Math.min(maxLeft, left))}px`;
            panel.style.top = `${Math.max(0, Math.min(maxTop, top))}px`;
        }

        function startHudPanelDrag(event) {
            if (event.button !== 0) return;
            try {
                event.currentTarget.setPointerCapture(event.pointerId);
            } catch (error) {
                // Pointer capture is best-effort; capture-phase release still handles the drag.
            }
            const panel = event.currentTarget.parentElement;
            const rect = panel.getBoundingClientRect();
            activeHudDrag = {
                panel,
                pointerId: event.pointerId,
                pointerTarget: event.currentTarget,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            panel.classList.add("dragging");
            event.preventDefault();
            event.stopPropagation();
        }

        function finishHudPanelDrag(event) {
            if (!activeHudDrag) return;
            activeHudDrag.panel.classList.remove("dragging");
            if (activeHudDrag.pointerTarget && activeHudDrag.pointerId !== undefined) {
                try {
                    activeHudDrag.pointerTarget.releasePointerCapture(activeHudDrag.pointerId);
                } catch (error) {
                    // The pointer may already be released by the browser.
                }
            }
            activeHudDrag = null;
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
        }

        function createFullscreenHudPanel(title, className, left, top, hint = "") {
            const panel = document.createElement("div");
            panel.className = `fullscreen-hud-panel ${className}`;
            panel.style.left = `${left}px`;
            panel.style.top = `${top}px`;

            const header = document.createElement("div");
            header.className = "fullscreen-hud-title";
            header.addEventListener("pointerdown", startHudPanelDrag);

            const titleText = document.createElement("span");
            titleText.textContent = title;
            header.appendChild(titleText);

            if (hint) {
                const hintText = document.createElement("span");
                hintText.className = "fullscreen-hud-title-hint";
                hintText.textContent = hint;
                header.appendChild(hintText);
            }

            const controls = document.createElement("div");
            controls.className = "fullscreen-hud-title-controls";
            const minimizeBtn = document.createElement("button");
            minimizeBtn.type = "button";
            minimizeBtn.className = "fullscreen-hud-minimize";
            minimizeBtn.textContent = "-";
            minimizeBtn.dataset.tooltip = "Minimize window";
            minimizeBtn.addEventListener("pointerdown", event => {
                event.stopPropagation();
            });
            minimizeBtn.addEventListener("click", event => {
                event.preventDefault();
                event.stopPropagation();
                const minimized = panel.classList.toggle("minimized");
                minimizeBtn.textContent = minimized ? "+" : "-";
                minimizeBtn.dataset.tooltip = minimized ? "Restore window" : "Minimize window";
                clampHudPanel(panel, parseFloat(panel.style.left) || 0, parseFloat(panel.style.top) || 0);
            });
            controls.appendChild(minimizeBtn);
            header.appendChild(controls);

            const body = document.createElement("div");
            body.className = "fullscreen-hud-body";

            panel.appendChild(header);
            panel.appendChild(body);
            fullscreenHudOverlay.appendChild(panel);
            return { panel, body };
        }

        function moveElementToFullscreenPanel(element, body) {
            if (!element || !element.parentNode) return;
            const placeholder = document.createComment(`fullscreen-placeholder-${element.id || element.className || "node"}`);
            element.parentNode.insertBefore(placeholder, element);
            fullscreenHudMoveRecords.push({ element, placeholder });
            body.appendChild(element);
        }

        function stackFullscreenPanels(panels, left, top, gap) {
            let nextTop = top;
            for (const panel of panels) {
                clampHudPanel(panel, left, nextTop);
                nextTop += panel.offsetHeight + gap;
            }
        }

        function setupFullscreenHud() {
            if (fullscreenHudOverlay) return;

            fullscreenHudVisible = true;
            fullscreenHudMoveRecords = [];
            fullscreenHudOverlay = document.createElement("div");
            fullscreenHudOverlay.className = "fullscreen-hud";
            canvasContainer.appendChild(fullscreenHudOverlay);
            moveElementToFullscreenPanel(instantTooltip, canvasContainer);
            moveElementToFullscreenPanel(colorPickerWindow, canvasContainer);

            const stopHudEvent = event => {
                if (event.target.closest(".fullscreen-hud-panel")) event.stopPropagation();
            };
            ["mousedown", "mouseup", "click", "dblclick", "contextmenu", "pointerdown", "pointerup"].forEach(type => {
                fullscreenHudOverlay.addEventListener(type, stopHudEvent);
            });
            fullscreenHudOverlay.addEventListener("wheel", stopHudEvent, { passive: false });

            const paletteWidth = Math.min(340, Math.max(220, window.innerWidth - 40));
            const hotbarWidth = Math.min(480, Math.max(260, window.innerWidth - 40));
            const customPalettePanel = createFullscreenHudPanel("Custom Palette", "fullscreen-hud-custom-palette", 18, 18);
            const layersPanel = createFullscreenHudPanel("Layers", "fullscreen-hud-layers", 18, 18);
            const toolsPanel = createFullscreenHudPanel("Tools", "fullscreen-hud-tools", 18, 18);
            const historyPanel = createFullscreenHudPanel("Undo / Redo", "fullscreen-hud-history", 18, 18);
            const paletteHudPanel = createFullscreenHudPanel("Palette", "fullscreen-hud-palette", Math.max(18, window.innerWidth - paletteWidth - 18), 18);
            const hotbarPanel = createFullscreenHudPanel("Hotbar", "fullscreen-hud-hotbar", Math.max(18, (window.innerWidth - hotbarWidth) / 2), Math.max(18, window.innerHeight - 88), "Press H to hide/show GUI");

            historyPanel.body.classList.add("fullscreen-hud-controls-body");

            moveElementToFullscreenPanel(customPaletteSection, customPalettePanel.body);
            moveElementToFullscreenPanel(layersSection, layersPanel.body);
            moveElementToFullscreenPanel(toolSidebarSection, toolsPanel.body);
            moveElementToFullscreenPanel(undoBtn, historyPanel.body);
            moveElementToFullscreenPanel(redoBtn, historyPanel.body);
            moveElementToFullscreenPanel(palettePanel, paletteHudPanel.body);
            moveElementToFullscreenPanel(hotbarArea, hotbarPanel.body);

            stackFullscreenPanels(
                [customPalettePanel.panel, layersPanel.panel, toolsPanel.panel, historyPanel.panel],
                18,
                18,
                8
            );

            [paletteHudPanel.panel, hotbarPanel.panel].forEach(panel => {
                clampHudPanel(panel, parseFloat(panel.style.left) || 0, parseFloat(panel.style.top) || 0);
            });
        }

        function restoreFullscreenHud() {
            if (!fullscreenHudOverlay) return;

            for (const record of fullscreenHudMoveRecords) {
                if (record.placeholder.parentNode) {
                    record.placeholder.parentNode.insertBefore(record.element, record.placeholder);
                    record.placeholder.remove();
                }
            }

            fullscreenHudMoveRecords = [];
            fullscreenHudOverlay.remove();
            fullscreenHudOverlay = null;
            activeHudDrag = null;
            fullscreenHudVisible = true;
        }

        async function toggleCanvasFullscreen() {
            if (!document.fullscreenElement) {
                fullscreenRestoreView = {
                    scale: currentScale,
                    scrollLeft: canvasContainer.scrollLeft,
                    scrollTop: canvasContainer.scrollTop
                };

                try {
                    await canvasContainer.requestFullscreen();
                } catch (error) {
                    fullscreenRestoreView = null;
                    setPaletteStatus("Fullscreen mode is not available in this browser.");
                }
                return;
            }

            if (isCanvasFullscreen()) {
                await document.exitFullscreen();
            }
        }

        fullscreenBtn.addEventListener('click', toggleCanvasFullscreen);

        document.addEventListener("pointermove", (event) => {
            if (!activeHudDrag) return;
            clampHudPanel(
                activeHudDrag.panel,
                event.clientX - activeHudDrag.offsetX,
                event.clientY - activeHudDrag.offsetY
            );
            event.preventDefault();
        }, true);

        document.addEventListener("pointerup", finishHudPanelDrag, true);
        document.addEventListener("pointercancel", finishHudPanelDrag, true);

        document.addEventListener('fullscreenchange', () => {
            const fullscreenActive = isCanvasFullscreen();
            renderPaletteControls();

            if (fullscreenActive) {
                setupFullscreenHud();
                if (colorPickerWindow.classList.contains("visible")) positionColorPickerWindow();
                requestAnimationFrame(fitCanvasToFullscreen);
