        let startScrollLeft = 0;
        let startScrollTop = 0;
        let currentScale = 4;
        
        // History State for Undo/Redo
        let undoStack = [];
        let redoStack = [];
        
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        const canvasContainer = document.getElementById('canvasContainer');
        const paletteImportStatus = document.getElementById('paletteImportStatus');
        const supportBlockSelect = document.getElementById('supportBlockSelect');

        document.getElementById('toolSelect').addEventListener('change', (e) => {
            activeTool = e.target.value;
            updateCursorPreview(lastMouseX, lastMouseZ);
        });

        document.getElementById('brushSize').addEventListener('input', () => {
            updateCursorPreview(lastMouseX, lastMouseZ);
        });

        document.body.dataset.paletteMode = paletteMode;

        function isCarpetBlockOption(block) {
            return !!(block && /_carpet$/.test(block.name));
        }

        function carpetBlockForColor(color) {
            return color.blocks.find(isCarpetBlockOption) || null;
        }

        function paletteColorsForMode() {
            return paletteMode === "carpet"
                ? MAP_COLOR_DATABASE.filter(color => carpetBlockForColor(color))
                : MAP_COLOR_DATABASE;
        }

        function usesBlockPaletteMode() {
            return paletteMode === "fullblock" || paletteMode === "staircased";
        }

        function rgbFromHex(hex) {
            return [
                parseInt(hex.slice(1, 3), 16),
                parseInt(hex.slice(3, 5), 16),
                parseInt(hex.slice(5, 7), 16)
            ];
        }

        function baseRgbFromNormalHex(hex) {
            return rgbFromHex(hex).map(channel => {
                for (let base = 0; base <= 255; base++) {
                    if (Math.floor(base * 220 / 255) === channel) return base;
                }
                return Math.max(0, Math.min(255, Math.round(channel * 255 / 220)));
            });
        }

        function baseRgbForColor(color) {
            const baseHex = MAP_COLOR_BASE_HEX_OVERRIDES.get(color.mapartId);
            if (baseHex) return rgbFromHex(baseHex);
            if (!color.baseRgb) color.baseRgb = baseRgbFromNormalHex(color.hex);
            return color.baseRgb;
        }

        function rgbForMapTone(color, tone = "normal") {
            if (tone === "normal") return rgbFromHex(color.hex);

            const brightness = tone === "light" ? 255 : tone === "dark" ? 180 : 135;
            return baseRgbForColor(color).map(channel => Math.floor(channel * brightness / 255));
        }

        function rgbToPaletteHex(rgb) {
            return "FF" + rgb.map(channel =>
                Math.max(0, Math.min(255, channel)).toString(16).padStart(2, "0").toUpperCase()
            ).join("");
        }

        function ensureSelectedColorForMode() {
            const colors = paletteColorsForMode();
            if (!colors.includes(selectedColor)) {
                selectedColor = colors[0] || MAP_COLOR_DATABASE[0];
            }
        }

        function selectedBlockForColor(color) {
            if (paletteMode === "carpet") {
                return carpetBlockForColor(color) || color.blocks[0];
            }
            return color.blocks.find(block => block.key === selectedBlockByColorId[color.id]) || color.blocks[0];
        }

        function setPaletteStatus(message) {
            paletteImportStatus.textContent = message || "";
        }

        function renderSupportSelect() {
            supportBlockSelect.innerHTML = "";
            SUPPORT_BLOCK_OPTIONS.forEach(block => {
                const option = document.createElement('option');
                option.value = block.key;
                option.textContent = block.displayName;
                supportBlockSelect.appendChild(option);
            });
            supportBlockSelect.value = selectedSupportBlock.key;
        }

        function renderPaletteRows() {
            const paletteContainer = document.getElementById('paletteContainer');
            ensureSelectedColorForMode();
            paletteContainer.innerHTML = "";
            paletteContainer.classList.toggle("carpet-mode", paletteMode === "carpet");
            paletteContainer.classList.toggle("fullblock-mode", usesBlockPaletteMode());

            paletteColorsForMode().forEach(color => {
                const row = document.createElement('div');
                row.className = `palette-row ${color.id === selectedColor.id ? 'active' : ''}`;
                row.onclick = () => {
                    selectedColor = color;
                    renderPaletteRows();
                    updateCursorPreview(lastMouseX, lastMouseZ);
                };
                
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                row.appendChild(swatch);

                if (paletteMode === "carpet") {
                    const label = document.createElement('span');
                    label.innerText = color.label;
                    row.appendChild(label);
                } else {
                    const select = document.createElement('select');
                    select.onclick = e => e.stopPropagation();
                    color.blocks.forEach(block => {
                        const option = document.createElement('option');
                        option.value = block.key;
                        option.textContent = block.displayName + (block.supportRequired ? " *" : "");
                        select.appendChild(option);
                    });
                    select.value = selectedBlockForColor(color).key;
                    select.onchange = () => {
                        selectedBlockByColorId[color.id] = select.value;
                        selectedColor = color;
                        renderPaletteRows();
                        updateCursorPreview(lastMouseX, lastMouseZ);
                    };
                    row.appendChild(select);
                }

                paletteContainer.appendChild(row);
            });
        }

        function setPaletteMode(mode, message = "", refreshPreview = true) {
            paletteMode = mode;
            document.body.dataset.paletteMode = paletteMode;
            renderPaletteRows();
            if (refreshPreview) updateCursorPreview(lastMouseX, lastMouseZ);
            if (message) setPaletteStatus(message);
        }

        function resetPaletteSelectionsToDefaults() {
            for (const color of MAP_COLOR_DATABASE) {
                selectedBlockByColorId[color.id] = color.blocks[0].key;
            }
            document.getElementById('paletteProfileInput').value = "";
            setPaletteStatus("");
        }

        function applyImportedBlockSelections() {
            const countsByColor = new Map();

            for (const lf of loadedFiles) {
                for (const visible of lf.visibleBlocks) {
                    const info = visible.blockInfo;
                    if (!info || !info.color || !info.block) continue;

                    if (!countsByColor.has(info.color.id)) {
                        countsByColor.set(info.color.id, new Map());
                    }

                    const blockCounts = countsByColor.get(info.color.id);
                    blockCounts.set(info.block.key, (blockCounts.get(info.block.key) || 0) + 1);
                }
            }

            let updated = 0;
            countsByColor.forEach((blockCounts, colorId) => {
                let bestKey = null;
                let bestCount = 0;
                blockCounts.forEach((count, key) => {
                    if (count > bestCount) {
                        bestKey = key;
                        bestCount = count;
                    }
                });

                const color = COLORS_BY_ID.get(colorId);
                if (color && bestKey && color.blocks.some(block => block.key === bestKey)) {
                    selectedBlockByColorId[colorId] = bestKey;
                    updated++;
                }
            });

            return updated;
        }

        supportBlockSelect.addEventListener('change', () => {
            selectedSupportBlock = SUPPORT_BLOCK_OPTIONS.find(block => block.key === supportBlockSelect.value) || SUPPORT_BLOCK_OPTIONS[0];
            if (usesBlockPaletteMode()) rebuildAllSupports();
        });

        renderSupportSelect();
        renderPaletteRows();

        function readFileAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function readTextFileAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        function nbtStringTag(name, value) {
            return { type: 8, name, value };
        }

        function getPaletteEntryName(entry) {
            return entry && entry.Name ? entry.Name.value : "";
        }

        function getPaletteEntryProperties(entry) {
            const props = {};
            if (entry && entry.Properties && entry.Properties.value) {
                for (const key in entry.Properties.value) {
                    props[key] = String(entry.Properties.value[key].value);
                }
            }
            return props;
        }

        function paletteEntryKey(entry) {
            return stateKey(getPaletteEntryName(entry), getPaletteEntryProperties(entry));
        }

        function createPaletteEntry(block) {
            const entry = { Name: nbtStringTag("Name", block.name) };
            const propKeys = Object.keys(block.properties || {});
            if (propKeys.length > 0) {
                const propValue = {};
                propKeys.forEach(key => {
                    propValue[key] = nbtStringTag(key, String(block.properties[key]));
                });
                entry.Properties = { type: 10, name: "Properties", value: propValue };
            }
            return entry;
        }

        function ensurePaletteState(lf, block) {
            if (!lf.paletteKeyToIndex) lf.paletteKeyToIndex = new Map();
            const existing = lf.paletteKeyToIndex.get(block.key);
            if (existing !== undefined) return existing;

            const idx = lf.structurePalette.findIndex(entry => paletteEntryKey(entry) === block.key);
            if (idx !== -1) {
                lf.paletteKeyToIndex.set(block.key, idx);
                return idx;
            }

            lf.structurePalette.push(createPaletteEntry(block));
            const newIndex = lf.structurePalette.length - 1;
            lf.paletteKeyToIndex.set(block.key, newIndex);
            return newIndex;
        }

        function coordKey(x, y, z) {
            return `${x},${y},${z}`;
        }

        function rebuildBlockLookup(lf) {
            lf.blockLookup = new Map();
            for (const block of lf.blocksList) {
                const pos = block.pos.value.list;
                lf.blockLookup.set(coordKey(pos[0], pos[1], pos[2]), block);
            }
        }

        function removeBlockFromFile(lf, block) {
            const idx = lf.blocksList.indexOf(block);
            if (idx !== -1) lf.blocksList.splice(idx, 1);
            const pos = block.pos.value.list;
            lf.blockLookup.delete(coordKey(pos[0], pos[1], pos[2]));
        }

        function blockAt(lf, x, y, z) {
            return lf.blockLookup.get(coordKey(x, y, z));
        }

        function blockUsesOption(lf, block, option) {
            if (!block) return false;
            const paletteEntry = lf.structurePalette[block.state.value];
            return paletteEntry && paletteEntryKey(paletteEntry) === option.key;
        }

        function isSupportMaterialBlock(lf, block) {
            return blockUsesOption(lf, block, selectedSupportBlock);
        }

        function paletteInfoForState(lf, stateId) {
            const entry = lf.structurePalette[stateId];
            if (!entry) return null;
            return BLOCK_BY_KEY.get(paletteEntryKey(entry)) || null;
        }

        function updateCellMetadata(cell) {
            const info = paletteInfoForState(cell.file, cell.blockRef.state.value);
            if (info) {
                cell.colorId = info.color.id;
                cell.blockKey = info.block.key;
            }
            return info;
        }

        function buildPaletteKeyMap(structurePalette) {
            const map = new Map();
            structurePalette.forEach((entry, idx) => {
                map.set(paletteEntryKey(entry), idx);
            });
            return map;
        }

        function detectEditableLayer(structurePalette, blocksList) {
            const counts = new Map();
            for (const block of blocksList) {
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;
                const y = block.pos.value.list[1];
                counts.set(y, (counts.get(y) || 0) + 1);
            }

            let bestY = -1;
            let bestCount = 0;
            counts.forEach((count, y) => {
                if (count > bestCount || (count === bestCount && y > bestY)) {
                    bestY = y;
                    bestCount = count;
                }
            });
            return bestY;
        }

        function getStructureSize(nbtRoot) {
            return nbtRoot.value.size && nbtRoot.value.size.value ? nbtRoot.value.size.value.list : [];
        }

        function detectNooblineZ(nbtRoot, structurePalette, blocksList) {
            const size = getStructureSize(nbtRoot);
            const declaredZ = size[2] || 0;
            const zCounts = new Map();
            let minZ = Infinity;
            let maxZ = -Infinity;

            for (const block of blocksList) {
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;
                const z = block.pos.value.list[2];
                zCounts.set(z, (zCounts.get(z) || 0) + 1);
                if (z < minZ) minZ = z;
                if (z > maxZ) maxZ = z;
            }

            if (!Number.isFinite(minZ)) return null;

            // MapArtCraft schematic NBTs add a scaffold/noobline row before the 128 artwork rows.
            // For a normal 1x1 map that makes the structure 128x129, with artwork at z=1..128.
            const looksLikeMapartcraftDepth = declaredZ >= 129 || (maxZ - minZ + 1) > 128;
            return looksLikeMapartcraftDepth && zCounts.has(minZ) ? minZ : null;
        }

        function isNooblineBlock(lf, block) {
            return lf.nooblineZ !== null &&
                block.pos.value.list[2] === lf.nooblineZ;
        }

        function collectVisibleArtworkBlocks(structurePalette, blocksList, nooblineZ) {
            const visible = new Map();
            for (const block of blocksList) {
                const pos = block.pos.value.list;
                if (nooblineZ !== null && pos[2] === nooblineZ) continue;

                const entry = structurePalette[block.state.value];
                if (!entry) continue;

                const key = `${pos[0]},${pos[2]}`;
                const existing = visible.get(key);
                if (!existing || pos[1] > existing.block.pos.value.list[1]) {
                    visible.set(key, {
                        block,
                        blockInfo: BLOCK_BY_KEY.get(paletteEntryKey(entry)) || null
                    });
                }
            }
            return Array.from(visible.values()).filter(item => item.blockInfo);
        }

        function buildTopMapBlockByRawXZ(structurePalette, blocksList) {
            const columns = new Map();
            for (const block of blocksList) {
                const pos = block.pos.value.list;
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;

                const key = `${pos[0]},${pos[2]}`;
                const existing = columns.get(key);
                if (!existing || pos[1] > existing.y) {
                    columns.set(key, { y: pos[1], block });
                }
            }
            return columns;
        }

        function visibleBlocksAreStaircased(visibleBlocks) {
            if (visibleBlocks.length === 0) return false;
            const firstY = visibleBlocks[0].block.pos.value.list[1];
            return visibleBlocks.some(visible => visible.block.pos.value.list[1] !== firstY);
        }

        function inferSupportBlockFromLoadedFiles() {
            const counts = new Map();
            for (const lf of loadedFiles) {
                for (const cell of lf.editableCellsByLocal.values()) {
                    const support = blockAt(lf, cell.rawX, cell.rawY - 1, cell.rawZ);
                    if (!support) continue;
                    const entry = lf.structurePalette[support.state.value];
                    if (!entry) continue;
                    const key = paletteEntryKey(entry);
                    if (SUPPORT_BLOCK_OPTIONS.some(option => option.key === key)) {
                        counts.set(key, (counts.get(key) || 0) + 1);
                    }
                }
            }

            let bestKey = null;
            let bestCount = 0;
            counts.forEach((count, key) => {
                if (count > bestCount) {
                    bestKey = key;
                    bestCount = count;
                }
            });

            selectedSupportBlock = SUPPORT_BLOCK_OPTIONS.find(option => option.key === bestKey) || SUPPORT_BLOCK_OPTIONS[0];
            renderSupportSelect();
        }

        function decodeMapartPreset(encodedPreset) {
            if (!encodedPreset || !/^[0-9a-zQ-ZA-P]+$/.test(encodedPreset)) return null;
            const selections = [];
            const presetRegex = /([0-9a-z]+)(?=([Q-ZA-P]+))/g;
            let match;
            const digitMap = { Q: "0", R: "1", S: "2", T: "3", U: "4", V: "5", W: "6", X: "7", Y: "8", Z: "9" };

            while ((match = presetRegex.exec(encodedPreset)) !== null) {
                const colorId = parseInt(match[1], 36);
                const encodedBlock = match[2]
                    .replace(/[Q-Z]/g, char => digitMap[char])
                    .toLowerCase();
                const presetIndex = parseInt(encodedBlock, 26);
                if (Number.isFinite(colorId) && Number.isFinite(presetIndex)) {
                    selections.push({ mapartId: colorId, presetIndex });
                }
            }
            return selections;
        }

        function encodeMapartPresetIndex(presetIndex) {
            const digitMap = ["Q", "R", "S", "T", "U", "V", "W", "X", "Y", "Z"];
            return Math.max(0, Number(presetIndex) || 0)
                .toString(26)
                .replace(/[0-9]/g, digit => digitMap[Number(digit)])
                .replace(/[a-p]/g, char => char.toUpperCase());
        }

        function encodeCurrentMapartPreset() {
            return MAP_COLOR_DATABASE
                .map(color => {
                    const block = selectedBlockForColor(color);
                    const presetIndex = block && block.mapartPresetIndex !== null ? block.mapartPresetIndex : 0;
                    return color.mapartId.toString(36) + encodeMapartPresetIndex(presetIndex);
                })
                .join("");
        }

        function currentPaletteProfileText() {
            const preset = encodeCurrentMapartPreset();
            const staircasingEnabled = paletteMode === "staircased";
            const lines = [
                "; paint.net Palette File",
                "; Generated by NBT Mapart Editor",
                `; Link to preset: https://mike2b2t.github.io/mapartcraft/?preset=${preset}`,
                `; staircasing: ${staircasingEnabled ? "enabled" : "disabled"}`,
                "; unobtainable colours: disabled",
                `; palette mode: ${paletteMode}`,
                ""
            ];

            for (const color of MAP_COLOR_DATABASE) {
                const block = selectedBlockForColor(color);
                lines.push(`; ${color.mapartId} ${color.label}: ${block ? block.displayName : "Default"}`);
            }

            lines.push("");
            if (staircasingEnabled) {
                for (const color of MAP_COLOR_DATABASE) {
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "dark")));
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "normal")));
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "light")));
                }
                lines.push("FF-64-64-64");
                lines.push("FF-64-64-64");
                lines.push("FF-64-64-64");
            } else {
                for (const color of MAP_COLOR_DATABASE) {
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "normal")));
                }
            }

            return lines.join("\n") + "\n";
        }

        function profileModeFromText(text) {
            const modeMatch = text.match(/;\s*palette mode:\s*(carpet|fullblock|staircased)/i);
            if (modeMatch) return modeMatch[1].toLowerCase();
            if (/;\s*staircasing:\s*enabled/i.test(text)) return "staircased";
            if (/;\s*staircasing:\s*disabled/i.test(text)) return "fullblock";
            return null;
        }

        function shouldApplyProfileMode(profileMode) {
            if (!profileMode || profileMode === paletteMode) return false;
            if (loadedFiles.length === 0) return true;
            if (profileMode === "staircased" && usesBlockPaletteMode()) return true;
            return profileMode === "carpet" && paletteMode === "carpet";
        }

        function importPaletteProfileText(text) {
            const presetMatch = text.match(/[?&]preset=([0-9a-zQ-ZA-P]+)/) || text.match(/preset\s*[:=]\s*([0-9a-zQ-ZA-P]+)/i);
            if (!presetMatch) {
                setPaletteStatus("No MapArtCraft preset link found in palette file.");
                return;
            }

            const selections = decodeMapartPreset(presetMatch[1]);
            if (!selections) {
                setPaletteStatus("Could not decode the MapArtCraft preset.");
                return;
            }

            let applied = 0;
            let fallback = 0;
            let skipped = 0;
            selections.forEach(selection => {
                const color = COLOR_BY_MAPART_ID.get(selection.mapartId);
                if (!color) {
                    skipped++;
                    return;
                }

                const block = MAPART_BLOCK_BY_COLOR_AND_PRESET.get(`${selection.mapartId}:${selection.presetIndex}`);
                if (block) {
                    selectedBlockByColorId[color.id] = block.key;
                    applied++;
                } else {
                    selectedBlockByColorId[color.id] = color.blocks[0].key;
                    fallback++;
                }
            });

            const profileMode = profileModeFromText(text);
            if (shouldApplyProfileMode(profileMode)) {
                setPaletteMode(profileMode, "", false);
            } else {
                renderPaletteRows();
            }
            updateCursorPreview(lastMouseX, lastMouseZ);
            const modeNote = profileMode ? ` Mode: ${profileMode}.` : "";
            setPaletteStatus(`Imported profile: ${applied} matched, ${fallback} fallback, ${skipped} skipped.${modeNote}`);
        }

        document.getElementById('paletteProfileInput').addEventListener('change', async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            try {
                importPaletteProfileText(await readTextFileAsync(file));
            } catch (error) {
                setPaletteStatus("Failed to import palette profile.");
                console.error(error);
            }
        });

        // --- 3. MULTI-FILE PARSER AND STITCHER ---
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            originalFileName = files[0].name.replace('.nbt', '').replace(/_[0-9\-]+_[0-9\-]+$/, '');
            document.getElementById('saveZipBtn').innerText = "Processing...";
            resetPaletteSelectionsToDefaults();
            loadedFiles = [];
            mapWidth = 0;
            mapHeight = 0;
            gridMap = [];
            
            let minGridX = Infinity, maxGridX = -Infinity;
            let minGridZ = Infinity, maxGridZ = -Infinity;

            for (const file of files) {
                try {
                    const dataBuffer = await readFileAsync(file);
                    let data = new Uint8Array(dataBuffer);
                    try { data = pako.ungzip(data); } catch (err) {}
                    
                    const parser = new NBTParser(data);
                    const nbtRoot = parser.readTag();

                    if (!nbtRoot || !nbtRoot.value.size || !nbtRoot.value.blocks) {
                        console.warn(`Skipping ${file.name}: Not a valid structure.`);
                        continue;
                    }

                    let structurePalette;
                    if (nbtRoot.value.palette) {
                        structurePalette = nbtRoot.value.palette.value.list;
                    } else if (nbtRoot.value.palettes) {
                        structurePalette = nbtRoot.value.palettes.value.list[0].list; 
                    } else {
                        console.warn(`Skipping ${file.name}: No palette found.`);
                        continue;
                    }

                    const blocksList = nbtRoot.value.blocks.value.list;
                    const editableLayerY = detectEditableLayer(structurePalette, blocksList);
                    if (editableLayerY === -1) {
                        console.warn(`Skipping ${file.name}: No known map-color blocks found.`);
                        continue;
                    }
                    const nooblineZ = detectNooblineZ(nbtRoot, structurePalette, blocksList);
                    const visibleBlocks = collectVisibleArtworkBlocks(structurePalette, blocksList, nooblineZ);
                    const topMapBlockByRawXZ = buildTopMapBlockByRawXZ(structurePalette, blocksList);

                    let fMinX = Infinity, fMinZ = Infinity;
                    
                    for (const visible of visibleBlocks) {
                        const px = visible.block.pos.value.list[0];
                        const pz = visible.block.pos.value.list[2];
                        if (px < fMinX) fMinX = px;
                        if (pz < fMinZ) fMinZ = pz;
                    }

                    if (!Number.isFinite(fMinX) || !Number.isFinite(fMinZ)) {
                        console.warn(`Skipping ${file.name}: No editable blocks found on detected layer.`);
                        continue;
                    }

                    let gX = 0, gZ = 0;
                    const match = file.name.match(/_([0-9\-]+)_([0-9\-]+)\.nbt$/);
                    if (match) {
                        gX = parseInt(match[1]);
                        gZ = parseInt(match[2]);
                    }

                    if (gX < minGridX) minGridX = gX;
                    if (gX > maxGridX) maxGridX = gX;
                    if (gZ < minGridZ) minGridZ = gZ;
                    if (gZ > maxGridZ) maxGridZ = gZ;

                    const loadedFile = {
                        name: file.name,
                        nbtRoot: nbtRoot,
                        blocksList: blocksList,
                        structurePalette: structurePalette,
                        paletteKeyToIndex: buildPaletteKeyMap(structurePalette),
                        layerY: editableLayerY,
                        nooblineZ: nooblineZ,
                        minX: fMinX,
                        minZ: fMinZ,
                        gridX: gX,
                        gridZ: gZ,
                        visibleBlocks: visibleBlocks,
                        topMapBlockByRawXZ: topMapBlockByRawXZ,
                        staircased: visibleBlocksAreStaircased(visibleBlocks),
                        editableCellsByLocal: new Map(),
                        supportCreatedKeys: new Set()
                    };
                    rebuildBlockLookup(loadedFile);
                    loadedFiles.push(loadedFile);

                } catch (error) {
                    console.error(`Error loading ${file.name}:`, error);
                }
            }

            if (loadedFiles.length === 0) {
                alert("No valid map files could be loaded.");
                document.getElementById('saveZipBtn').innerText = "Download as ZIP Folder";
                return;
            }

            const carpetOnlyImport = loadedFiles.every(lf =>
                lf.visibleBlocks.length > 0 &&
                lf.visibleBlocks.every(visible => isCarpetBlockOption(visible.blockInfo.block))
            );
            const staircasedImport = !carpetOnlyImport && loadedFiles.some(lf => lf.staircased);
            const importedMode = carpetOnlyImport ? "carpet" : (staircasedImport ? "staircased" : "fullblock");
            const importedSelections = carpetOnlyImport ? 0 : applyImportedBlockSelections();
            setPaletteMode(
                importedMode,
                carpetOnlyImport
                    ? "Carpet-only NBT detected. Switched to the carpet palette."
                    : staircasedImport
                        ? `Staircased full-block NBT detected. Preserving block heights and matched ${importedSelections} dropdowns from imported blocks.`
                        : `Flat full-block or mixed NBT detected. Matched ${importedSelections} dropdowns from imported blocks.`,
                false
            );

            // Calculate exact total size based on the furthest global block mapped
            let maxGlobalXNeeded = 0;
            let maxGlobalZNeeded = 0;
            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;
                for (const visible of lf.visibleBlocks) {
                    const b = visible.block;
                    const localX = b.pos.value.list[0] - lf.minX;
                    const localZ = b.pos.value.list[2] - lf.minZ;
                    const globalX = offsetX + localX;
                    const globalZ = offsetZ + localZ;
                    if (globalX > maxGlobalXNeeded) maxGlobalXNeeded = globalX;
                    if (globalZ > maxGlobalZNeeded) maxGlobalZNeeded = globalZ;
                }
            }

            mapWidth = maxGlobalXNeeded + 1;
            mapHeight = maxGlobalZNeeded + 1;
            gridMap = new Array(mapWidth * mapHeight).fill(null);

            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;

                for (const visible of lf.visibleBlocks) {
                    const b = visible.block;
                    const blockInfo = visible.blockInfo;
                    const localX = b.pos.value.list[0] - lf.minX;
                    const localZ = b.pos.value.list[2] - lf.minZ;
                    const globalX = offsetX + localX;
                    const globalZ = offsetZ + localZ;
                    
                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                        const cell = {
                            blockRef: b,
                            file: lf,
                            rawX: b.pos.value.list[0],
                            rawY: b.pos.value.list[1],
                            rawZ: b.pos.value.list[2],
                            localX,
                            localZ,
                            globalX,
                            globalZ,
                            colorId: blockInfo.color.id,
                            blockKey: blockInfo.block.key
                        };
                        gridMap[globalZ * mapWidth + globalX] = cell;
                        lf.editableCellsByLocal.set(`${localX},${localZ}`, cell);
                    }
                }
            }

            if (usesBlockPaletteMode()) {
                inferSupportBlockFromLoadedFiles();
            } else {
                renderSupportSelect();
            }

            canvas.width = mapWidth;
            canvas.height = mapHeight;
            previewCanvas.width = mapWidth;
            previewCanvas.height = mapHeight;

            currentScale = Math.min(4, 512 / Math.max(mapWidth, mapHeight));
            applyZoom();

            canvasContainer.scrollLeft = (canvas.offsetWidth - canvasContainer.offsetWidth) / 2;
            canvasContainer.scrollTop = (canvas.offsetHeight - canvasContainer.offsetHeight) / 2;
            
            undoStack = [];
            redoStack = [];
            updateButtons();
            renderFullCanvas();
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);

            document.getElementById('saveZipBtn').innerText = "Download as ZIP Folder";
        });

        // --- SUPPORT BLOCKS ---
        function cellByLocal(lf, localX, localZ) {
            return lf.editableCellsByLocal.get(`${localX},${localZ}`);
        }

        function isEditableArtworkBlock(lf, block) {
            if (!block) return false;
            const pos = block.pos.value.list;
            const cell = cellByLocal(lf, pos[0] - lf.minX, pos[2] - lf.minZ);
            return !!(cell && cell.blockRef === block);
        }

        function cellNeedsSupport(cell) {
            if (!usesBlockPaletteMode()) return false;
            const info = updateCellMetadata(cell);
            return !!(info && info.block.supportRequired);
        }

        function directSupportPositionsForCell(cell) {
            const y = cell.rawY - 1;
            if (y < 0) return [];

            const pos = { x: cell.rawX, y, z: cell.rawZ };
            return pos.z === cell.file.nooblineZ ? [] : [pos];
        }

        function optimizedSupportPositionsForCell(cell) {
            const y = cell.rawY - 1;
            if (y < 0) return [];

            return [
                { x: cell.rawX, y, z: cell.rawZ },
                { x: cell.rawX, y, z: cell.rawZ + 1 }
            ].concat(cell.rawZ > 0 ? [{ x: cell.rawX, y, z: cell.rawZ - 1 }] : [])
             .filter(pos => pos.z !== cell.file.nooblineZ);
        }

        function supportPositionsForCell(cell) {
            return paletteMode === "staircased"
                ? directSupportPositionsForCell(cell)
                : optimizedSupportPositionsForCell(cell);
        }

        function supportChangeRecordForCell(cell) {
            return {
                cell,
                previousSupportPositions: cellNeedsSupport(cell) ? supportPositionsForCell(cell) : []
            };
        }

        function normalizeSupportChangeRecords(changedItems) {
            return changedItems
                .map(item => item && item.cell ? item : { cell: item, previousSupportPositions: [] })
                .filter(record => record.cell);
        }

        function createSupportBlockAt(lf, pos) {
            if (pos.y < 0 || blockAt(lf, pos.x, pos.y, pos.z)) return;
            const state = ensurePaletteState(lf, selectedSupportBlock);
            const supportBlock = {
                pos: { type: 9, name: "pos", value: { type: 3, list: [pos.x, pos.y, pos.z] } },
                state: { type: 3, name: "state", value: state }
            };
            lf.blocksList.push(supportBlock);
            const key = coordKey(pos.x, pos.y, pos.z);
            lf.blockLookup.set(key, supportBlock);
            lf.supportCreatedKeys.add(key);
        }

        function syncSupportsForCells(changedCells) {
            if (!usesBlockPaletteMode()) return;

            const byFile = new Map();
            for (const record of normalizeSupportChangeRecords(changedCells)) {
                const cell = record.cell;
                if (!byFile.has(cell.file)) byFile.set(cell.file, []);
                byFile.get(cell.file).push(record);
            }

            byFile.forEach((records, lf) => {
                const affectedCells = new Map();
                const expired = new Map();

                for (const record of records) {
                    const cell = record.cell;
                    for (const pos of record.previousSupportPositions || []) {
                        expired.set(coordKey(pos.x, pos.y, pos.z), pos);
                    }

                    for (let dz = -2; dz <= 2; dz++) {
                        const neighbor = cellByLocal(lf, cell.localX, cell.localZ + dz);
                        if (neighbor) affectedCells.set(`${neighbor.localX},${neighbor.localZ}`, neighbor);
                    }
                }

                const desired = new Map();
                affectedCells.forEach(cell => {
                    const positions = supportPositionsForCell(cell);
                    if (cellNeedsSupport(cell)) {
                        positions.forEach(pos => desired.set(coordKey(pos.x, pos.y, pos.z), pos));
                    }
                });

                expired.forEach((pos, key) => {
                    if (desired.has(key)) return;
                    const existing = blockAt(lf, pos.x, pos.y, pos.z);
                    if (existing && !isEditableArtworkBlock(lf, existing) && (lf.supportCreatedKeys.has(key) || isSupportMaterialBlock(lf, existing))) {
                        removeBlockFromFile(lf, existing);
                        lf.supportCreatedKeys.delete(key);
                    }
                });

                desired.forEach(pos => {
                    const existing = blockAt(lf, pos.x, pos.y, pos.z);
                    if (!existing) {
                        createSupportBlockAt(lf, pos);
                    }
                });
            });
        }

        function rebuildAllSupports() {
            if (loadedFiles.length === 0 || !usesBlockPaletteMode()) return;
            for (const lf of loadedFiles) {
                for (const key of Array.from(lf.supportCreatedKeys)) {
                    const existing = lf.blockLookup.get(key);
                    if (existing) removeBlockFromFile(lf, existing);
                    lf.supportCreatedKeys.delete(key);
                }
            }
            syncSupportsForCells(gridMap.filter(Boolean));
        }

        function updateStructureSize(lf) {
            if (!lf.nbtRoot.value.size || !lf.nbtRoot.value.size.value || !lf.nbtRoot.value.size.value.list) return;
            let maxX = 0, maxY = 0, maxZ = 0;
            for (const block of lf.blocksList) {
                const pos = block.pos.value.list;
                if (pos[0] > maxX) maxX = pos[0];
                if (pos[1] > maxY) maxY = pos[1];
                if (pos[2] > maxZ) maxZ = pos[2];
            }
            lf.nbtRoot.value.size.value.list = [maxX + 1, maxY + 1, maxZ + 1];
        }

        // --- DRAWING AND RENDERING ---
        function previousStaircaseY(cell) {
            const previousGlobalZ = cell.globalZ - 1;
            if (previousGlobalZ >= 0) {
                const previousCell = gridMap[previousGlobalZ * mapWidth + cell.globalX];
                if (previousCell) return previousCell.rawY;
            }

            const previousColumn = cell.file.topMapBlockByRawXZ
                ? cell.file.topMapBlockByRawXZ.get(`${cell.rawX},${cell.rawZ - 1}`)
                : null;
            return previousColumn ? previousColumn.y : null;
        }

        function staircasedToneForCell(cell) {
            if (paletteMode !== "staircased") return "normal";

            const previousY = previousStaircaseY(cell);
            if (previousY === null) return "normal";
            if (cell.rawY > previousY) return "light";
            if (cell.rawY < previousY) return "dark";
            return "normal";
        }

        function rgbForCellColor(cell, color) {
            return rgbForMapTone(color, staircasedToneForCell(cell));
        }

        function rgbToCss(rgb) {
            return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
        }

        function renderFullCanvas() {
            if (mapWidth === 0 || mapHeight === 0) return;
            const imageData = ctx.createImageData(mapWidth, mapHeight);
            
            for(let i=0; i<imageData.data.length; i++) imageData.data[i] = 0; 

            for(let i = 0; i < gridMap.length; i++) {
                const cell = gridMap[i];
                if (cell) {
                    const blockInfo = updateCellMetadata(cell);
                    
                    if (blockInfo) {
                        const [r, g, b] = rgbForCellColor(cell, blockInfo.color);
                        
                        const pxIdx = i * 4;
                        imageData.data[pxIdx] = r;
                        imageData.data[pxIdx+1] = g;
                        imageData.data[pxIdx+2] = b;
                        imageData.data[pxIdx+3] = 255;
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function applyBrush(cx, cz, updateCanvasDirectly) {
            const size = parseInt(document.getElementById('brushSize').value) || 1;
            const offsetStart = Math.floor(size / 2);
            const offsetEnd = size - offsetStart - 1; 
            
            let changed = false;
            const changedCells = [];
            const targetBlock = selectedBlockForColor(selectedColor);
            for(let bx = cx - offsetStart; bx <= cx + offsetEnd; bx++) {
                for(let bz = cz - offsetStart; bz <= cz + offsetEnd; bz++) {
                    if (bx >= 0 && bx < mapWidth && bz >= 0 && bz < mapHeight) {
                        const cell = gridMap[bz * mapWidth + bx];
                        
                        if (cell) {
                            const targetPaletteIndex = ensurePaletteState(cell.file, targetBlock);
                            
                            if (cell.blockRef.state.value !== targetPaletteIndex) {
                                const supportChange = supportChangeRecordForCell(cell);
                                cell.blockRef.state.value = targetPaletteIndex;
                                cell.colorId = selectedColor.id;
                                cell.blockKey = targetBlock.key;
                                changedCells.push(supportChange);
                                changed = true;
                                if (updateCanvasDirectly) {
                                    ctx.fillStyle = rgbToCss(rgbForCellColor(cell, selectedColor));
                                    ctx.fillRect(bx, bz, 1, 1);
                                }
                            }
                        }
                    }
                }
            }
            if (changedCells.length > 0) syncSupportsForCells(changedCells);
            return changed;
        }

        function drawLine(x0, y0, x1, y1, updateCanvasDirectly) {
            let dx = Math.abs(x1 - x0);
            let dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1;
            let sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;
            let changed = false;

            while(true) {
                if (applyBrush(x0, y0, updateCanvasDirectly)) changed = true;
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
            return changed;
        }

        // --- PREVIEW CURSOR LAYER (Optimized to prevent lag) ---
        function previewBrush(cx, cz, fillStyle, size, offsetStart) {
            previewCtx.fillStyle = fillStyle;
            previewCtx.fillRect(cx - offsetStart, cz - offsetStart, size, size);
        }

        function previewLine(x0, y0, x1, y1, fillStyle, size, offsetStart) {
            let dx = Math.abs(x1 - x0);
            let dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1;
            let sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;

            while(true) {
                previewBrush(x0, y0, fillStyle, size, offsetStart);
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
        }

        function updateCursorPreview(x, z) {
            if (mapWidth === 0 || loadedFiles.length === 0) return;
            
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            
            if (isPanning) return;

            const size = parseInt(document.getElementById('brushSize').value) || 1;
            const offsetStart = Math.floor(size / 2);
            
            const r = parseInt(selectedColor.hex.slice(1, 3), 16);
            const g = parseInt(selectedColor.hex.slice(3, 5), 16);
            const b = parseInt(selectedColor.hex.slice(5, 7), 16);
            const fillStyle = `rgba(${r}, ${g}, ${b}, 0.65)`;

            if (isDrawing && activeTool === 'line') {
                previewLine(lineStartX, lineStartZ, x, z, fillStyle, size, offsetStart);
                return; 
            }

            if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) return;
            
            previewCtx.fillStyle = fillStyle;
            previewCtx.fillRect(x - offsetStart, z - offsetStart, size, size);
        }

        // --- HISTORY (UNDO/REDO) ---
        function saveCurrentStateToUndo() {
            const snapshot = new Int32Array(gridMap.length);
            for(let i=0; i<gridMap.length; i++) {
                snapshot[i] = gridMap[i] ? gridMap[i].blockRef.state.value : -1;
            }
            undoStack.push(snapshot);
            redoStack = []; 
            updateButtons();
        }

        function applySnapshot(snapshot) {
            const changedCells = [];
            for(let i=0; i<gridMap.length; i++) {
                const cell = gridMap[i];
                if (cell && snapshot[i] !== -1 && cell.blockRef.state.value !== snapshot[i]) {
                    const supportChange = supportChangeRecordForCell(cell);
                    cell.blockRef.state.value = snapshot[i];
                    updateCellMetadata(cell);
                    changedCells.push(supportChange);
                }
            }
            if (changedCells.length > 0) syncSupportsForCells(changedCells);
            renderFullCanvas();
        }

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (undoStack.length === 0) return;
            const currentState = new Int32Array(gridMap.length);
            for(let i=0; i<gridMap.length; i++) currentState[i] = gridMap[i] ? gridMap[i].blockRef.state.value : -1;
            redoStack.push(currentState);
            
            const previousState = undoStack.pop();
            applySnapshot(previousState);
            updateButtons();
        });

        document.getElementById('redoBtn').addEventListener('click', () => {
            if (redoStack.length === 0) return;
            const currentState = new Int32Array(gridMap.length);
            for(let i=0; i<gridMap.length; i++) currentState[i] = gridMap[i] ? gridMap[i].blockRef.state.value : -1;
            undoStack.push(currentState);
            
            const nextState = redoStack.pop();
            applySnapshot(nextState);
            updateButtons();
        });

        function updateButtons() {
            document.getElementById('undoBtn').disabled = undoStack.length === 0;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        function getMouseCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = mapWidth / rect.width;
            const scaleY = mapHeight / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const z = Math.floor((e.clientY - rect.top) * scaleY);
            return {x, z};
        }

        // --- MOUSE EVENTS ---
        canvasContainer.addEventListener('contextmenu', e => e.preventDefault());

        canvasContainer.addEventListener('mouseleave', () => {
            if (previewCtx && mapWidth > 0) previewCtx.clearRect(0, 0, mapWidth, mapHeight);
        });

        canvasContainer.addEventListener('mousedown', (e) => { 
            if (loadedFiles.length === 0) return;
            
            if (e.button === 0) { 
                saveCurrentStateToUndo(); 
                isDrawing = true; 
                hasDrawnInCurrentStroke = false;
                
                const {x, z} = getMouseCoords(e);
                
                if (activeTool === 'line') {
                    lineStartX = x;
                    lineStartZ = z;
                } else {
                    if (applyBrush(x, z, true)) {
                        hasDrawnInCurrentStroke = true;
                    }
                }
                lastMouseX = x;
                lastMouseZ = z;
                updateCursorPreview(x, z);
            } 
            else if (e.button === 2) { 
                isPanning = true;
                startPanX = e.clientX;
                startPanY = e.clientY;
                startScrollLeft = canvasContainer.scrollLeft;
                startScrollTop = canvasContainer.scrollTop;
                document.body.style.cursor = 'grab';
                updateCursorPreview(-1, -1); 
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            const {x, z} = getMouseCoords(e);

            if (isDrawing) {
                if (activeTool === 'line') {
                    // Line preview layer handles visuals
                } else {
                    if (x !== lastMouseX || z !== lastMouseZ) {
                        if (drawLine(lastMouseX, lastMouseZ, x, z, true)) {
                            hasDrawnInCurrentStroke = true;
                        }
                    }
                }
            } else if (isPanning) {
                const dx = e.clientX - startPanX;
                const dy = e.clientY - startPanY;
                canvasContainer.scrollLeft = startScrollLeft - dx;
                canvasContainer.scrollTop = startScrollTop - dy;
            }
            
            lastMouseX = x;
            lastMouseZ = z;
            if (!isPanning) updateCursorPreview(x, z);
        });
        
        window.addEventListener('mouseup', (e) => { 
            if (isDrawing) {
                if (activeTool === 'line') {
                    const {x, z} = getMouseCoords(e);
                    if (drawLine(lineStartX, lineStartZ, x, z, true)) {
                        hasDrawnInCurrentStroke = true;
                    }
                }

                if (!hasDrawnInCurrentStroke) {
                    undoStack.pop();
                    updateButtons();
                }
            }

            isDrawing = false; 
            isPanning = false;
            document.body.style.cursor = 'default';
            
            const {x, z} = getMouseCoords(e);
            updateCursorPreview(x, z);
        });

        function applyZoom() {
            const w = Math.floor(mapWidth * currentScale) + 'px';
            const h = Math.floor(mapHeight * currentScale) + 'px';
            canvas.style.width = w; canvas.style.height = h;
            previewCanvas.style.width = w; previewCanvas.style.height = h;
        }

        canvasContainer.addEventListener('wheel', function(e) {
            if (loadedFiles.length === 0) return;
            e.preventDefault(); 
            
            const rectBefore = canvas.getBoundingClientRect();
            const containerRectBefore = canvasContainer.getBoundingClientRect();
            const mouseContentX = e.clientX - containerRectBefore.left - canvasContainer.clientLeft;
            const mouseContentY = e.clientY - containerRectBefore.top - canvasContainer.clientTop;
            const renderedScaleX = rectBefore.width / mapWidth;
            const renderedScaleY = rectBefore.height / mapHeight;
            const mapXUnderMouse = (e.clientX - rectBefore.left) / renderedScaleX;
            const mapZUnderMouse = (e.clientY - rectBefore.top) / renderedScaleY;

            const zoomSpeed = 0.15;
            let direction = e.deltaY > 0 ? -1 : 1;
            
            currentScale += direction * zoomSpeed * currentScale; 
            if (currentScale < 0.5) currentScale = 0.5;
            if (currentScale > 30) currentScale = 30;
            
            applyZoom();

            const rectAfter = canvas.getBoundingClientRect();
            const containerRectAfter = canvasContainer.getBoundingClientRect();
            const canvasContentLeft = rectAfter.left - containerRectAfter.left - canvasContainer.clientLeft + canvasContainer.scrollLeft;
            const canvasContentTop = rectAfter.top - containerRectAfter.top - canvasContainer.clientTop + canvasContainer.scrollTop;
            const newRenderedScaleX = rectAfter.width / mapWidth;
            const newRenderedScaleY = rectAfter.height / mapHeight;
            const maxScrollLeft = Math.max(0, canvasContainer.scrollWidth - canvasContainer.clientWidth);
            const maxScrollTop = Math.max(0, canvasContainer.scrollHeight - canvasContainer.clientHeight);
            canvasContainer.scrollLeft = Math.max(0, Math.min(maxScrollLeft, canvasContentLeft + mapXUnderMouse * newRenderedScaleX - mouseContentX));
            canvasContainer.scrollTop = Math.max(0, Math.min(maxScrollTop, canvasContentTop + mapZUnderMouse * newRenderedScaleY - mouseContentY));
            
            const {x, z} = getMouseCoords(e);
            updateCursorPreview(x, z);
            
        }, { passive: false });

        // --- AUTO-DETECT EXPORT LOGIC ---
        function downloadBlob(dataArray, fileName) {
            const blob = new Blob([dataArray], { type: "application/octet-stream" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link); 
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }

        function downloadText(text, fileName) {
            const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }

        function saveCurrentProfile() {
            downloadText(currentPaletteProfileText(), `${originalFileName || "nbt_mapart"}_profile.txt`);
            setPaletteStatus("Saved palette profile from current dropdown selections.");
        }

        function paletteEntryOrAir(lf, state) {
            return lf.structurePalette[state] || { Name: nbtStringTag("Name", "minecraft:air") };
        }

        function nooblineBlocksForFile(lf) {
            if (!lf || lf.nooblineZ === null) return [];
            return lf.blocksList.filter(block => isNooblineBlock(lf, block));
        }

        function nooblineFallbackForFile(lf) {
            if (!lf || lf.nooblineZ === null) return null;

            const nooblineBlock = nooblineBlocksForFile(lf)[0];
            if (nooblineBlock) {
                return {
                    file: lf,
                    state: nooblineBlock.state.value,
                    y: nooblineBlock.pos.value.list[1]
                };
            }

            return {
                file: lf,
                state: ensurePaletteState(lf, SUPPORT_BLOCK_OPTIONS[0]),
                y: lf.layerY
            };
        }

        function nooblineFallbackForFiles(files) {
            for (const lf of files) {
                const fallback = nooblineFallbackForFile(lf);
                if (fallback) return fallback;
            }
            return null;
        }

        function combinedNooblineBlocks(minGridX, minGridZ, width) {
            const frontFiles = loadedFiles.filter(lf => lf.nooblineZ !== null && lf.gridZ === minGridZ);
            const fallback = nooblineFallbackForFiles(frontFiles.length > 0 ? frontFiles : loadedFiles);
            if (!fallback) return [];

            const nooblineBlocks = [];
            const usedX = new Set();

            for (const lf of frontFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                for (const block of nooblineBlocksForFile(lf)) {
                    const pos = block.pos.value.list;
                    const x = offsetX + pos[0] - lf.minX;
                    if (x < 0 || x >= width || usedX.has(x)) continue;

                    nooblineBlocks.push({
                        x,
                        y: pos[1],
                        z: -1,
                        state: block.state.value,
                        file: lf
                    });
                    usedX.add(x);
                }
            }

            for (let x = 0; x < width; x++) {
                if (usedX.has(x)) continue;
                nooblineBlocks.push({
                    x,
                    y: fallback.y,
                    z: -1,
                    state: fallback.state,
                    file: fallback.file
                });
            }

            return nooblineBlocks;
        }

        function nooblineBlocksForChunk(lf, cX, cZ, chunkW, chunkH) {
            const fallback = nooblineFallbackForFile(lf);
            if (!fallback) return [];

            const chunkBlocks = [];
            const usedX = new Set();
            const chunkStartX = cX * chunkW;

            if (cZ === 0) {
                for (const block of nooblineBlocksForFile(lf)) {
                    const pos = block.pos.value.list;
                    const globalX = pos[0] - lf.minX;
                    const normX = globalX - chunkStartX;
                    if (normX < 0 || normX >= chunkW || usedX.has(normX)) continue;

                    chunkBlocks.push({
                        normX,
                        rawY: pos[1],
                        normZ: -1,
                        state: block.state.value,
                        file: lf
                    });
                    usedX.add(normX);
                }
            } else {
                const previousGlobalZ = cZ * chunkH - 1;
                for (let x = 0; x < chunkW; x++) {
                    const globalX = chunkStartX + x;
                    const cell = globalX >= 0 && globalX < mapWidth && previousGlobalZ >= 0 && previousGlobalZ < mapHeight
                        ? gridMap[previousGlobalZ * mapWidth + globalX]
                        : null;
                    chunkBlocks.push({
                        normX: x,
                        rawY: cell ? cell.rawY : fallback.y,
                        normZ: -1,
                        state: fallback.state,
                        file: fallback.file
                    });
                    usedX.add(x);
                }
            }

            for (let x = 0; x < chunkW; x++) {
                if (usedX.has(x)) continue;
                chunkBlocks.push({
                    normX: x,
                    rawY: fallback.y,
                    normZ: -1,
                    state: fallback.state,
                    file: fallback.file
                });
            }

            return chunkBlocks;
        }

        function createCombinedNbtRoot() {
            if (loadedFiles.length === 0) throw new Error("Upload files first.");

            const minGridX = Math.min(...loadedFiles.map(lf => lf.gridX));
            const minGridZ = Math.min(...loadedFiles.map(lf => lf.gridZ));
            const sourceBlocks = [];

            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;

                for (const block of lf.blocksList) {
                    if (isNooblineBlock(lf, block)) continue;

                    const pos = block.pos.value.list;
                    const globalX = offsetX + pos[0] - lf.minX;
                    const globalZ = offsetZ + pos[2] - lf.minZ;
                    let finalState = block.state.value;

                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                        const cell = gridMap[globalZ * mapWidth + globalX];
                        if (cell && cell.blockRef === block) {
                            finalState = cell.blockRef.state.value;
                        }
                    }

                    sourceBlocks.push({
                        x: globalX,
                        y: pos[1],
                        z: globalZ,
                        state: finalState,
                        file: lf
                    });
                }
            }

            if (sourceBlocks.length === 0) throw new Error("No blocks available to export.");

            const maxSourceX = sourceBlocks.reduce((max, block) => Math.max(max, block.x), -1);
            const nooblineWidth = Math.max(mapWidth, maxSourceX + 1);
            sourceBlocks.push(...combinedNooblineBlocks(minGridX, minGridZ, nooblineWidth));

            let minX = Infinity, minY = Infinity, minZ = Infinity;
            let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
            for (const block of sourceBlocks) {
                if (block.x < minX) minX = block.x;
                if (block.y < minY) minY = block.y;
                if (block.z < minZ) minZ = block.z;
                if (block.x > maxX) maxX = block.x;
                if (block.y > maxY) maxY = block.y;
                if (block.z > maxZ) maxZ = block.z;
            }

            const unifiedPalette = [];
            const paletteMap = new Map();
            const finalNbtBlocks = [];

            for (const block of sourceBlocks) {
                const paletteEntry = paletteEntryOrAir(block.file, block.state);
                const blockKey = paletteEntryKey(paletteEntry);

                if (!paletteMap.has(blockKey)) {
                    paletteMap.set(blockKey, unifiedPalette.length);
                    unifiedPalette.push(paletteEntry);
                }

                finalNbtBlocks.push({
                    pos: { type: 9, name: "pos", value: { type: 3, list: [block.x - minX, block.y - minY, block.z - minZ] } },
                    state: { type: 3, name: "state", value: paletteMap.get(blockKey) }
                });
            }

            const firstFile = loadedFiles[0];
            return {
                type: 10, name: "", value: {
                    DataVersion: { type: 3, name: "DataVersion", value: firstFile.nbtRoot.value.DataVersion ? firstFile.nbtRoot.value.DataVersion.value : 2586 },
                    size: { type: 9, name: "size", value: { type: 3, list: [maxX - minX + 1, maxY - minY + 1, maxZ - minZ + 1] } },
                    palette: { type: 9, name: "palette", value: { type: 10, list: unifiedPalette } },
                    blocks: { type: 9, name: "blocks", value: { type: 10, list: finalNbtBlocks } },
                    entities: { type: 9, name: "entities", value: { type: 10, list: [] } }
                }
            };
        }

        function downloadCombinedNbt() {
            if (loadedFiles.length === 0) { alert("Upload files first."); return; }

            const button = document.getElementById('saveSingleBtn');
            const originalText = button.innerText;
            button.innerText = "Building NBT...";

            try {
                const writer = new NBTWriter();
                writer.writeTag(createCombinedNbtRoot());
                downloadBlob(pako.gzip(writer.getOutput()), `${originalFileName || "mapart"}_combined.nbt`);
            } catch (error) {
                alert("Failed to export single NBT: " + error.message);
            }

            button.innerText = originalText;
        }

        async function processExports(asZip) {
            if (loadedFiles.length === 0) { alert("Upload files first."); return; }
            
            const btnId = asZip ? 'saveZipBtn' : 'saveIndivBtn';
            const originalText = document.getElementById(btnId).innerText;
            document.getElementById(btnId).innerText = asZip ? "Compressing ZIP..." : "Downloading...";
            
            try {
                const zip = new JSZip();
                const needsSplit = loadedFiles.length === 1 && (mapWidth > 128 || mapHeight > 128);
                let filesToExport = []; 
                
                if (needsSplit) {
                    const chunkW = 128;
                    const chunkH = 128;
                    const lf = loadedFiles[0];
                    let maxExportGlobalX = mapWidth - 1;
                    let maxExportGlobalZ = mapHeight - 1;
                    for (const b of lf.blocksList) {
                        if (isNooblineBlock(lf, b)) continue;
                        const globalX = b.pos.value.list[0] - lf.minX;
                        const globalZ = b.pos.value.list[2] - lf.minZ;
                        if (globalX > maxExportGlobalX) maxExportGlobalX = globalX;
                        if (globalZ > maxExportGlobalZ) maxExportGlobalZ = globalZ;
                    }
                    const cols = Math.ceil((maxExportGlobalX + 1) / chunkW);
                    const rows = Math.ceil((maxExportGlobalZ + 1) / chunkH);

                    for (let cZ = 0; cZ < rows; cZ++) {
                        for (let cX = 0; cX < cols; cX++) {
                            let chunkBlocks = [];
                            let cMinX = Infinity, cMinY = Infinity, cMinZ = Infinity;
                            let cMaxX = -Infinity, cMaxY = -Infinity, cMaxZ = -Infinity;

                            for (const b of lf.blocksList) {
                                if (isNooblineBlock(lf, b)) continue;
                                const rawX = b.pos.value.list[0];
                                const rawY = b.pos.value.list[1];
                                const rawZ = b.pos.value.list[2];
                                
                                const globalX = rawX - lf.minX;
                                const globalZ = rawZ - lf.minZ;
                                
                                const targetCX = Math.max(0, Math.min(cols - 1, Math.floor(globalX / chunkW)));
                                const targetCZ = Math.max(0, Math.min(rows - 1, Math.floor(globalZ / chunkH)));

                                if (targetCX === cX && targetCZ === cZ) {
                                    let finalState = b.state.value;
                                    
                                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                                        const cell = gridMap[globalZ * mapWidth + globalX];
                                        if (cell && cell.blockRef === b) {
                                            finalState = cell.blockRef.state.value;
                                        }
                                    }

                                    if (rawX < cMinX) cMinX = rawX;
                                    if (rawX > cMaxX) cMaxX = rawX;
                                    if (rawY < cMinY) cMinY = rawY;
                                    if (rawY > cMaxY) cMaxY = rawY;
                                    if (rawZ < cMinZ) cMinZ = rawZ;
                                    if (rawZ > cMaxZ) cMaxZ = rawZ;

                                    const normX = globalX - (cX * chunkW);
                                    const normZ = globalZ - (cZ * chunkH);

                                    chunkBlocks.push({ normX, rawY, normZ, state: finalState, file: lf });
                                }
                            }

                            if (chunkBlocks.length === 0) continue;

                            for (const nooblineBlock of nooblineBlocksForChunk(lf, cX, cZ, chunkW, chunkH)) {
                                chunkBlocks.push(nooblineBlock);
                                if (nooblineBlock.rawY < cMinY) cMinY = nooblineBlock.rawY;
                                if (nooblineBlock.rawY > cMaxY) cMaxY = nooblineBlock.rawY;
                            }

                            const unifiedPalette = [];
                            const paletteMap = new Map();
                            const finalNbtBlocks = [];
                            let cMinNormZ = Infinity;
                            let cMaxNormZ = -Infinity;

                            for (const cb of chunkBlocks) {
                                if (cb.normZ < cMinNormZ) cMinNormZ = cb.normZ;
                                if (cb.normZ > cMaxNormZ) cMaxNormZ = cb.normZ;
                            }

                            for (const cb of chunkBlocks) {
                                const origPaletteTag = paletteEntryOrAir(cb.file, cb.state);
                                const blockKey = paletteEntryKey(origPaletteTag);
                                
                                if (!paletteMap.has(blockKey)) {
                                    paletteMap.set(blockKey, unifiedPalette.length);
                                    unifiedPalette.push(origPaletteTag);
                                }
                                const newId = paletteMap.get(blockKey);

                                finalNbtBlocks.push({
                                    pos: { type: 9, name: "pos", value: { type: 3, list: [cb.normX, cb.rawY - cMinY, cb.normZ - cMinNormZ] } },
                                    state: { type: 3, name: "state", value: newId }
                                });
                            }

                            const chunkNbtRoot = {
                                type: 10, name: "", value: {
                                    DataVersion: { type: 3, name: "DataVersion", value: lf.nbtRoot.value.DataVersion ? lf.nbtRoot.value.DataVersion.value : 2586 },
                                    size: { type: 9, name: "size", value: { type: 3, list: [128, cMaxY - cMinY + 1, cMaxNormZ - cMinNormZ + 1] } },
                                    palette: { type: 9, name: "palette", value: { type: 10, list: unifiedPalette } },
                                    blocks: { type: 9, name: "blocks", value: { type: 10, list: finalNbtBlocks } },
                                    entities: { type: 9, name: "entities", value: { type: 10, list: [] } }
                                }
                            };

                            const writer = new NBTWriter();
                            writer.writeTag(chunkNbtRoot);
                            filesToExport.push({ name: `${originalFileName}_${cX}_${cZ}.nbt`, data: pako.gzip(writer.getOutput()) });
                        }
                    }
                } else {
                    for (let i = 0; i < loadedFiles.length; i++) {
                        const lf = loadedFiles[i];
                        updateStructureSize(lf);
                        const writer = new NBTWriter();
                        writer.writeTag(lf.nbtRoot);
                        filesToExport.push({ name: lf.name, data: pako.gzip(writer.getOutput()) });
                    }
                }
                
                if (asZip) {
                    for (const f of filesToExport) zip.file(f.name, f.data);
                    const content = await zip.generateAsync({type:"blob"});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(content);
                    link.download = needsSplit ? `${originalFileName}_split.zip` : `${originalFileName}_edited.zip`;
                    link.click();
                } else {
                    for (const f of filesToExport) {
                        downloadBlob(f.data, f.name);
                        await new Promise(resolve => setTimeout(resolve, 200));
                    }
                }
                
            } catch (error) {
                alert("Failed to export: " + error.message);
            }
            document.getElementById(btnId).innerText = originalText;
        }

        document.getElementById('saveProfileBtn').addEventListener('click', saveCurrentProfile);
        document.getElementById('saveZipBtn').addEventListener('click', () => processExports(true));
        document.getElementById('saveSingleBtn').addEventListener('click', downloadCombinedNbt);
        document.getElementById('saveIndivBtn').addEventListener('click', () => processExports(false));

    </script>
