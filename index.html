        function applyDefaultBlockSelections() {
            for (const color of MAP_COLOR_DATABASE) {
                selectedBlockByColorId[color.id] = color.blocks[0].key;
            }

            const selections = decodeMapartPreset(DEFAULT_MAPART_PRESET) || [];
            selections.forEach(selection => {
                const color = COLOR_BY_MAPART_ID.get(selection.mapartId);
                if (!color) return;
                const block = MAPART_BLOCK_BY_COLOR_AND_PRESET.get(`${selection.mapartId}:${selection.presetIndex}`);
                selectedBlockByColorId[color.id] = block ? block.key : color.blocks[0].key;
            });
        }

        function resetPaletteSelectionsToDefaults() {
            applyDefaultBlockSelections();
            shadingMode = "auto";
            selectedTone = "normal";
            paletteDropdownsLocked = false;
            resetHotbarSlots();
            document.getElementById('paletteProfileInput').value = "";
            setPaletteStatus("");
        }

        function applyImportedBlockSelections() {
            const countsByColor = new Map();

            for (const lf of loadedFiles) {
                for (const visible of lf.visibleBlocks) {
                    const info = visible.blockInfo;
                    if (!info || !info.color || !info.block) continue;

                    if (!countsByColor.has(info.color.id)) {
                        countsByColor.set(info.color.id, new Map());
                    }

                    const blockCounts = countsByColor.get(info.color.id);
                    blockCounts.set(info.block.key, (blockCounts.get(info.block.key) || 0) + 1);
                }
            }

            let updated = 0;
            countsByColor.forEach((blockCounts, colorId) => {
                let bestKey = null;
                let bestCount = 0;
                blockCounts.forEach((count, key) => {
                    if (count > bestCount) {
                        bestKey = key;
                        bestCount = count;
                    }
                });

                const color = COLORS_BY_ID.get(colorId);
                if (color && bestKey && color.blocks.some(block => block.key === bestKey)) {
                    selectedBlockByColorId[colorId] = bestKey;
                    updated++;
                }
            });

            return updated;
        }

        function readFileAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function readTextFileAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        function nbtStringTag(name, value) {
            return { type: 8, name, value };
        }

        function getPaletteEntryName(entry) {
            return entry && entry.Name ? entry.Name.value : "";
        }

        function getPaletteEntryProperties(entry) {
            const props = {};
            if (entry && entry.Properties && entry.Properties.value) {
                for (const key in entry.Properties.value) {
                    props[key] = String(entry.Properties.value[key].value);
                }
            }
            return props;
        }

        function paletteEntryKey(entry) {
            return stateKey(getPaletteEntryName(entry), getPaletteEntryProperties(entry));
        }

        function createPaletteEntry(block) {
            const entry = { Name: nbtStringTag("Name", block.name) };
            const propKeys = Object.keys(block.properties || {});
            if (propKeys.length > 0) {
                const propValue = {};
                propKeys.forEach(key => {
                    propValue[key] = nbtStringTag(key, String(block.properties[key]));
                });
                entry.Properties = { type: 10, name: "Properties", value: propValue };
            }
            return entry;
        }

        function ensurePaletteState(lf, block) {
            if (!lf.paletteKeyToIndex) lf.paletteKeyToIndex = new Map();
            const existing = lf.paletteKeyToIndex.get(block.key);
            if (existing !== undefined) return existing;

            const idx = lf.structurePalette.findIndex(entry => paletteEntryKey(entry) === block.key);
            if (idx !== -1) {
                lf.paletteKeyToIndex.set(block.key, idx);
                return idx;
            }

            lf.structurePalette.push(createPaletteEntry(block));
            const newIndex = lf.structurePalette.length - 1;
            lf.paletteKeyToIndex.set(block.key, newIndex);
            return newIndex;
        }

        function coordKey(x, y, z) {
            return `${x},${y},${z}`;
        }

        function rebuildBlockLookup(lf) {
            lf.blockLookup = new Map();
            for (const block of lf.blocksList) {
                const pos = block.pos.value.list;
                lf.blockLookup.set(coordKey(pos[0], pos[1], pos[2]), block);
            }
        }

        function removeBlockFromFile(lf, block) {
            const idx = lf.blocksList.indexOf(block);
            if (idx !== -1) lf.blocksList.splice(idx, 1);
            const pos = block.pos.value.list;
            lf.blockLookup.delete(coordKey(pos[0], pos[1], pos[2]));
        }

        function blockAt(lf, x, y, z) {
            return lf.blockLookup.get(coordKey(x, y, z));
        }

        function blockUsesOption(lf, block, option) {
            if (!block) return false;
            const paletteEntry = lf.structurePalette[block.state.value];
            return paletteEntry && paletteEntryKey(paletteEntry) === option.key;
        }

        function isSupportMaterialBlock(lf, block) {
            return blockUsesOption(lf, block, selectedSupportBlock);
        }

        function paletteInfoForState(lf, stateId) {
            const entry = lf.structurePalette[stateId];
            if (!entry) return null;
            return BLOCK_BY_KEY.get(paletteEntryKey(entry)) || null;
        }

        function updateCellMetadata(cell) {
            const info = paletteInfoForState(cell.file, cell.blockRef.state.value);
            if (info) {
                cell.colorId = info.color.id;
                cell.blockKey = info.block.key;
            }
            return info;
        }

        function buildPaletteKeyMap(structurePalette) {
            const map = new Map();
            structurePalette.forEach((entry, idx) => {
                map.set(paletteEntryKey(entry), idx);
            });
            return map;
        }

        function detectEditableLayer(structurePalette, blocksList) {
            const counts = new Map();
            for (const block of blocksList) {
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;
                const y = block.pos.value.list[1];
                counts.set(y, (counts.get(y) || 0) + 1);
            }

            let bestY = -1;
            let bestCount = 0;
            counts.forEach((count, y) => {
                if (count > bestCount || (count === bestCount && y > bestY)) {
                    bestY = y;
                    bestCount = count;
                }
            });
            return bestY;
        }

        function getStructureSize(nbtRoot) {
            return nbtRoot.value.size && nbtRoot.value.size.value ? nbtRoot.value.size.value.list : [];
        }

        function detectNooblineZ(nbtRoot, structurePalette, blocksList) {
            const size = getStructureSize(nbtRoot);
            const declaredZ = size[2] || 0;
            const zCounts = new Map();
            let minZ = Infinity;
            let maxZ = -Infinity;

            for (const block of blocksList) {
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;
                const z = block.pos.value.list[2];
                zCounts.set(z, (zCounts.get(z) || 0) + 1);
                if (z < minZ) minZ = z;
                if (z > maxZ) maxZ = z;
            }

            if (!Number.isFinite(minZ)) return null;

            // MapArtCraft schematic NBTs add a scaffold/noobline row before the 128 artwork rows.
            // For a normal 1x1 map that makes the structure 128x129, with artwork at z=1..128.
            const looksLikeMapartcraftDepth = declaredZ >= 129 || (maxZ - minZ + 1) > 128;
            return looksLikeMapartcraftDepth && zCounts.has(minZ) ? minZ : null;
        }

        function isNooblineBlock(lf, block) {
            return lf.nooblineZ !== null &&
                block.pos.value.list[2] === lf.nooblineZ;
        }

        function collectVisibleArtworkBlocks(structurePalette, blocksList, nooblineZ) {
            const visible = new Map();
            for (const block of blocksList) {
                const pos = block.pos.value.list;
                if (nooblineZ !== null && pos[2] === nooblineZ) continue;

                const entry = structurePalette[block.state.value];
                if (!entry) continue;

                const key = `${pos[0]},${pos[2]}`;
                const existing = visible.get(key);
                if (!existing || pos[1] > existing.block.pos.value.list[1]) {
                    visible.set(key, {
                        block,
                        blockInfo: BLOCK_BY_KEY.get(paletteEntryKey(entry)) || null
                    });
                }
            }
            return Array.from(visible.values()).filter(item => item.blockInfo);
        }

        function buildTopMapBlockByRawXZ(structurePalette, blocksList) {
            const columns = new Map();
            for (const block of blocksList) {
                const pos = block.pos.value.list;
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;

                const key = `${pos[0]},${pos[2]}`;
                const existing = columns.get(key);
                if (!existing || pos[1] > existing.y) {
                    columns.set(key, { y: pos[1], block });
                }
            }
            return columns;
        }

        function visibleBlocksAreStaircased(visibleBlocks) {
            if (visibleBlocks.length === 0) return false;
            const firstY = visibleBlocks[0].block.pos.value.list[1];
            return visibleBlocks.some(visible => visible.block.pos.value.list[1] !== firstY);
        }

        function inferSupportBlockFromLoadedFiles() {
            const counts = new Map();
            for (const lf of loadedFiles) {
                for (const cell of lf.editableCellsByLocal.values()) {
                    const support = blockAt(lf, cell.rawX, cell.rawY - 1, cell.rawZ);
                    if (!support) continue;
                    const entry = lf.structurePalette[support.state.value];
                    if (!entry) continue;
                    const key = paletteEntryKey(entry);
                    if (SUPPORT_BLOCK_OPTIONS.some(option => option.key !== NO_SUPPORT_BLOCK_KEY && option.key === key)) {
                        counts.set(key, (counts.get(key) || 0) + 1);
                    }
                }
            }

            let bestKey = null;
            let bestCount = 0;
            counts.forEach((count, key) => {
                if (count > bestCount) {
                    bestKey = key;
                    bestCount = count;
                }
            });

            selectedSupportBlock = SUPPORT_BLOCK_OPTIONS.find(option => option.key === bestKey) || DEFAULT_SUPPORT_BLOCK;
            renderSupportSelect();
        }

        function decodeMapartPreset(encodedPreset) {
            if (!encodedPreset || !/^[0-9a-zQ-ZA-P]+$/.test(encodedPreset)) return null;
            const selections = [];
            const presetRegex = /([0-9a-z]+)(?=([Q-ZA-P]+))/g;
            let match;
            const digitMap = { Q: "0", R: "1", S: "2", T: "3", U: "4", V: "5", W: "6", X: "7", Y: "8", Z: "9" };

            while ((match = presetRegex.exec(encodedPreset)) !== null) {
                const colorId = parseInt(match[1], 36);
                const encodedBlock = match[2]
                    .replace(/[Q-Z]/g, char => digitMap[char])
                    .toLowerCase();
                const presetIndex = parseInt(encodedBlock, 26);
                if (Number.isFinite(colorId) && Number.isFinite(presetIndex)) {
                    selections.push({ mapartId: colorId, presetIndex });
                }
            }
            return selections;
        }

        function encodeMapartPresetIndex(presetIndex) {
            const digitMap = ["Q", "R", "S", "T", "U", "V", "W", "X", "Y", "Z"];
            return Math.max(0, Number(presetIndex) || 0)
                .toString(26)
                .replace(/[0-9]/g, digit => digitMap[Number(digit)])
                .replace(/[a-p]/g, char => char.toUpperCase());
        }

        function encodeCurrentMapartPreset() {
            return MAP_COLOR_DATABASE
                .map(color => {
                    const block = selectedBlockForColor(color);
                    const presetIndex = block && block.mapartPresetIndex !== null ? block.mapartPresetIndex : 0;
                    return color.mapartId.toString(36) + encodeMapartPresetIndex(presetIndex);
                })
                .join("");
        }

        function currentPaletteProfileText() {
            const preset = encodeCurrentMapartPreset();
            const staircasingEnabled = paletteMode === "staircased";
            const lines = [
                "; paint.net Palette File",
                "; Generated by NBT Mapart Editor",
                `; Link to preset: https://mike2b2t.github.io/mapartcraft/?preset=${preset}`,
                `; staircasing: ${staircasingEnabled ? "enabled" : "disabled"}`,
                "; unobtainable colours: disabled",
                `; palette mode: ${paletteMode}`,
                ""
            ];

            for (const color of MAP_COLOR_DATABASE) {
                const block = selectedBlockForColor(color);
                lines.push(`; ${color.mapartId} ${color.label}: ${block ? block.displayName : "Default"}`);
            }

            lines.push("");
            if (staircasingEnabled) {
                for (const color of MAP_COLOR_DATABASE) {
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "dark")));
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "normal")));
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "light")));
                }
                lines.push("FF-64-64-64");
                lines.push("FF-64-64-64");
                lines.push("FF-64-64-64");
            } else {
                for (const color of MAP_COLOR_DATABASE) {
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "normal")));
                }
            }

            return lines.join("\n") + "\n";
        }

        function profileModeFromText(text) {
            const modeMatch = text.match(/;\s*palette mode:\s*(carpet|fullblock|staircased)/i);
            if (modeMatch) return modeMatch[1].toLowerCase();
            if (/;\s*staircasing:\s*enabled/i.test(text)) return "staircased";
            if (/;\s*staircasing:\s*disabled/i.test(text)) return "fullblock";
            return null;
        }

        function shouldApplyProfileMode(profileMode) {
            if (!profileMode || profileMode === paletteMode) return false;
            if (loadedFiles.length === 0) return true;
            if (profileMode === "staircased" && usesBlockPaletteMode()) return true;
            return profileMode === "carpet" && paletteMode === "carpet";
        }

        function importPaletteProfileText(text) {
            const presetMatch = text.match(/[?&]preset=([0-9a-zQ-ZA-P]+)/) || text.match(/preset\s*[:=]\s*([0-9a-zQ-ZA-P]+)/i);
            if (!presetMatch) {
                setPaletteStatus("No MapArtCraft preset link found in palette file.");
                return;
            }

            const selections = decodeMapartPreset(presetMatch[1]);
            if (!selections) {
                setPaletteStatus("Could not decode the MapArtCraft preset.");
                return;
            }

            let applied = 0;
            let fallback = 0;
            let skipped = 0;
            selections.forEach(selection => {
                const color = COLOR_BY_MAPART_ID.get(selection.mapartId);
                if (!color) {
                    skipped++;
                    return;
                }

                const block = MAPART_BLOCK_BY_COLOR_AND_PRESET.get(`${selection.mapartId}:${selection.presetIndex}`);
                if (block) {
                    selectedBlockByColorId[color.id] = block.key;
                    applied++;
                } else {
                    selectedBlockByColorId[color.id] = color.blocks[0].key;
                    fallback++;
                }
            });

            const profileMode = profileModeFromText(text);
            if (shouldApplyProfileMode(profileMode)) {
                setPaletteMode(profileMode, "", false);
            } else {
                renderPaletteRows();
            }
            updateCursorPreview(lastMouseX, lastMouseZ);
            const modeNote = profileMode ? ` Mode: ${profileMode}.` : "";
            setPaletteStatus(`Imported profile: ${applied} matched, ${fallback} fallback, ${skipped} skipped.${modeNote}`);
        }

        document.getElementById('paletteProfileInput').addEventListener('change', async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            try {
                importPaletteProfileText(await readTextFileAsync(file));
            } catch (error) {
                setPaletteStatus("Failed to import palette profile.");
                console.error(error);
            }
        });

        // --- 3. MULTI-FILE PARSER AND STITCHER ---
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            originalFileName = files[0].name.replace('.nbt', '').replace(/_[0-9\-]+_[0-9\-]+$/, '');
            document.getElementById('saveZipBtn').innerText = "Processing...";
            resetPaletteSelectionsToDefaults();
            loadedFiles = [];
            updateColorPickerButtonState();
            mapWidth = 0;
            mapHeight = 0;
            gridMap = [];
            
            let minGridX = Infinity, maxGridX = -Infinity;
            let minGridZ = Infinity, maxGridZ = -Infinity;

            for (const file of files) {
                try {
                    const dataBuffer = await readFileAsync(file);
                    let data = new Uint8Array(dataBuffer);
                    try { data = pako.ungzip(data); } catch (err) {}
                    
                    const parser = new NBTParser(data);
                    const nbtRoot = parser.readTag();

                    if (!nbtRoot || !nbtRoot.value.size || !nbtRoot.value.blocks) {
                        console.warn(`Skipping ${file.name}: Not a valid structure.`);
                        continue;
                    }

                    let structurePalette;
                    if (nbtRoot.value.palette) {
                        structurePalette = nbtRoot.value.palette.value.list;
                    } else if (nbtRoot.value.palettes) {
                        structurePalette = nbtRoot.value.palettes.value.list[0].list; 
                    } else {
                        console.warn(`Skipping ${file.name}: No palette found.`);
                        continue;
                    }

                    const blocksList = nbtRoot.value.blocks.value.list;
                    const editableLayerY = detectEditableLayer(structurePalette, blocksList);
                    if (editableLayerY === -1) {
                        console.warn(`Skipping ${file.name}: No known map-color blocks found.`);
                        continue;
                    }
                    const nooblineZ = detectNooblineZ(nbtRoot, structurePalette, blocksList);
                    const visibleBlocks = collectVisibleArtworkBlocks(structurePalette, blocksList, nooblineZ);
                    const topMapBlockByRawXZ = buildTopMapBlockByRawXZ(structurePalette, blocksList);

                    let fMinX = Infinity, fMinZ = Infinity;
                    
                    for (const visible of visibleBlocks) {
                        const px = visible.block.pos.value.list[0];
                        const pz = visible.block.pos.value.list[2];
                        if (px < fMinX) fMinX = px;
                        if (pz < fMinZ) fMinZ = pz;
                    }

                    if (!Number.isFinite(fMinX) || !Number.isFinite(fMinZ)) {
                        console.warn(`Skipping ${file.name}: No editable blocks found on detected layer.`);
                        continue;
                    }

                    let gX = 0, gZ = 0;
                    const match = file.name.match(/_([0-9\-]+)_([0-9\-]+)\.nbt$/);
                    if (match) {
                        gX = parseInt(match[1]);
                        gZ = parseInt(match[2]);
                    }

                    if (gX < minGridX) minGridX = gX;
                    if (gX > maxGridX) maxGridX = gX;
                    if (gZ < minGridZ) minGridZ = gZ;
                    if (gZ > maxGridZ) maxGridZ = gZ;

                    const loadedFile = {
                        name: file.name,
                        nbtRoot: nbtRoot,
                        blocksList: blocksList,
                        structurePalette: structurePalette,
                        paletteKeyToIndex: buildPaletteKeyMap(structurePalette),
                        layerY: editableLayerY,
                        nooblineZ: nooblineZ,
                        minX: fMinX,
                        minZ: fMinZ,
                        gridX: gX,
                        gridZ: gZ,
                        visibleBlocks: visibleBlocks,
                        topMapBlockByRawXZ: topMapBlockByRawXZ,
                        staircased: visibleBlocksAreStaircased(visibleBlocks),
                        editableCellsByLocal: new Map(),
                        supportCreatedKeys: new Set()
                    };
                    rebuildBlockLookup(loadedFile);
                    loadedFiles.push(loadedFile);

                } catch (error) {
                    console.error(`Error loading ${file.name}:`, error);
                }
            }

            if (loadedFiles.length === 0) {
                alert("No valid map files could be loaded.");
                document.getElementById('saveZipBtn').innerText = "Download as ZIP Folder";
                return;
            }

            const carpetOnlyImport = loadedFiles.every(lf =>
                lf.visibleBlocks.length > 0 &&
                lf.visibleBlocks.every(visible => isCarpetBlockOption(visible.blockInfo.block))
            );
            const staircasedImport = !carpetOnlyImport && loadedFiles.some(lf => lf.staircased);
            const importedMode = carpetOnlyImport ? "carpet" : (staircasedImport ? "staircased" : "fullblock");
            const importedSelections = carpetOnlyImport ? 0 : applyImportedBlockSelections();
            setPaletteMode(
                importedMode,
                carpetOnlyImport
                    ? "Carpet-only NBT detected. Switched to the carpet palette."
                    : staircasedImport
                        ? `Staircased full-block NBT detected. Preserving block heights and matched ${importedSelections} dropdowns from imported blocks.`
                        : `Flat full-block or mixed NBT detected. Matched ${importedSelections} dropdowns from imported blocks.`,
                false
            );

            // Calculate exact total size based on the furthest global block mapped
            let maxGlobalXNeeded = 0;
            let maxGlobalZNeeded = 0;
            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;
                for (const visible of lf.visibleBlocks) {
                    const b = visible.block;
                    const localX = b.pos.value.list[0] - lf.minX;
                    const localZ = b.pos.value.list[2] - lf.minZ;
                    const globalX = offsetX + localX;
                    const globalZ = offsetZ + localZ;
                    if (globalX > maxGlobalXNeeded) maxGlobalXNeeded = globalX;
                    if (globalZ > maxGlobalZNeeded) maxGlobalZNeeded = globalZ;
                }
            }

            mapWidth = maxGlobalXNeeded + 1;
            mapHeight = maxGlobalZNeeded + 1;
            gridMap = new Array(mapWidth * mapHeight).fill(null);

            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;

                for (const visible of lf.visibleBlocks) {
                    const b = visible.block;
                    const blockInfo = visible.blockInfo;
                    const localX = b.pos.value.list[0] - lf.minX;
                    const localZ = b.pos.value.list[2] - lf.minZ;
                    const globalX = offsetX + localX;
                    const globalZ = offsetZ + localZ;
                    
                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                        const cell = {
                            blockRef: b,
                            file: lf,
                            rawX: b.pos.value.list[0],
                            rawY: b.pos.value.list[1],
                            rawZ: b.pos.value.list[2],
                            localX,
                            localZ,
                            globalX,
                            globalZ,
                            colorId: blockInfo.color.id,
                            blockKey: blockInfo.block.key
                        };
                        gridMap[globalZ * mapWidth + globalX] = cell;
                        lf.editableCellsByLocal.set(`${localX},${localZ}`, cell);
                    }
                }
            }

            if (usesBlockPaletteMode()) {
                inferSupportBlockFromLoadedFiles();
            } else {
                renderSupportSelect();
            }

            canvas.width = mapWidth;
            canvas.height = mapHeight;
            previewCanvas.width = mapWidth;
            previewCanvas.height = mapHeight;

            currentScale = Math.min(4, 512 / Math.max(mapWidth, mapHeight));
            applyZoom();

            canvasContainer.scrollLeft = (canvas.offsetWidth - canvasContainer.offsetWidth) / 2;
            canvasContainer.scrollTop = (canvas.offsetHeight - canvasContainer.offsetHeight) / 2;
            
            undoStack = [];
            redoStack = [];
            resetEditorLayers();
            updateButtons();
            renderFullCanvas();
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);

            document.getElementById('saveZipBtn').innerText = "Download as ZIP Folder";
        });

        // --- SUPPORT BLOCKS ---
        function cellByLocal(lf, localX, localZ) {
            return lf.editableCellsByLocal.get(`${localX},${localZ}`);
        }

        function isEditableArtworkBlock(lf, block) {
            if (!block) return false;
            const pos = block.pos.value.list;
            const cell = cellByLocal(lf, pos[0] - lf.minX, pos[2] - lf.minZ);
            return !!(cell && cell.blockRef === block);
        }

        function cellNeedsSupport(cell) {
            if (!usesBlockPaletteMode()) return false;
            const info = updateCellMetadata(cell);
            return !!(info && info.block.supportRequired);
        }

        function directSupportPositionsForCell(cell) {
            const y = cell.rawY - 1;
            if (y < 0) return [];

            const pos = { x: cell.rawX, y, z: cell.rawZ };
            return pos.z === cell.file.nooblineZ ? [] : [pos];
        }

        function optimizedSupportPositionsForCell(cell) {
            const y = cell.rawY - 1;
            if (y < 0) return [];

            return [
                { x: cell.rawX, y, z: cell.rawZ },
                { x: cell.rawX, y, z: cell.rawZ + 1 }
            ].concat(cell.rawZ > 0 ? [{ x: cell.rawX, y, z: cell.rawZ - 1 }] : [])
             .filter(pos => pos.z !== cell.file.nooblineZ);
        }

        function supportPositionsForCell(cell) {
            return paletteMode === "staircased"
                ? directSupportPositionsForCell(cell)
                : optimizedSupportPositionsForCell(cell);
        }

        function supportChangeRecordForCell(cell) {
            return {
                cell,
                previousSupportPositions: cellNeedsSupport(cell) ? supportPositionsForCell(cell) : []
            };
        }

        function normalizeSupportChangeRecords(changedItems) {
            return changedItems
                .map(item => item && item.cell ? item : { cell: item, previousSupportPositions: [] })
                .filter(record => record.cell);
        }

        function createSupportBlockAt(lf, pos) {
            if (!supportGenerationEnabled()) return;
            if (pos.y < 0 || blockAt(lf, pos.x, pos.y, pos.z)) return;
            const state = ensurePaletteState(lf, selectedSupportBlock);
            const supportBlock = {
                pos: { type: 9, name: "pos", value: { type: 3, list: [pos.x, pos.y, pos.z] } },
                state: { type: 3, name: "state", value: state }
            };
            lf.blocksList.push(supportBlock);
            const key = coordKey(pos.x, pos.y, pos.z);
            lf.blockLookup.set(key, supportBlock);
            lf.supportCreatedKeys.add(key);
        }

        function syncSupportsForCells(changedCells) {
            if (!usesBlockPaletteMode()) return;

            const byFile = new Map();
            for (const record of normalizeSupportChangeRecords(changedCells)) {
                const cell = record.cell;
                if (!byFile.has(cell.file)) byFile.set(cell.file, []);
                byFile.get(cell.file).push(record);
            }

            byFile.forEach((records, lf) => {
                const affectedCells = new Map();
                const expired = new Map();

                for (const record of records) {
                    const cell = record.cell;
                    for (const pos of record.previousSupportPositions || []) {
                        expired.set(coordKey(pos.x, pos.y, pos.z), pos);
                    }

                    for (let dz = -2; dz <= 2; dz++) {
                        const neighbor = cellByLocal(lf, cell.localX, cell.localZ + dz);
                        if (neighbor) affectedCells.set(`${neighbor.localX},${neighbor.localZ}`, neighbor);
                    }
                }

                const desired = new Map();
                if (supportGenerationEnabled()) {
                    affectedCells.forEach(cell => {
                        const positions = supportPositionsForCell(cell);
                        if (cellNeedsSupport(cell)) {
                            positions.forEach(pos => desired.set(coordKey(pos.x, pos.y, pos.z), pos));
                        }
                    });
                }

                expired.forEach((pos, key) => {
                    if (desired.has(key)) return;
                    const existing = blockAt(lf, pos.x, pos.y, pos.z);
                    if (existing && !isEditableArtworkBlock(lf, existing) && lf.supportCreatedKeys.has(key)) {
                        removeBlockFromFile(lf, existing);
                        lf.supportCreatedKeys.delete(key);
                    }
                });

                desired.forEach(pos => {
                    const existing = blockAt(lf, pos.x, pos.y, pos.z);
                    if (!existing) {
                        createSupportBlockAt(lf, pos);
                    }
                });
            });
        }

        function rebuildAllSupports() {
            if (loadedFiles.length === 0 || !usesBlockPaletteMode()) return;
            for (const lf of loadedFiles) {
                for (const key of Array.from(lf.supportCreatedKeys)) {
                    const existing = lf.blockLookup.get(key);
                    if (existing) removeBlockFromFile(lf, existing);
                    lf.supportCreatedKeys.delete(key);
                }
            }
            if (!supportGenerationEnabled()) return;
            syncSupportsForCells(gridMap.filter(Boolean));
        }

        function updateStructureSize(lf) {
            if (!lf.nbtRoot.value.size || !lf.nbtRoot.value.size.value || !lf.nbtRoot.value.size.value.list) return;
            let maxX = 0, maxY = 0, maxZ = 0;
            for (const block of lf.blocksList) {
                const pos = block.pos.value.list;
                if (pos[0] > maxX) maxX = pos[0];
                if (pos[1] > maxY) maxY = pos[1];
                if (pos[2] > maxZ) maxZ = pos[2];
            }
            lf.nbtRoot.value.size.value.list = [maxX + 1, maxY + 1, maxZ + 1];
        }

        // --- DRAWING AND RENDERING ---
        function previousStaircaseY(cell) {
            const previousGlobalZ = cell.globalZ - 1;
            if (previousGlobalZ >= 0) {
                const previousCell = gridMap[previousGlobalZ * mapWidth + cell.globalX];
                if (previousCell) return previousCell.rawY;
            }

            const previousColumn = cell.file.topMapBlockByRawXZ
                ? cell.file.topMapBlockByRawXZ.get(`${cell.rawX},${cell.rawZ - 1}`)
                : null;
            return previousColumn ? previousColumn.y : null;
        }

        function staircasedToneForCell(cell) {
            if (paletteMode !== "staircased") return "normal";

            const previousY = previousStaircaseY(cell);
            if (previousY === null) return "normal";
            if (cell.rawY > previousY) return "light";
            if (cell.rawY < previousY) return "dark";
            return "normal";
        }

        function rgbForCellColor(cell, color) {
            return rgbForMapTone(color, staircasedToneForCell(cell));
        }

        function rgbToCss(rgb) {
            return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
        }

        function toneDelta(tone) {
            if (tone === "light") return 1;
            if (tone === "dark") return -1;
            return 0;
        }

        function collectColumnCells(globalX) {
            const cells = [];
            if (globalX < 0 || globalX >= mapWidth) return cells;
            for (let z = 0; z < mapHeight; z++) {
                const cell = gridMap[z * mapWidth + globalX];
                if (cell) cells.push(cell);
            }
            return cells;
        }

        function setCellY(cell, nextY) {
            nextY = Math.max(0, Math.round(nextY));
            if (!cell || cell.rawY === nextY) return false;

            const lf = cell.file;
            const pos = cell.blockRef.pos.value.list;
            const oldKey = coordKey(pos[0], pos[1], pos[2]);
            const newKey = coordKey(pos[0], nextY, pos[2]);

            if (lf.blockLookup.get(oldKey) === cell.blockRef) {
                lf.blockLookup.delete(oldKey);
            }

            const existing = lf.blockLookup.get(newKey);
            if (existing && existing !== cell.blockRef && !isEditableArtworkBlock(lf, existing)) {
                removeBlockFromFile(lf, existing);
                lf.supportCreatedKeys.delete(newKey);
            }

            pos[1] = nextY;
            cell.rawY = nextY;
            lf.blockLookup.set(newKey, cell.blockRef);

            if (lf.topMapBlockByRawXZ) {
                const topKey = `${cell.rawX},${cell.rawZ}`;
                const top = lf.topMapBlockByRawXZ.get(topKey);
                if (top && top.block === cell.blockRef) top.y = nextY;
            }

            return true;
        }

        function solveColumnTones(globalX, toneOverrides) {
            const columnCells = collectColumnCells(globalX);
            if (columnCells.length === 0) return false;

            const solvedY = new Map();
            let minSolvedY = Infinity;

            for (let i = 0; i < columnCells.length; i++) {
                const cell = columnCells[i];
                const tone = normalizeTone(toneOverrides.get(cell) || staircasedToneForCell(cell));
                let previousY = null;

                if (i > 0 && columnCells[i - 1].globalZ === cell.globalZ - 1) {
                    previousY = solvedY.get(columnCells[i - 1]);
                } else {
                    previousY = previousStaircaseY(cell);
                }

                const nextY = previousY === null ? cell.rawY : previousY + toneDelta(tone);
                solvedY.set(cell, nextY);
                if (nextY < minSolvedY) minSolvedY = nextY;
            }

            const shiftUp = minSolvedY < 0 ? -minSolvedY : 0;
            let changed = false;
            solvedY.forEach((nextY, cell) => {
                if (setCellY(cell, nextY + shiftUp)) changed = true;
            });
            return changed;
        }

        function applyManualShadingSolver(targetCells) {
            if (!manualShadingActive() || targetCells.length === 0) return false;

            const overridesByColumn = new Map();
            for (const cell of targetCells) {
                if (!overridesByColumn.has(cell.globalX)) overridesByColumn.set(cell.globalX, new Map());
                overridesByColumn.get(cell.globalX).set(cell, selectedTone);
            }

            let changed = false;
            overridesByColumn.forEach((overrides, globalX) => {
                if (solveColumnTones(globalX, overrides)) changed = true;
            });
            return changed;
        }

        function uniqueCells(cells) {
            const unique = [];
            const seen = new Set();
            for (const cell of cells) {
                if (!cell || seen.has(cell)) continue;
                seen.add(cell);
                unique.push(cell);
            }
            return unique;
        }

        function supportRecordsForPaintTargets(targetCells) {
            const cellsToRecord = new Set(targetCells);
            if (manualShadingActive()) {
                const columns = new Set(targetCells.map(cell => cell.globalX));
                columns.forEach(globalX => {
                    collectColumnCells(globalX).forEach(cell => cellsToRecord.add(cell));
                });
            }
            return Array.from(cellsToRecord, cell => supportChangeRecordForCell(cell));
        }

        function paintCells(cells, updateCanvasDirectly) {
            const targetBlock = selectedBlockForColor(selectedColor);
            if (!targetBlock) return false;

            const layer = activeLayer();
            if (!layerCanPaint(layer)) return false;
            if (layer.kind === "paint") {
                const targetCell = layerCellFromSelection(selectedColor, selectedDisplayTone());
                if (!targetCell) return false;
                let changed = false;
                for (const cell of uniqueCells(cells)) {
                    const key = layerCellKey(cell.globalX, cell.globalZ);
                    const existing = layer.cells.get(key);
                    if (
                        existing &&
                        existing.colorId === targetCell.colorId &&
                        existing.blockKey === targetCell.blockKey &&
                        (existing.tone || null) === (targetCell.tone || null)
                    ) continue;
                    layer.cells.set(key, { ...targetCell });
                    changed = true;
                }
                if (changed) {
                    renderLayers();
                    renderFullCanvas();
                }
                return changed;
            }

            const targetCells = [];
            for (const cell of uniqueCells(cells)) {
                const targetPaletteIndex = ensurePaletteState(cell.file, targetBlock);
                const stateChanged = cell.blockRef.state.value !== targetPaletteIndex;
                const toneChanged = manualShadingActive() && staircasedToneForCell(cell) !== selectedTone;
                if (!stateChanged && !toneChanged) continue;
                targetCells.push({ cell, targetPaletteIndex });
            }

            if (targetCells.length === 0) return false;

            const changedCells = targetCells.map(item => item.cell);
            const supportRecords = supportRecordsForPaintTargets(changedCells);

            for (const item of targetCells) {
                item.cell.blockRef.state.value = item.targetPaletteIndex;
                item.cell.colorId = selectedColor.id;
                item.cell.blockKey = targetBlock.key;
            }

            const yChanged = applyManualShadingSolver(changedCells);
            syncSupportsForCells(supportRecords);

            if (updateCanvasDirectly && !manualShadingActive() && !yChanged && !hasVisiblePaintLayers()) {
                for (const { cell } of targetCells) {
                    ctx.fillStyle = rgbToCss(rgbForCellColor(cell, selectedColor));
                    ctx.fillRect(cell.globalX, cell.globalZ, 1, 1);
                }
            } else {
                renderFullCanvas();
            }
            return true;
        }

        function compositePixelAt(x, z) {
            if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) return null;
            const baseCell = cellAtGlobal(x, z);

            for (let layerIndex = editorLayers.length - 1; layerIndex >= 0; layerIndex--) {
                const layer = editorLayers[layerIndex];
                if (!layer.visible) continue;
                if (layer.kind === "paint") {
                    const layerCell = layer.cells.get(layerCellKey(x, z));
                    if (!layerCell) continue;
                    const info = layerCellInfo(layerCell);
                    if (!info) continue;
                    return {
                        color: info.color,
                        block: info.block,
                        tone: info.tone,
                        rgb: colorForLayerCell(layerCell, baseCell),
                        layerCell,
                        baseCell,
                        layer
                    };
                }

                if (layer.kind === "base" && baseCell) {
                    const info = updateCellMetadata(baseCell);
                    if (!info) continue;
                    return {
                        color: info.color,
                        block: info.block,
                        tone: paletteMode === "staircased" ? staircasedToneForCell(baseCell) : null,
                        rgb: rgbForCellColor(baseCell, info.color),
                        layerCell: null,
                        baseCell,
                        layer
                    };
                }
            }

            return null;
        }

        function compositeMatchesSource(x, z, source) {
            const pixel = compositePixelAt(x, z);
            return !!(pixel &&
                source &&
                pixel.color.id === source.colorId &&
                pixel.block.key === source.blockKey &&
                (!manualShadingActive() || normalizeTone(pixel.tone) === normalizeTone(source.tone)));
        }

        function renderFullCanvas() {
            if (mapWidth === 0 || mapHeight === 0) return;
            const imageData = ctx.createImageData(mapWidth, mapHeight);
            
            for(let i=0; i<imageData.data.length; i++) imageData.data[i] = 0; 

            for(let i = 0; i < gridMap.length; i++) {
                const x = i % mapWidth;
                const z = Math.floor(i / mapWidth);
                const pixel = compositePixelAt(x, z);
                if (pixel && pixel.rgb) {
                    const [r, g, b] = pixel.rgb;
                    const pxIdx = i * 4;
                    imageData.data[pxIdx] = r;
                    imageData.data[pxIdx+1] = g;
                    imageData.data[pxIdx+2] = b;
                    imageData.data[pxIdx+3] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function brushCellsAtSize(cx, cz, size) {
            const offsetStart = Math.floor(size / 2);
            const offsetEnd = size - offsetStart - 1; 
            const cells = [];

            for(let bx = cx - offsetStart; bx <= cx + offsetEnd; bx++) {
                for(let bz = cz - offsetStart; bz <= cz + offsetEnd; bz++) {
                    if (bx >= 0 && bx < mapWidth && bz >= 0 && bz < mapHeight) {
                        const cell = gridMap[bz * mapWidth + bx];
                        if (cell) cells.push(cell);
                    }
                }
            }

            return cells;
        }

        function brushCellsAt(cx, cz) {
            return brushCellsAtSize(cx, cz, currentBrushSize());
        }

        function applyBrush(cx, cz, updateCanvasDirectly) {
            return paintCells(brushCellsAt(cx, cz), updateCanvasDirectly);
        }

        function cellAtGlobal(x, z) {
            if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) return null;
            return gridMap[z * mapWidth + x] || null;
        }

        function currentTextToolSize() {
            return textToolSize.value === "5" ? 5 : 7;
        }

        function glyphForTextChar(char, size) {
            const glyphs = size === 5 ? TEXT_GLYPHS_5 : TEXT_GLYPHS_7;
            return glyphs[char.toUpperCase()] || glyphs["?"];
        }

        function textPixelsFor(text, size) {
            const pixels = [];
            const lines = String(text || "").split(/\r?\n/);
            const lineHeight = size + 1;

            lines.forEach((line, lineIndex) => {
                let cursorX = 0;
                for (const char of line) {
                    const glyph = glyphForTextChar(char, size);
                    const glyphWidth = Math.max(...glyph.map(row => row.length));

                    glyph.forEach((row, rowIndex) => {
                        for (let col = 0; col < row.length; col++) {
                            const marker = row[col];
                            if (marker !== "." && marker !== " ") {
                                pixels.push({
                                    x: cursorX + col,
                                    z: lineIndex * lineHeight + rowIndex
                                });
                            }
                        }
                    });

                    cursorX += glyphWidth + 1;
                }
            });

            return pixels;
        }

        function previewTextAt(anchorX, anchorZ, text, size) {
            for (const pixel of textPixelsFor(text, size)) {
                const x = anchorX + pixel.x;
                const z = anchorZ + pixel.z;
                if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) continue;

                previewCtx.fillStyle = previewFillStyleAt(x, z);
                previewCtx.fillRect(x, z, 1, 1);
            }
        }

        function applyTextAt(anchorX, anchorZ, text, size, updateCanvasDirectly) {
            const pixels = textPixelsFor(text, size);
            if (pixels.length === 0) return false;

            const cells = [];

            for (const pixel of pixels) {
                const x = anchorX + pixel.x;
                const z = anchorZ + pixel.z;
                const cell = cellAtGlobal(x, z);
                if (!cell) continue;
                cells.push(cell);
            }

            return paintCells(cells, updateCanvasDirectly);
        }

        function isTextToolPopupOpen() {
            return !!(textToolPopup && textToolPopup.classList.contains("visible"));
        }

        function validTextAnchor(x, z) {
            return Number.isFinite(x) && Number.isFinite(z) && x >= 0 && x < mapWidth && z >= 0 && z < mapHeight;
        }

        function defaultTextToolAnchor() {
            if (validTextAnchor(lastMouseX, lastMouseZ)) {
                return { x: lastMouseX, z: lastMouseZ };
            }

            if (mapWidth > 0 && mapHeight > 0) {
                const canvasRect = canvas.getBoundingClientRect();
                const containerRect = canvasContainer.getBoundingClientRect();
                const centerClientX = Math.max(canvasRect.left, Math.min(canvasRect.right - 1, containerRect.left + containerRect.width / 2));
                const centerClientY = Math.max(canvasRect.top, Math.min(canvasRect.bottom - 1, containerRect.top + containerRect.height / 2));
                const scaleX = mapWidth / canvasRect.width;
                const scaleY = mapHeight / canvasRect.height;
                return {
                    x: Math.max(0, Math.min(mapWidth - 1, Math.floor((centerClientX - canvasRect.left) * scaleX))),
                    z: Math.max(0, Math.min(mapHeight - 1, Math.floor((centerClientY - canvasRect.top) * scaleY)))
                };
            }

            return { x: 0, z: 0 };
        }

        function clampTextToolPopupPosition(left, top) {
            if (!textToolPopup) return { left, top };

            const padding = 12;
            const rect = textToolPopup.getBoundingClientRect();
            const width = rect.width || textToolPopup.offsetWidth || 240;
            const height = rect.height || textToolPopup.offsetHeight || 160;
            const maxLeft = Math.max(padding, window.innerWidth - width - padding);
            const maxTop = Math.max(padding, window.innerHeight - height - padding);

            return {
                left: Math.max(padding, Math.min(maxLeft, left)),
                top: Math.max(padding, Math.min(maxTop, top))
            };
        }

        function defaultTextToolPopupPosition() {
            const padding = 12;
            const gap = 12;
            const canvasRect = canvasContainer.getBoundingClientRect();
            const popupRect = textToolPopup.getBoundingClientRect();
            const popupWidth = popupRect.width || textToolPopup.offsetWidth || 240;
            let left = canvasRect.left - popupWidth - gap;
            if (left < padding) left = canvasRect.left + padding;
            const top = canvasRect.top + padding;
            return clampTextToolPopupPosition(left, top);
        }

        function positionTextToolPopup() {
            if (!textToolPopup) return;

            if (!textToolPopupWasDragged || !textToolPopupPosition) {
                textToolPopupPosition = defaultTextToolPopupPosition();
            } else {
                textToolPopupPosition = clampTextToolPopupPosition(textToolPopupPosition.left, textToolPopupPosition.top);
            }

            textToolPopup.style.left = `${textToolPopupPosition.left}px`;
            textToolPopup.style.top = `${textToolPopupPosition.top}px`;
        }

        function startTextToolPopupDrag(event) {
            if (event.button !== 0) return;
            const rect = textToolPopup.getBoundingClientRect();
            activeTextToolPopupDrag = {
                pointerId: event.pointerId,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            try {
                event.currentTarget.setPointerCapture(event.pointerId);
            } catch (error) {
                // Pointer capture is best-effort; document capture handles release.
            }
            event.preventDefault();
            event.stopPropagation();
        }

        function moveTextToolPopupDrag(event) {
            if (!activeTextToolPopupDrag) return;
            textToolPopupWasDragged = true;
            textToolPopupPosition = clampTextToolPopupPosition(
                event.clientX - activeTextToolPopupDrag.offsetX,
                event.clientY - activeTextToolPopupDrag.offsetY
            );
            positionTextToolPopup();
            event.preventDefault();
        }

        function finishTextToolPopupDrag(event) {
            if (!activeTextToolPopupDrag) return;
            if (textToolDragHandle && activeTextToolPopupDrag.pointerId !== undefined) {
                try {
                    textToolDragHandle.releasePointerCapture(activeTextToolPopupDrag.pointerId);
                } catch (error) {
                    // The browser may already have released it.
                }
            }
            activeTextToolPopupDrag = null;
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
        }

        function clampColorPickerPosition(left, top) {
            if (!colorPickerWindow) return { left, top };
            const padding = 12;
            const rect = colorPickerWindow.getBoundingClientRect();
            const width = rect.width || colorPickerWindow.offsetWidth || 620;
            const height = rect.height || colorPickerWindow.offsetHeight || 520;
            const maxLeft = Math.max(padding, window.innerWidth - width - padding);
            const maxTop = Math.max(padding, window.innerHeight - height - padding);
            return {
                left: Math.max(padding, Math.min(maxLeft, left)),
                top: Math.max(padding, Math.min(maxTop, top))
            };
        }

        function defaultColorPickerPosition() {
            const canvasRect = canvasContainer.getBoundingClientRect();
            const left = Math.max(12, canvasRect.left + 24);
            const top = Math.max(12, canvasRect.top + 24);
            return clampColorPickerPosition(left, top);
        }

        function positionColorPickerWindow() {
            if (!colorPickerWindow) return;
            if (!colorPickerPosition) {
                colorPickerPosition = defaultColorPickerPosition();
            } else {
                colorPickerPosition = clampColorPickerPosition(colorPickerPosition.left, colorPickerPosition.top);
            }
            colorPickerWindow.style.left = `${colorPickerPosition.left}px`;
            colorPickerWindow.style.top = `${colorPickerPosition.top}px`;
        }

        function showColorPickerWindow() {
            updateColorPickerButtonState();
            if (!colorPickerAvailable()) {
                if (loadedFiles.length === 0) setPaletteStatus("Import NBT first.");
                return;
            }
            colorPickerWindow.classList.add("visible");
            positionColorPickerWindow();
            renderCustomPaletteViews();
        }

        function hideColorPickerWindow() {
            colorPickerWindow.classList.remove("visible");
        }

        function startColorPickerDrag(event) {
            if (event.button !== 0 || event.target.closest("button")) return;
            const rect = colorPickerWindow.getBoundingClientRect();
            activeColorPickerDrag = {
                pointerId: event.pointerId,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            try {
                event.currentTarget.setPointerCapture(event.pointerId);
            } catch (error) {
                // Pointer capture is best-effort; document capture handles release.
            }
            event.preventDefault();
            event.stopPropagation();
        }

        function moveColorPickerDrag(event) {
            if (!activeColorPickerDrag) return;
            colorPickerPosition = clampColorPickerPosition(
                event.clientX - activeColorPickerDrag.offsetX,
                event.clientY - activeColorPickerDrag.offsetY
            );
            positionColorPickerWindow();
            event.preventDefault();
            event.stopPropagation();
        }

        function finishColorPickerDrag(event) {
            if (!activeColorPickerDrag) return;
            if (colorPickerDragHandle && activeColorPickerDrag.pointerId !== undefined) {
                try {
                    colorPickerDragHandle.releasePointerCapture(activeColorPickerDrag.pointerId);
                } catch (error) {
                    // The browser may already have released it.
                }
            }
            activeColorPickerDrag = null;
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
        }

        function refreshTextToolPreview() {
            if (!isTextToolPopupOpen() || !textToolAnchor) {
                previewCtx.clearRect(0, 0, mapWidth, mapHeight);
                hideCursorSelectionFrame();
                return;
            }

            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            showCursorSelectionFrame(textToolAnchor.x, textToolAnchor.z);

            const text = textToolInput.value;
            if (text) {
                previewTextAt(textToolAnchor.x, textToolAnchor.z, text, currentTextToolSize());
            }
        }

        function showTextToolPopup(x, z) {
            textToolAnchor = { x, z };
            textToolPopup.classList.add("visible");
            positionTextToolPopup();
            refreshTextToolPreview();
            textToolInput.focus();
            textToolInput.select();
        }

        function hideTextToolPopup(refreshPreview = true) {
            if (!textToolPopup) return;
            textToolPopup.classList.remove("visible");
            textToolAnchor = null;
            finishTextToolPopupDrag();
            if (refreshPreview) updateCursorPreview(lastMouseX, lastMouseZ);
        }

        function placeTextToolText() {
            if (!textToolAnchor) return;

            const text = textToolInput.value;
            if (!text) {
                textToolInput.focus();
                return;
            }

            saveCurrentStateToUndo();
            if (!applyTextAt(textToolAnchor.x, textToolAnchor.z, text, currentTextToolSize(), true)) {
                undoStack.pop();
                updateButtons();
            }

            refreshTextToolPreview();
            textToolInput.focus();
        }

        function keepTextPreviewIfActive() {
            if (activeTool === "text" && isTextToolPopupOpen() && textToolAnchor) {
                refreshTextToolPreview();
                return true;
            }
            return false;
        }

        function selectColorFromCell(x, z) {
            const pixel = compositePixelAt(x, z);
            if (!pixel || !pixel.color || !pixel.block) return false;

            selectedColor = pixel.color;
            if (pixel.color.blocks.some(block => block.key === pixel.block.key)) {
                selectedBlockByColorId[pixel.color.id] = pixel.block.key;
            }
            if (manualShadingAvailable()) {
                selectedTone = normalizeTone(pixel.tone);
            }

            if (heldHotbarSlot !== null) {
                const snapshot = currentHotbarSnapshot(pixel.color, selectedDisplayTone());
                if (snapshot) {
                    hotbarSlots[heldHotbarSlot] = snapshot;
                    activeHotbarSlot = heldHotbarSlot;
                }
            } else {
                syncActiveHotbarSlot();
            }

            const pickedItem = {
                colorId: pixel.color.id,
                blockKey: pixel.block.key,
                tone: manualShadingAvailable() ? normalizeTone(pixel.tone) : null
            };

            if (colorPickerAvailable()) {
                saveCurrentStateToUndo();
                addQuickPaletteItem(pickedItem, null, { dedupe: true, saveUndo: false });
                assignNextColorPickerSlot(pickedItem);
            } else {
                addQuickPaletteItem(pickedItem, null, { dedupe: true });
            }

            renderPaletteRows();
            updateCursorPreview(x, z);
            return true;
        }

        function cellMatchesSource(cell, sourceColorId, sourceBlockKey) {
            const info = cell ? updateCellMetadata(cell) : null;
            return !!(info && info.color.id === sourceColorId && info.block.key === sourceBlockKey);
        }

        function applyBucketFill(cx, cz) {
            const startCell = cellAtGlobal(cx, cz);
            if (!startCell) return false;

            const sourceInfo = compositePixelAt(cx, cz);
            const targetBlock = selectedBlockForColor(selectedColor);
            if (!sourceInfo || !sourceInfo.color || !sourceInfo.block || !targetBlock) return false;

            const sourceColorId = sourceInfo.color.id;
            const sourceBlockKey = sourceInfo.block.key;
            const sourceTone = normalizeTone(sourceInfo.tone);
            if (
                sourceColorId === selectedColor.id &&
                sourceBlockKey === targetBlock.key &&
                (!manualShadingActive() || sourceTone === selectedTone)
            ) return false;

            const cells = [];
            const visited = new Set();
            const stack = [{ x: cx, z: cz }];

            while (stack.length > 0) {
                const { x, z } = stack.pop();
                if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) continue;

                const index = z * mapWidth + x;
                if (visited.has(index)) continue;
                visited.add(index);

                const cell = gridMap[index];
                if (!cell || !compositeMatchesSource(x, z, { colorId: sourceColorId, blockKey: sourceBlockKey, tone: sourceTone })) continue;
                cells.push(cell);

                stack.push(
                    { x: x + 1, z },
                    { x: x - 1, z },
                    { x, z: z + 1 },
                    { x, z: z - 1 }
                );
            }

            return paintCells(cells, false);
        }

        function currentBrushSize() {
            return parseInt(document.getElementById('brushSize').value, 10) || 1;
        }

        const SHAPE_START_MIN_DISTANCE = 3;

        function isShapeTool(tool = activeTool) {
            return tool === 'line' || tool === 'rectangle' || tool === 'circle' || tool === 'curve';
        }

        function isDeferredShapeTool(tool = activeTool) {
            return tool === 'rectangle' || tool === 'circle' || tool === 'curve';
        }

        function isSelectionTool(tool = activeTool) {
            return tool === 'rect-select' || tool === 'lasso-select';
        }

        function shapeDragDistance(x0, z0, x1, z1) {
            return Math.hypot(x1 - x0, z1 - z0);
        }

        function shapeDragReachedMinimum(x0, z0, x1, z1) {
            return shapeDragDistance(x0, z0, x1, z1) >= SHAPE_START_MIN_DISTANCE;
        }

        function beginPendingShapeStart(tool, x, z, event) {
            pendingShapeStart = {
                tool,
                x,
                z,
                shiftKey: !!(event && event.shiftKey)
            };
        }

        function startDeferredShapeStroke(event, x, z) {
            if (!pendingShapeStart || pendingShapeStart.tool !== activeTool) return false;
            if (!shapeDragReachedMinimum(pendingShapeStart.x, pendingShapeStart.z, x, z)) return false;

            isDrawing = true;
            hasDrawnInCurrentStroke = false;
            savedUndoInCurrentStroke = false;
            lineStartX = pendingShapeStart.x;
            lineStartZ = pendingShapeStart.z;
            arcFlipSide = !!(event && event.shiftKey);
            pendingShapeStart = null;
            return true;
        }

        function clearPendingShapeStart() {
            pendingShapeStart = null;
        }

        function addShapePoint(points, seen, x, z) {
            if (!Number.isFinite(x) || !Number.isFinite(z)) return;
            const px = Math.round(x);
            const pz = Math.round(z);
            const key = `${px},${pz}`;
            if (seen.has(key)) return;
            seen.add(key);
            points.push({ x: px, z: pz });
        }

        function linePoints(x0, y0, x1, y1) {
            let dx = Math.abs(x1 - x0);
            let dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1;
            let sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;
            const points = [];
            const seen = new Set();

            while(true) {
                addShapePoint(points, seen, x0, y0);
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }

            return points;
        }

        function rectanglePoints(x0, z0, x1, z1) {
            const points = [];
            const seen = new Set();
            const left = Math.min(x0, x1);
            const right = Math.max(x0, x1);
            const top = Math.min(z0, z1);
            const bottom = Math.max(z0, z1);

            for (let x = left; x <= right; x++) {
                addShapePoint(points, seen, x, top);
                addShapePoint(points, seen, x, bottom);
            }

            for (let z = top + 1; z < bottom; z++) {
                addShapePoint(points, seen, left, z);
                addShapePoint(points, seen, right, z);
            }

            return points;
        }

        function circlePoints(x0, z0, x1, z1) {
            const points = [];
            const seen = new Set();
            const left = Math.min(x0, x1);
            const right = Math.max(x0, x1);
            const top = Math.min(z0, z1);
            const bottom = Math.max(z0, z1);
            const width = right - left;
            const height = bottom - top;

            if (width === 0 && height === 0) {
                addShapePoint(points, seen, x0, z0);
                return points;
            }

            if (width === 0 || height === 0) {
                return linePoints(x0, z0, x1, z1);
            }

            const centerX = (left + right) / 2;
            const centerZ = (top + bottom) / 2;
            const radiusX = width / 2;
            const radiusZ = height / 2;
            const circumference = Math.PI * (
                3 * (radiusX + radiusZ) -
                Math.sqrt((3 * radiusX + radiusZ) * (radiusX + 3 * radiusZ))
            );
            const samples = Math.max(24, Math.ceil(circumference * 4));

            for (let i = 0; i < samples; i++) {
                const angle = (Math.PI * 2 * i) / samples;
                addShapePoint(
                    points,
                    seen,
                    centerX + Math.cos(angle) * radiusX,
                    centerZ + Math.sin(angle) * radiusZ
                );
            }

            return points;
        }

        function curvePoints(x0, z0, x1, z1, c1x = x0, c1z = z0, c2x = x1, c2z = z1) {
            const points = [];
            const seen = new Set();
            const dx = x1 - x0;
            const dz = z1 - z0;
            const distance = Math.hypot(dx, dz);
            if (distance < 1 && Math.hypot(c2x - c1x, c2z - c1z) < 1) {
                addShapePoint(points, seen, x0, z0);
                return points;
            }

            const controlDistance = Math.hypot(c1x - x0, c1z - z0) + Math.hypot(c2x - x1, c2z - z1);
            const samples = Math.max(24, Math.ceil((distance + controlDistance) * 4));

            for (let i = 0; i <= samples; i++) {
                const t = i / samples;
                const inv = 1 - t;
                addShapePoint(
                    points,
                    seen,
                    inv * inv * inv * x0 + 3 * inv * inv * t * c1x + 3 * inv * t * t * c2x + t * t * t * x1,
                    inv * inv * inv * z0 + 3 * inv * inv * t * c1z + 3 * inv * t * t * c2z + t * t * t * z1
                );
            }

            return points;
        }

        function shapePointsForTool(tool, x0, z0, x1, z1, flipSide = false) {
            if (tool === 'rectangle') return rectanglePoints(x0, z0, x1, z1);
            if (tool === 'circle') return circlePoints(x0, z0, x1, z1);
            return linePoints(x0, z0, x1, z1);
        }

        function shapePointsForDraft(draft) {
            if (!draft) return [];
            if (draft.tool === 'curve') {
                return curvePoints(
                    draft.x0,
                    draft.z0,
                    draft.x1,
                    draft.z1,
                    draft.c1x ?? draft.x0,
                    draft.c1z ?? draft.z0,
                    draft.c2x ?? draft.x1,
                    draft.c2z ?? draft.z1
                );
            }
            return shapePointsForTool(draft.tool, draft.x0, draft.z0, draft.x1, draft.z1, !!draft.flipSide);
        }

        function paintShapePoints(points, updateCanvasDirectly, brushSize = currentBrushSize()) {
            const cells = [];

            for (const point of points) {
                cells.push(...brushCellsAtSize(point.x, point.z, brushSize));
            }

            return paintCells(cells, updateCanvasDirectly);
        }

        function drawLine(x0, y0, x1, y1, updateCanvasDirectly, brushSize = currentBrushSize()) {
            return paintShapePoints(linePoints(x0, y0, x1, y1), updateCanvasDirectly, brushSize);
        }

        function drawShape(tool, x0, z0, x1, z1, updateCanvasDirectly, flipSide = false, brushSize = currentBrushSize()) {
            return paintShapePoints(shapePointsForTool(tool, x0, z0, x1, z1, flipSide), updateCanvasDirectly, brushSize);
        }

        function drawShapeDraft(draft, updateCanvasDirectly) {
            return paintShapePoints(shapePointsForDraft(draft), updateCanvasDirectly, draft.brushSize || currentBrushSize());
        }

        // --- PREVIEW CURSOR LAYER ---
        function previewFillStyleAt(x, z, color = selectedColor, tone = selectedTone) {
            const cell = cellAtGlobal(x, z);
            const rgb = manualShadingActive()
                ? rgbForMapTone(color, tone)
                : (cell ? rgbForCellColor(cell, color) : rgbForMapTone(color, "normal"));
            return rgbToCss(rgb);
        }

        function previewBrush(cx, cz, size, offsetStart, color = selectedColor, tone = selectedTone) {
            const offsetEnd = size - offsetStart - 1;
            for (let bx = cx - offsetStart; bx <= cx + offsetEnd; bx++) {
                for (let bz = cz - offsetStart; bz <= cz + offsetEnd; bz++) {
                    if (bx < 0 || bx >= mapWidth || bz < 0 || bz >= mapHeight) continue;
                    previewCtx.fillStyle = previewFillStyleAt(bx, bz, color, tone);
                    previewCtx.fillRect(bx, bz, 1, 1);
                }
            }
        }

        function previewShape(tool, x0, z0, x1, z1, size, offsetStart, flipSide = false, color = selectedColor, tone = selectedTone) {
            for (const point of shapePointsForTool(tool, x0, z0, x1, z1, flipSide)) {
                previewBrush(point.x, point.z, size, offsetStart, color, tone);
            }
        }

        function isEditableShapeTool(tool = activeTool) {
            return tool === 'rectangle' || tool === 'circle';
        }

        function currentShapeSelectionSnapshot() {
            const block = selectedBlockForColor(selectedColor);
            if (!selectedColor || !block) return null;
            return {
                colorId: selectedColor.id,
                blockKey: block.key,
                tone: selectedDisplayTone()
            };
        }

        function colorForShapeDraft(draft) {
            return draft && COLORS_BY_ID.has(draft.colorId)
                ? COLORS_BY_ID.get(draft.colorId)
                : selectedColor;
        }

        function toneForShapeDraft(draft) {
            return draft ? normalizeTone(draft.tone) : selectedTone;
        }

        function boundsForPoints(points, fallback = null) {
            if (!points || points.length === 0) {
                return fallback || { left: 0, right: 0, top: 0, bottom: 0 };
            }
            let left = Infinity;
            let right = -Infinity;
            let top = Infinity;
            let bottom = -Infinity;
            for (const point of points) {
                left = Math.min(left, point.x);
                right = Math.max(right, point.x);
                top = Math.min(top, point.z);
                bottom = Math.max(bottom, point.z);
            }
            return { left, right, top, bottom };
        }

        function normalizedShapeBounds(shape) {
            if (shape && shape.tool === 'curve') {
                return boundsForPoints(shapePointsForDraft(shape));
            }
            return {
                left: Math.min(shape.x0, shape.x1),
                right: Math.max(shape.x0, shape.x1),
                top: Math.min(shape.z0, shape.z1),
                bottom: Math.max(shape.z0, shape.z1)
            };
        }

        function hideShapeSelectionBox() {
            if (shapeSelectionBox) {
                shapeSelectionBox.classList.remove("visible");
                shapeSelectionBox.classList.remove("selection-mode");
            }
        }

        function positionShapeSelectionBox() {
            if (!shapeSelectionBox || !activeShapeDraft || mapWidth <= 0 || mapHeight <= 0) {
                hideShapeSelectionBox();
                return;
            }

            const bounds = normalizedShapeBounds(activeShapeDraft);
            const canvasRect = canvas.getBoundingClientRect();
            const wrapperRect = canvas.parentElement.getBoundingClientRect();
            const cellWidth = canvasRect.width / mapWidth;
            const cellHeight = canvasRect.height / mapHeight;

            shapeSelectionBox.classList.add("visible");
            shapeSelectionBox.classList.remove("selection-mode");
            shapeSelectionBox.style.left = `${canvasRect.left - wrapperRect.left + bounds.left * cellWidth}px`;
            shapeSelectionBox.style.top = `${canvasRect.top - wrapperRect.top + bounds.top * cellHeight}px`;
            shapeSelectionBox.style.width = `${Math.max(cellWidth, (bounds.right - bounds.left + 1) * cellWidth)}px`;
            shapeSelectionBox.style.height = `${Math.max(cellHeight, (bounds.bottom - bounds.top + 1) * cellHeight)}px`;
        }

        function renderActiveShapeDraft() {
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            if (!activeShapeDraft) {
                hideShapeSelectionBox();
                return;
            }

            const size = activeShapeDraft.brushSize || 1;
            const offsetStart = Math.floor(size / 2);
            const color = colorForShapeDraft(activeShapeDraft);
            const tone = toneForShapeDraft(activeShapeDraft);
            for (const point of shapePointsForDraft(activeShapeDraft)) {
                previewBrush(point.x, point.z, size, offsetStart, color, tone);
            }
            positionShapeSelectionBox();
        }

        function cancelActiveShapeDraft() {
            activeShapeDraft = null;
            activeShapeInteraction = null;
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            hideShapeSelectionBox();
        }

        function withDraftSelection(draft, action) {
            const color = colorForShapeDraft(draft);
            const previousColor = selectedColor;
            const previousTone = selectedTone;
            const previousBlockKey = selectedBlockByColorId[color.id];

            selectedColor = color;
            selectedTone = toneForShapeDraft(draft);
            selectedBlockByColorId[color.id] = draft.blockKey;

            try {
                return action();
            } finally {
                selectedColor = previousColor;
                selectedTone = previousTone;
                if (previousBlockKey === undefined) {
                    delete selectedBlockByColorId[color.id];
                } else {
                    selectedBlockByColorId[color.id] = previousBlockKey;
                }
            }
        }

        function commitActiveShapeDraft() {
            if (!activeShapeDraft) return false;

            const draft = { ...activeShapeDraft };
            cancelActiveShapeDraft();

            saveCurrentStateToUndo();
            const changed = withDraftSelection(draft, () => drawShapeDraft(draft, true));

            if (!changed) {
                undoStack.pop();
                updateButtons();
            }

            renderPaletteRows();
            updateCursorPreview(lastMouseX, lastMouseZ);
            return changed;
        }

        function draftFromActiveCurve() {
            if (!activeCurveDraft) return null;
            return {
                tool: 'curve',
                x0: activeCurveDraft.x0,
                z0: activeCurveDraft.z0,
                x1: activeCurveDraft.x1,
                z1: activeCurveDraft.z1,
                c1x: activeCurveDraft.c1x,
                c1z: activeCurveDraft.c1z,
                c2x: activeCurveDraft.c2x,
                c2z: activeCurveDraft.c2z,
                brushSize: activeCurveDraft.brushSize,
                colorId: activeCurveDraft.colorId,
                blockKey: activeCurveDraft.blockKey,
                tone: activeCurveDraft.tone
            };
        }

        function renderActiveCurveDraft() {
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            hideShapeSelectionBox();
            const draft = draftFromActiveCurve();
            if (!draft) return;
            const size = draft.brushSize || 1;
            const offsetStart = Math.floor(size / 2);
            const color = colorForShapeDraft(draft);
            const tone = toneForShapeDraft(draft);
            for (const point of shapePointsForDraft(draft)) {
                previewBrush(point.x, point.z, size, offsetStart, color, tone);
            }
        }

        function cancelActiveCurveDraft() {
            activeCurveDraft = null;
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
        }

        function finalizeActiveCurveDraftToEditableShape() {
            const draft = draftFromActiveCurve();
            if (!draft) return false;
            activeCurveDraft = null;
            activeShapeDraft = draft;
            renderActiveShapeDraft();
            return true;
        }

        function commitActiveCurveDraft() {
            if (!activeCurveDraft) return false;
            if (!finalizeActiveCurveDraftToEditableShape()) return false;
            return commitActiveShapeDraft();
        }

        function beginCurveControlDrag(x, z) {
            if (!activeCurveDraft || activeCurveDraft.phase >= 2) return false;
