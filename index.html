<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBT Mapart Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        html {
            height: 100%;
            overflow: hidden;
        }
        :root {
            --editor-panel-height: min(700px, calc(100vh - 172px));
            --hotbar-height: 46px;
            --hotbar-gap: 8px;
            --workarea-height: calc(var(--editor-panel-height) - var(--hotbar-height) - var(--hotbar-gap));
            --hotbar-slot-size: clamp(24px, calc((var(--workarea-height) - 60px) / 10), 38px);
            --side-panel-width: clamp(240px, 18vw, 340px);
            --palette-row-height: clamp(27px, 3.7vh, 37px);
            --palette-swatch-size: clamp(21px, 2.7vh, 27px);
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 4px 12px 8px;
        }
        h1 {
            margin: 4px 0 2px;
            font-size: 30px;
            line-height: 1.1;
        }
        p {
            margin: 0 0 8px;
            color: #a6adc8;
        }
        
        .toolbar {
            background-color: #313244;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            max-width: calc(100vw - 24px);
            flex: 0 0 auto;
        }
        
        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #45475a;
            padding: 4px 10px;
            border-radius: 5px;
        }

        .tool-group select, .tool-group input {
            background-color: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #6c7086;
            padding: 5px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        button {
            background-color: #89b4fa;
            color: #11111b;
            border: none;
            padding: 8px 13px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background-color: #b4befe; }
        button:disabled {
            background-color: #45475a;
            color: #6c7086;
            cursor: not-allowed;
        }

        #saveIndivBtn { background-color: #a6e3a1; }
        #saveIndivBtn:hover:not(:disabled) { background-color: #b3f0af; }
        
        body[data-palette-mode="carpet"] {
            --side-panel-width: 240px;
        }

        .editor-container {
            display: grid;
            grid-template-columns: auto var(--side-panel-width);
            gap: 16px;
            background-color: #313244;
            padding: 12px;
            border-radius: 8px;
            justify-content: center;
            align-items: stretch;
            flex: 0 1 auto;
            min-height: 0;
            max-width: calc(100vw - 24px);
        }

        .canvas-column {
            display: flex;
            flex-direction: column;
            gap: var(--hotbar-gap);
            min-height: 0;
            height: var(--editor-panel-height);
            max-height: 700px;
            width: var(--workarea-height);
            max-width: 700px;
        }

        .canvas-container {
            height: var(--workarea-height);
            max-height: 700px;
            width: var(--workarea-height);
            max-width: 700px;
            aspect-ratio: 1 / 1;
            overflow: auto;
            background-color: #11111b;
            border: 2px solid #45475a;
            display: flex;
            scrollbar-width: thin;
            scrollbar-color: #45475a #1e1e2e;
            position: relative;
        }

        .canvas-container:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            aspect-ratio: auto;
            border: 0;
            border-radius: 0;
            background: #000;
            scrollbar-color: #45475a #000;
        }

        .fullscreen-hud {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .fullscreen-hud.hidden {
            display: none;
        }

        .fullscreen-hud-panel {
            position: fixed;
            min-width: 160px;
            max-width: calc(100vw - 40px);
            background: rgba(49, 50, 68, 0.95);
            border: 1px solid #6c7086;
            border-radius: 8px;
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.45);
            color: #cdd6f4;
            overflow: hidden;
            pointer-events: auto;
            user-select: none;
        }

        .fullscreen-hud-panel.dragging {
            opacity: 0.9;
        }

        .fullscreen-hud-title {
            background: #45475a;
            border-bottom: 1px solid #6c7086;
            color: #cdd6f4;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 12px;
            font-weight: bold;
            line-height: 1;
            padding: 7px 9px;
        }

        .fullscreen-hud-title-hint {
            color: #a6adc8;
            font-size: 11px;
            font-weight: normal;
            white-space: nowrap;
        }

        .fullscreen-hud-body {
            padding: 8px;
            user-select: auto;
        }

        .fullscreen-hud-body .tool-group {
            flex-wrap: wrap;
            max-width: 360px;
        }

        .fullscreen-hud-controls-body {
            display: flex;
            gap: 8px;
        }

        .fullscreen-hud-body .hotbar-area {
            height: auto;
            flex: 0 0 auto;
            padding: 0;
        }

        .fullscreen-hud-body .palette-panel {
            height: min(64vh, 620px);
            max-height: min(64vh, 620px);
            width: min(340px, calc(100vw - 40px));
        }

        .fullscreen-hud-body .palette-header {
            margin-bottom: 6px;
        }

        .canvas-wrapper {
            margin: auto;
            display: flex;
            position: relative;
        }

        canvas {
            image-rendering: pixelated;
            display: block;
        }

        #mapCanvas { cursor: crosshair; }

        #previewCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; 
        }

        .cursor-selection-frame {
            position: absolute;
            display: none;
            border: 2px solid #000;
            pointer-events: none;
            z-index: 3;
        }

        .hotbar-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            height: var(--hotbar-height);
            flex: 0 0 var(--hotbar-height);
            min-width: 0;
        }

        .hotbar-strip {
            display: grid;
            grid-template-columns: repeat(9, var(--hotbar-slot-size));
            gap: 0;
            height: var(--hotbar-slot-size);
        }

        .hotbar-slot,
        .selected-block-preview {
            width: var(--hotbar-slot-size);
            height: var(--hotbar-slot-size);
            padding: 3px;
            border: 2px solid #6c7086;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px #11111b;
        }

        .hotbar-slot {
            border-radius: 0;
            cursor: pointer;
            position: relative;
        }

        .hotbar-slot:first-child {
            border-radius: 6px 0 0 6px;
        }

        .hotbar-slot:last-child {
            border-radius: 0 6px 6px 0;
        }

        .hotbar-slot + .hotbar-slot {
            border-left-width: 1px;
        }

        .hotbar-slot:hover,
        .hotbar-slot.assign-target {
            background: #1e1e2e;
            border-color: #89b4fa;
            z-index: 1;
        }

        .hotbar-slot:hover:not(:disabled) {
            background: #1e1e2e;
        }

        .hotbar-slot.active {
            background: #1e1e2e;
            border-color: #a6e3a1;
            z-index: 2;
        }

        .hotbar-slot.empty::after {
            content: attr(data-slot);
            position: absolute;
            right: 4px;
            bottom: 2px;
            font-size: 10px;
            line-height: 1;
            color: #6c7086;
            font-weight: bold;
        }

        .hotbar-slot-fill,
        .selected-block-fill {
            width: 100%;
            height: 100%;
            border-radius: 3px;
            background: #313244;
            border: 1px solid #11111b;
        }

        .selected-block-preview {
            flex: 0 0 var(--hotbar-slot-size);
            border-radius: 6px;
            border-color: #a6e3a1;
            cursor: default;
        }

        .palette {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding-right: 10px;
        }

        .palette-row {
            display: grid;
            grid-template-columns: calc(var(--palette-swatch-size) + 10px) minmax(0, 1fr);
            place-items: center;
            justify-items: center;
            gap: 5px;
            height: var(--palette-row-height);
            background: #45475a;
            border: 2px solid transparent;
            border-radius: 5px;
            padding: 0 5px;
            cursor: pointer;
            font-size: 12px;
            color: #cdd6f4;
        }
        .palette-row.active { border-color: #a6e3a1; }
        .palette-row span {
            justify-self: start;
            align-self: center;
        }
        .palette.carpet-mode {
            width: 220px;
            gap: 4px;
            flex: 0 0 auto;
            overflow-y: visible;
        }
        .palette.carpet-mode .palette-row {
            grid-template-columns: calc(var(--palette-swatch-size) + 10px) minmax(0, 1fr);
        }
        .palette-row select {
            min-width: 0;
            width: 100%;
            justify-self: stretch;
            align-self: center;
            height: calc(var(--palette-row-height) - 8px);
            background-color: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #6c7086;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1;
        }
        .color-swatch {
            width: var(--palette-swatch-size);
            height: var(--palette-swatch-size);
            justify-self: center;
            align-self: center;
            display: block;
            border-radius: 4px;
            border: 1px solid #11111b;
        }

        .palette-status {
            flex: 0 0 auto;
            font-size: 12px;
            line-height: 1.25;
            color: #a6adc8;
            max-width: 340px;
            min-height: 16px;
            margin-bottom: 8px;
            overflow-wrap: anywhere;
        }
        body[data-palette-mode="carpet"] #profileImportControl,
        body[data-palette-mode="carpet"] #saveProfileBtn,
        body[data-palette-mode="carpet"] #supportBlockLabel,
        body[data-palette-mode="carpet"] #supportBlockSelect {
            display: none;
        }
        .palette-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: var(--editor-panel-height);
            max-height: 700px;
            width: var(--side-panel-width);
        }
        .palette-panel h3 {
            flex: 0 0 auto;
            margin: 0 0 8px;
        }
        .palette-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex: 0 0 auto;
            margin-bottom: 8px;
        }
        .palette-header h3 {
            margin: 0;
        }
        .palette-header button {
            padding: 6px 10px;
            font-size: 11px;
        }
        .palette-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        body[data-palette-mode="carpet"] .palette-panel {
            width: var(--side-panel-width);
        }

        .license-notice {
            position: fixed;
            left: 10px;
            bottom: 8px;
            z-index: 20;
            max-width: calc(100vw - 20px);
            padding: 5px 8px;
            border-radius: 5px;
            background: rgba(30, 30, 46, 0.9);
            border: 1px solid #45475a;
            color: #a6adc8;
            font-size: 11px;
            line-height: 1.3;
            pointer-events: auto;
        }

        .license-notice a {
            color: #89b4fa;
            text-decoration: none;
            font-weight: 600;
        }

        .license-notice a:hover {
            text-decoration: underline;
        }

        .instant-tooltip {
            position: fixed;
            z-index: 1000;
            max-width: 260px;
            padding: 6px 8px;
            border-radius: 5px;
            background: #11111b;
            border: 1px solid #6c7086;
            color: #cdd6f4;
            font-size: 12px;
            line-height: 1.25;
            pointer-events: none;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
            opacity: 0;
            transform: translate(-9999px, -9999px);
            transition: none;
        }

        .instant-tooltip.visible {
            opacity: 1;
        }

        .tool-scroll-tooltip {
            position: fixed;
            z-index: 1001;
            max-width: 220px;
            padding: 7px 10px;
            border-radius: 6px;
            background: rgba(17, 17, 27, 0.94);
            border: 1px solid #89b4fa;
            color: #cdd6f4;
            font-size: 13px;
            line-height: 1.2;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.42);
            opacity: 0;
            transform: translate(-9999px, -9999px);
            transition: opacity 0.08s ease;
        }

        .tool-scroll-tooltip.visible {
            opacity: 1;
        }

        .text-tool-popup {
            position: fixed;
            z-index: 1002;
            display: none;
            min-width: 240px;
            border-radius: 8px;
            background: rgba(49, 50, 68, 0.97);
            border: 1px solid #6c7086;
            color: #cdd6f4;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.45);
            font-size: 12px;
            overflow: hidden;
        }

        .text-tool-popup.visible {
            display: grid;
        }

        .text-tool-title {
            background: #45475a;
            border-bottom: 1px solid #6c7086;
            cursor: move;
            font-weight: bold;
            padding: 7px 9px;
            user-select: none;
        }

        .text-tool-body {
            display: grid;
            gap: 8px;
            padding: 10px;
        }

        .text-tool-popup label {
            display: grid;
            gap: 4px;
            font-weight: bold;
        }

        .text-tool-popup input,
        .text-tool-popup select {
            background-color: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #6c7086;
            padding: 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .text-tool-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .text-tool-actions button {
            padding: 6px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>NBT Mapart Editor</h1>
    <p>Upload files. Left click to paint, right click to pan, scroll wheel to zoom.</p>

    <div class="toolbar">
        <label>NBT: <input type="file" id="fileInput" accept=".nbt" multiple></label>
        <label id="profileImportControl">Profile: <input type="file" id="paletteProfileInput" accept=".txt,.pal,.palette"></label>
        
        <div class="tool-group" data-tooltip="Hold T and scroll to switch tools">
            <label>Tool:</label>
            <select id="toolSelect">
                <option value="brush">Brush</option>
                <option value="line">Line</option>
                <option value="bucket">Bucket</option>
                <option value="picker">Color Selector</option>
                <option value="text">Text</option>
            </select>
            
            <label>Size:</label>
            <input type="number" id="brushSize" value="1" min="1" max="20" style="width: 40px;">

            <label id="supportBlockLabel" data-tooltip="Support blocks are generated only when a placed block requires support">Support:</label>
            <select id="supportBlockSelect" data-tooltip="Support blocks are generated only when a placed block requires support"></select>
        </div>

        <button id="undoBtn" data-tooltip="Press Ctrl+Z to undo" disabled>Undo</button>
        <button id="redoBtn" data-tooltip="Press Ctrl+Y to redo" disabled>Redo</button>
        <button id="saveIndivBtn">Download Individual Files</button>
        <button id="saveZipBtn">Download as ZIP Folder</button>
        <button id="saveSingleBtn">Download as 1 NBT</button>
    </div>

    <div class="editor-container">
        <div class="canvas-column">
            <div class="canvas-container" id="canvasContainer">
                <div class="canvas-wrapper">
                    <canvas id="mapCanvas"></canvas>
                    <canvas id="previewCanvas"></canvas>
                    <div class="cursor-selection-frame" id="cursorSelectionFrame"></div>
                </div>
                <div class="tool-scroll-tooltip" id="toolScrollTooltip" role="status"></div>
                <div class="text-tool-popup" id="textToolPopup">
                    <div class="text-tool-title" id="textToolDragHandle">Text Tool</div>
                    <div class="text-tool-body">
                        <label>Text <input type="text" id="textToolInput" maxlength="64" placeholder="Type text"></label>
                        <label>Size
                            <select id="textToolSize">
                                <option value="7" selected>7 px</option>
                                <option value="5">5 px</option>
                            </select>
                        </label>
                        <div class="text-tool-actions">
                            <button id="textToolPlaceBtn" type="button">Place</button>
                            <button id="textToolCancelBtn" type="button">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="hotbar-area" aria-label="Color hotbar">
                <div class="hotbar-strip" id="hotbarSlots"></div>
                <div class="selected-block-preview" id="selectedBlockPreview" data-tooltip="Current selected block">
                    <div class="selected-block-fill" id="selectedBlockFill"></div>
                </div>
            </div>
        </div>
        <div class="palette-panel">
            <div class="palette-header">
                <h3>Block Palette</h3>
                <div class="palette-actions">
                    <button id="fullscreenBtn" type="button">Fullscreen</button>
                    <button id="saveProfileBtn">Save Profile</button>
                </div>
            </div>
            <div class="palette-status" id="paletteImportStatus"></div>
            <div class="palette" id="paletteContainer"></div>
        </div>
    </div>

    <div class="license-notice">
        <a href="https://www.gnu.org/licenses/gpl-3.0.en.html" target="_blank" rel="noopener noreferrer">GPL-3.0</a>
        |
        <a href="https://github.com/Bonggerz/nbt-mapart-editor" target="_blank" rel="noopener noreferrer">Source</a>
        |
        Block/color database adapted from
        <a href="https://github.com/mike2b2t/mapartcraft" target="_blank" rel="noopener noreferrer">MapArtCraft</a>
    </div>

    <script data-goatcounter="https://nbtmaparteditor.goatcounter.com/count"
            async src="https://gc.zgo.at/count.js"></script>

    <div class="instant-tooltip" id="instantTooltip" role="tooltip"></div>

    <script>
        // --- 1. MINIMAL NBT PARSER & WRITER ---
        class NBTParser {
            constructor(buffer) {
                this.view = new DataView(buffer.buffer, buffer.byteOffset, buffer.byteLength);
                this.offset = 0;
                this.decoder = new TextDecoder('utf-8');
            }
            readTag() {
                if (this.offset >= this.view.byteLength) return null;
                const type = this.readByte();
                if (type === 0) return { type: 0 };
                const name = this.readString();
                const value = this.readValue(type);
                return { type, name, value };
            }
            readByte() { const v = this.view.getInt8(this.offset); this.offset += 1; return v; }
            readShort() { const v = this.view.getInt16(this.offset); this.offset += 2; return v; }
            readInt() { const v = this.view.getInt32(this.offset); this.offset += 4; return v; }
            readLong() { const v = this.view.getBigInt64(this.offset); this.offset += 8; return v; }
            readFloat() { const v = this.view.getFloat32(this.offset); this.offset += 4; return v; }
            readDouble() { const v = this.view.getFloat64(this.offset); this.offset += 8; return v; }
            readString() {
                const len = this.readShort();
                const bytes = new Uint8Array(this.view.buffer, this.view.byteOffset + this.offset, len);
                this.offset += len;
                return this.decoder.decode(bytes);
            }
            readValue(type) {
                let len, val, elementType;
                switch(type) {
                    case 1: return this.readByte();
                    case 2: return this.readShort();
                    case 3: return this.readInt();
                    case 4: return this.readLong();
                    case 5: return this.readFloat();
                    case 6: return this.readDouble();
                    case 7: 
                        len = this.readInt(); 
                        val = new Int8Array(this.view.buffer, this.view.byteOffset + this.offset, len);
                        this.offset += len; return val;
                    case 8: return this.readString();
                    case 9:
                        elementType = this.readByte();
                        len = this.readInt();
                        val = { type: elementType, list: [] };
                        for (let i = 0; i < len; i++) val.list.push(this.readValue(elementType));
                        return val;
                    case 10:
                        val = {};
                        while (true) {
                            const tag = this.readTag();
                            if (tag.type === 0) break;
                            val[tag.name] = tag;
                        }
                        return val;
                    case 11:
                        len = this.readInt();
                        val = new Int32Array(len);
                        for(let i=0; i<len; i++) val[i] = this.readInt();
                        return val;
                    case 12:
                        len = this.readInt();
                        val = new BigInt64Array(len);
                        for(let i=0; i<len; i++) val[i] = this.readLong();
                        return val;
                    default: throw new Error("Unknown NBT type: " + type);
                }
            }
        }

        class NBTWriter {
            constructor() {
                this.buffer = new Uint8Array(1024 * 1024 * 30); // 30MB buffer for huge files
                this.view = new DataView(this.buffer.buffer);
                this.offset = 0;
                this.encoder = new TextEncoder('utf-8');
            }
            writeByte(v) { this.view.setInt8(this.offset, v); this.offset += 1; }
            writeShort(v) { this.view.setInt16(this.offset, v); this.offset += 2; }
            writeInt(v) { this.view.setInt32(this.offset, v); this.offset += 4; }
            writeLong(v) { this.view.setBigInt64(this.offset, BigInt(v)); this.offset += 8; }
            writeFloat(v) { this.view.setFloat32(this.offset, v); this.offset += 4; }
            writeDouble(v) { this.view.setFloat64(this.offset, v); this.offset += 8; }
            writeString(str) {
                const bytes = this.encoder.encode(str);
                this.writeShort(bytes.length);
                this.buffer.set(bytes, this.offset);
                this.offset += bytes.length;
            }
            writeTag(tag) {
                this.writeByte(tag.type);
                if (tag.type === 0) return;
                this.writeString(tag.name || "");
                this.writeValue(tag.type, tag.value);
            }
            writeValue(type, value) {
                switch(type) {
                    case 1: this.writeByte(value); break;
                    case 2: this.writeShort(value); break;
                    case 3: this.writeInt(value); break;
                    case 4: this.writeLong(value); break;
                    case 5: this.writeFloat(value); break;
                    case 6: this.writeDouble(value); break;
                    case 7:
                        this.writeInt(value.length);
                        this.buffer.set(new Int8Array(value.buffer, value.byteOffset, value.byteLength), this.offset);
                        this.offset += value.length; break;
                    case 8: this.writeString(value); break;
                    case 9:
                        this.writeByte(value.type);
                        this.writeInt(value.list.length);
                        for (let i = 0; i < value.list.length; i++) this.writeValue(value.type, value.list[i]);
                        break;
                    case 10:
                        for (const key in value) this.writeTag(value[key]);
                        this.writeByte(0); 
                        break;
                    case 11:
                        this.writeInt(value.length);
                        for(let i=0; i<value.length; i++) this.writeInt(value[i]); break;
                    case 12:
                        this.writeInt(value.length);
                        for(let i=0; i<value.length; i++) this.writeLong(value[i]); break;
                }
            }
            getOutput() { return new Uint8Array(this.buffer.buffer, 0, this.offset); }
        }

        function stateKey(name, properties = {}) {
            const propEntries = Object.keys(properties).sort().map(key => `${key}=${properties[key]}`);
            return `${name}|${propEntries.join(';')}`;
        }

        function makeBlock(displayName, name, supportRequired = false, properties = {}, mapartPresetIndex = null) {
            return {
                displayName,
                name,
                properties,
                supportRequired,
                mapartPresetIndex,
                key: stateKey(name, properties)
            };
        }

        function titleWords(text) {
            return text.split('_').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join(' ');
        }

        function moveInstantTooltip(event) {
            if (!instantTooltip || !instantTooltip.classList.contains('visible')) return;
            const padding = 12;
            const offset = 14;
            let left = event.clientX + offset;
            let top = event.clientY + offset;
            const rect = instantTooltip.getBoundingClientRect();

            if (left + rect.width + padding > window.innerWidth) {
                left = event.clientX - rect.width - offset;
            }
            if (top + rect.height + padding > window.innerHeight) {
                top = event.clientY - rect.height - offset;
            }

            instantTooltip.style.left = `${Math.max(padding, left)}px`;
            instantTooltip.style.top = `${Math.max(padding, top)}px`;
        }

            instantTooltip.textContent = text;
            instantTooltip.style.transform = "none";
            instantTooltip.classList.add('visible');
            moveInstantTooltip(event);
        }

        function hideInstantTooltip() {
            if (!instantTooltip) return;
            instantTooltip.classList.remove('visible');
            instantTooltip.style.transform = "translate(-9999px, -9999px)";
            instantTooltip.style.left = "";
            instantTooltip.style.top = "";
        }

        function positionToolScrollTooltip(clientX = lastClientX, clientY = lastClientY) {
            if (!toolScrollTooltip || !toolScrollTooltip.classList.contains('visible')) return;

            const padding = 12;
            const offset = 14;
            const rect = toolScrollTooltip.getBoundingClientRect();
            let left = clientX - rect.width / 2;
            let top = clientY - rect.height - offset;

            if (top < padding) top = clientY + offset;
            if (left + rect.width + padding > window.innerWidth) {
                left = window.innerWidth - rect.width - padding;
            }
            if (left < padding) left = padding;
            if (top + rect.height + padding > window.innerHeight) {
                top = window.innerHeight - rect.height - padding;
            }

            toolScrollTooltip.style.transform = "none";
            toolScrollTooltip.style.left = `${left}px`;
            toolScrollTooltip.style.top = `${top}px`;
        }

        function showToolScrollTooltip(text, event) {
            if (!toolScrollTooltip) return;
            if (event) {
                lastClientX = event.clientX;
                lastClientY = event.clientY;
            }

            toolScrollTooltip.textContent = text;
            toolScrollTooltip.classList.add('visible');
            positionToolScrollTooltip();

            if (toolScrollTooltipTimer) clearTimeout(toolScrollTooltipTimer);
            toolScrollTooltipTimer = setTimeout(() => {
                toolScrollTooltip.classList.remove('visible');
                toolScrollTooltip.style.transform = "translate(-9999px, -9999px)";
                toolScrollTooltip.style.left = "";
                toolScrollTooltip.style.top = "";
                toolScrollTooltipTimer = null;
            }, 1000);
        }

        function toolScrollKeyMatches(event) {
            return event.key && event.key.toLowerCase() === "t";
        }

        function cycleToolByWheel(direction, event) {
            const options = Array.from(toolSelect.options).filter(option => !option.disabled);
            if (options.length === 0) return;

            const currentIndex = Math.max(0, options.findIndex(option => option.value === activeTool));
            const nextIndex = (currentIndex + direction + options.length) % options.length;
            const nextOption = options[nextIndex];
            setActiveTool(nextOption.value);
            showToolScrollTooltip(nextOption.textContent, event);
        }

        function handleUndoRedoHotkey(event) {
            if (!event.ctrlKey || event.altKey || event.metaKey || shouldIgnoreHotbarKey(event.target)) return false;

            const key = event.key.toLowerCase();
            if (key === "z") {
                event.preventDefault();
                undoLastChange();
                return true;
            }

            if (key === "y") {
                event.preventDefault();
                redoLastChange();
                return true;
            }

            return false;
        }

        function toggleFullscreenHudVisibility() {
            if (!fullscreenHudOverlay) return;
            fullscreenHudVisible = !fullscreenHudVisible;
            fullscreenHudOverlay.classList.toggle("hidden", !fullscreenHudVisible);
        }

        document.addEventListener('mouseover', (event) => {
            const target = event.target.closest && event.target.closest('[data-tooltip]');
            if (target) showInstantTooltip(target, event);
        });

        document.addEventListener('mousemove', (event) => {
            lastClientX = event.clientX;
            lastClientY = event.clientY;
            moveInstantTooltip(event);
            positionToolScrollTooltip(event.clientX, event.clientY);
        });

        document.addEventListener('mouseout', (event) => {
            const target = event.target.closest && event.target.closest('[data-tooltip]');
            if (target && (!event.relatedTarget || !target.contains(event.relatedTarget))) hideInstantTooltip();
        });

        document.addEventListener('keydown', (event) => {
            if (handleUndoRedoHotkey(event)) return;

            if (isCanvasFullscreen() && event.key && event.key.toLowerCase() === "h" && !shouldIgnoreHotbarKey(event.target)) {
                event.preventDefault();
                toggleFullscreenHudVisibility();
                return;
            }

            if (toolScrollKeyMatches(event) && !shouldIgnoreHotbarKey(event.target)) {
                isToolScrollKeyHeld = true;
                event.preventDefault();
                return;
            }

            const slotIndex = hotbarSlotFromKeyEvent(event);
            if (slotIndex === null || shouldIgnoreHotbarKey(event.target)) return;

            heldHotbarSlot = slotIndex;
            if (!event.repeat && hotbarSlots[slotIndex]) {
                selectHotbarSlot(slotIndex);
            } else {
                renderHotbar();
            }
            event.preventDefault();
        });

        document.addEventListener('keyup', (event) => {
            if (toolScrollKeyMatches(event)) {
                isToolScrollKeyHeld = false;
                toolScrollDelta = 0;
                return;
            }

            const slotIndex = hotbarSlotFromKeyEvent(event);
            if (slotIndex === null) return;
            if (heldHotbarSlot === slotIndex) {
                heldHotbarSlot = null;
                renderHotbar();
            }
        });

        window.addEventListener('blur', () => {
            isToolScrollKeyHeld = false;
            toolScrollDelta = 0;
            heldHotbarSlot = null;
            renderHotbar();
        });

        document.body.dataset.paletteMode = paletteMode;

        function isCarpetBlockOption(block) {
            return !!(block && /_carpet$/.test(block.name));
        }

        function carpetBlockForColor(color) {
            return color.blocks.find(isCarpetBlockOption) || null;
        }

        function paletteColorsForMode() {
            return paletteMode === "carpet"
                ? MAP_COLOR_DATABASE.filter(color => carpetBlockForColor(color))
                : MAP_COLOR_DATABASE;
        }

        function usesBlockPaletteMode() {
            return paletteMode === "fullblock" || paletteMode === "staircased";
        }

        function supportGenerationEnabled() {
            return !!(selectedSupportBlock && selectedSupportBlock.key !== NO_SUPPORT_BLOCK_KEY);
        }

        function rgbFromHex(hex) {
            return [
                parseInt(hex.slice(1, 3), 16),
                parseInt(hex.slice(3, 5), 16),
                parseInt(hex.slice(5, 7), 16)
            ];
        }

        function baseRgbFromNormalHex(hex) {
            return rgbFromHex(hex).map(channel => {
                for (let base = 0; base <= 255; base++) {
                    if (Math.floor(base * 220 / 255) === channel) return base;
                }
                return Math.max(0, Math.min(255, Math.round(channel * 255 / 220)));
            });
        }

        function baseRgbForColor(color) {
            const baseHex = MAP_COLOR_BASE_HEX_OVERRIDES.get(color.mapartId);
            if (baseHex) return rgbFromHex(baseHex);
            if (!color.baseRgb) color.baseRgb = baseRgbFromNormalHex(color.hex);
            return color.baseRgb;
        }

        function rgbForMapTone(color, tone = "normal") {
            if (tone === "normal") return rgbFromHex(color.hex);

            const brightness = tone === "light" ? 255 : tone === "dark" ? 180 : 135;
            return baseRgbForColor(color).map(channel => Math.floor(channel * brightness / 255));
        }

        function rgbToPaletteHex(rgb) {
            return "FF" + rgb.map(channel =>
                Math.max(0, Math.min(255, channel)).toString(16).padStart(2, "0").toUpperCase()
            ).join("");
        }

        function ensureSelectedColorForMode() {
            const colors = paletteColorsForMode();
            if (!colors.includes(selectedColor)) {
                selectedColor = colors[0] || MAP_COLOR_DATABASE[0];
            }
        }

        function selectedBlockForColor(color) {
            if (paletteMode === "carpet") {
                return carpetBlockForColor(color) || color.blocks[0];
            }
            return color.blocks.find(block => block.key === selectedBlockByColorId[color.id]) || color.blocks[0];
        }

        function hotbarSlotFromKeyEvent(event) {
            if (/^[1-9]$/.test(event.key)) return Number(event.key) - 1;
            const digitMatch = event.code && event.code.match(/^Digit([1-9])$/);
            if (digitMatch) return Number(digitMatch[1]) - 1;
            const numpadMatch = event.code && event.code.match(/^Numpad([1-9])$/);
            if (numpadMatch) return Number(numpadMatch[1]) - 1;
            return null;
        }

        function shouldIgnoreHotbarKey(target) {
            if (!target) return false;
            const tag = target.tagName;
            return tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA" || target.isContentEditable;
        }

        function hotbarBlockForSlot(slot) {
            if (!slot) return null;
            const color = COLORS_BY_ID.get(slot.colorId);
            if (!color) return null;
            const block = color.blocks.find(option => option.key === slot.blockKey) || selectedBlockForColor(color);
            return { color, block };
        }

        function currentHotbarSnapshot(color = selectedColor) {
            const block = selectedBlockForColor(color);
            return block ? { colorId: color.id, blockKey: block.key } : null;
        }

        function hotbarSlotMatchesSelection(slot) {
            const current = currentHotbarSnapshot();
            return !!(slot && current && slot.colorId === current.colorId && slot.blockKey === current.blockKey);
        }

        function syncActiveHotbarSlot() {
            if (activeHotbarSlot !== null && hotbarSlotMatchesSelection(hotbarSlots[activeHotbarSlot])) return;
            const matchIndex = hotbarSlots.findIndex(hotbarSlotMatchesSelection);
            activeHotbarSlot = matchIndex === -1 ? null : matchIndex;
        }

        function assignHotbarSlot(slotIndex, color = selectedColor) {
            if (slotIndex === null || slotIndex < 0 || slotIndex >= hotbarSlots.length) return;
            const snapshot = currentHotbarSnapshot(color);
            if (!snapshot) return;
            hotbarSlots[slotIndex] = snapshot;
            activeHotbarSlot = slotIndex;
            renderHotbar();
        }

        function selectHotbarSlot(slotIndex) {
            const info = hotbarBlockForSlot(hotbarSlots[slotIndex]);
            if (!info || !paletteColorsForMode().includes(info.color)) return false;
            selectedColor = info.color;
            if (info.block && info.color.blocks.some(block => block.key === info.block.key)) {
                selectedBlockByColorId[info.color.id] = info.block.key;
            }
            activeHotbarSlot = slotIndex;
            renderPaletteRows();
            updateCursorPreview(lastMouseX, lastMouseZ);
            return true;
        }

        function resetHotbarSlots() {
            hotbarSlots.fill(null);
            activeHotbarSlot = null;
            heldHotbarSlot = null;
            renderHotbar();
        }

        function renderHotbar() {
            if (!hotbarSlotsElement) return;
            syncActiveHotbarSlot();
            hotbarSlotsElement.innerHTML = "";

            hotbarSlots.forEach((slot, index) => {
                const button = document.createElement('button');
                const info = hotbarBlockForSlot(slot);
                button.type = "button";
                button.className = `hotbar-slot ${slot ? "filled" : "empty"} ${activeHotbarSlot === index ? "active" : ""} ${heldHotbarSlot === index ? "assign-target" : ""}`;
                button.dataset.slot = String(index + 1);
                button.dataset.tooltip = info
                    ? info.block.displayName
                    : `Hold ${index + 1} and select a color to assign this slot`;
                button.onclick = () => {
                    if (slot) selectHotbarSlot(index);
                };

                const fill = document.createElement('div');
                fill.className = "hotbar-slot-fill";
                fill.style.backgroundColor = info ? info.color.hex : "#313244";
                button.appendChild(fill);
                hotbarSlotsElement.appendChild(button);
            });

            const selectedBlock = selectedBlockForColor(selectedColor);
            selectedBlockFill.style.backgroundColor = selectedColor ? selectedColor.hex : "#313244";
            selectedBlockPreview.dataset.tooltip = selectedBlock ? selectedBlock.displayName : "Current selected block";
        }

        function setPaletteStatus(message) {
            paletteImportStatus.textContent = message || "";
        }

        function renderSupportSelect() {
            supportBlockSelect.innerHTML = "";
            SUPPORT_BLOCK_OPTIONS.forEach(block => {
                const option = document.createElement('option');
                option.value = block.key;
                option.textContent = block.displayName;
                supportBlockSelect.appendChild(option);
            });
            supportBlockSelect.value = selectedSupportBlock.key;
        }

        function renderPaletteRows() {
            const paletteContainer = document.getElementById('paletteContainer');
            ensureSelectedColorForMode();
            paletteContainer.innerHTML = "";
            paletteContainer.classList.toggle("carpet-mode", paletteMode === "carpet");
            paletteContainer.classList.toggle("fullblock-mode", usesBlockPaletteMode());

            paletteColorsForMode().forEach(color => {
                const row = document.createElement('div');
                row.className = `palette-row ${color.id === selectedColor.id ? 'active' : ''}`;
                row.onclick = () => {
                    selectedColor = color;
                    if (heldHotbarSlot !== null) {
                        assignHotbarSlot(heldHotbarSlot, color);
                    } else {
                        syncActiveHotbarSlot();
                    }
                    renderPaletteRows();
                    updateCursorPreview(lastMouseX, lastMouseZ);
                };
                
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                row.appendChild(swatch);

                if (paletteMode === "carpet") {
                    const label = document.createElement('span');
                    label.innerText = color.label;
                    row.appendChild(label);
                } else {
                    const select = document.createElement('select');
                    select.onclick = e => e.stopPropagation();
                    color.blocks.forEach(block => {
                        const option = document.createElement('option');
                        option.value = block.key;
                        option.textContent = block.displayName + (block.supportRequired ? " *" : "");
                        select.appendChild(option);
                    });
                    select.value = selectedBlockForColor(color).key;
                    select.onchange = () => {
                        selectedBlockByColorId[color.id] = select.value;
                        selectedColor = color;
                        if (heldHotbarSlot !== null) {
                            assignHotbarSlot(heldHotbarSlot, color);
                        } else {
                            syncActiveHotbarSlot();
                        }
                        renderPaletteRows();
                        updateCursorPreview(lastMouseX, lastMouseZ);
                    };
                    row.appendChild(select);
                }

                paletteContainer.appendChild(row);
            });
            renderHotbar();
        }

        function setPaletteMode(mode, message = "", refreshPreview = true) {
            paletteMode = mode;
            document.body.dataset.paletteMode = paletteMode;
            renderPaletteRows();
            if (refreshPreview) updateCursorPreview(lastMouseX, lastMouseZ);
            if (message) setPaletteStatus(message);
        }

        function resetPaletteSelectionsToDefaults() {
            for (const color of MAP_COLOR_DATABASE) {
                selectedBlockByColorId[color.id] = color.blocks[0].key;
            }
            resetHotbarSlots();
            document.getElementById('paletteProfileInput').value = "";
            setPaletteStatus("");
        }

        function applyImportedBlockSelections() {
            const countsByColor = new Map();

            for (const lf of loadedFiles) {
                for (const visible of lf.visibleBlocks) {
                    const info = visible.blockInfo;
                    if (!info || !info.color || !info.block) continue;

                    if (!countsByColor.has(info.color.id)) {
                        countsByColor.set(info.color.id, new Map());
                    }

                    const blockCounts = countsByColor.get(info.color.id);
                    blockCounts.set(info.block.key, (blockCounts.get(info.block.key) || 0) + 1);
                }
            }

            let updated = 0;
            countsByColor.forEach((blockCounts, colorId) => {
                let bestKey = null;
                let bestCount = 0;
                blockCounts.forEach((count, key) => {
                    if (count > bestCount) {
                        bestKey = key;
                        bestCount = count;
                    }
                });

                const color = COLORS_BY_ID.get(colorId);
                if (color && bestKey && color.blocks.some(block => block.key === bestKey)) {
                    selectedBlockByColorId[colorId] = bestKey;
                    updated++;
                }
            });

            return updated;
        }

        supportBlockSelect.addEventListener('change', () => {
            selectedSupportBlock = SUPPORT_BLOCK_OPTIONS.find(block => block.key === supportBlockSelect.value) || DEFAULT_SUPPORT_BLOCK;
            if (usesBlockPaletteMode()) rebuildAllSupports();
        });

        renderSupportSelect();
        renderPaletteRows();

        function readFileAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function readTextFileAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        function nbtStringTag(name, value) {
            return { type: 8, name, value };
        }

        function getPaletteEntryName(entry) {
            return entry && entry.Name ? entry.Name.value : "";
        }

        function getPaletteEntryProperties(entry) {
            const props = {};
            if (entry && entry.Properties && entry.Properties.value) {
                for (const key in entry.Properties.value) {
                    props[key] = String(entry.Properties.value[key].value);
                }
            }
            return props;
        }

        function paletteEntryKey(entry) {
            return stateKey(getPaletteEntryName(entry), getPaletteEntryProperties(entry));
        }

        function createPaletteEntry(block) {
            const entry = { Name: nbtStringTag("Name", block.name) };
            const propKeys = Object.keys(block.properties || {});
            if (propKeys.length > 0) {
                const propValue = {};
                propKeys.forEach(key => {
                    propValue[key] = nbtStringTag(key, String(block.properties[key]));
                });
                entry.Properties = { type: 10, name: "Properties", value: propValue };
            }
            return entry;
        }

        function ensurePaletteState(lf, block) {
            if (!lf.paletteKeyToIndex) lf.paletteKeyToIndex = new Map();
            const existing = lf.paletteKeyToIndex.get(block.key);
            if (existing !== undefined) return existing;

            const idx = lf.structurePalette.findIndex(entry => paletteEntryKey(entry) === block.key);
            if (idx !== -1) {
                lf.paletteKeyToIndex.set(block.key, idx);
                return idx;
            }

            lf.structurePalette.push(createPaletteEntry(block));
            const newIndex = lf.structurePalette.length - 1;
            lf.paletteKeyToIndex.set(block.key, newIndex);
            return newIndex;
        }

        function coordKey(x, y, z) {
            return `${x},${y},${z}`;
        }

        function rebuildBlockLookup(lf) {
            lf.blockLookup = new Map();
            for (const block of lf.blocksList) {
                const pos = block.pos.value.list;
                lf.blockLookup.set(coordKey(pos[0], pos[1], pos[2]), block);
            }
        }

        function removeBlockFromFile(lf, block) {
            const idx = lf.blocksList.indexOf(block);
            if (idx !== -1) lf.blocksList.splice(idx, 1);
            const pos = block.pos.value.list;
            lf.blockLookup.delete(coordKey(pos[0], pos[1], pos[2]));
        }

        function blockAt(lf, x, y, z) {
            return lf.blockLookup.get(coordKey(x, y, z));
        }

        function blockUsesOption(lf, block, option) {
            if (!block) return false;
            const paletteEntry = lf.structurePalette[block.state.value];
            return paletteEntry && paletteEntryKey(paletteEntry) === option.key;
        }

        function isSupportMaterialBlock(lf, block) {
            return blockUsesOption(lf, block, selectedSupportBlock);
        }

        function paletteInfoForState(lf, stateId) {
            const entry = lf.structurePalette[stateId];
            if (!entry) return null;
            return BLOCK_BY_KEY.get(paletteEntryKey(entry)) || null;
        }

        function updateCellMetadata(cell) {
            const info = paletteInfoForState(cell.file, cell.blockRef.state.value);
            if (info) {
                cell.colorId = info.color.id;
                cell.blockKey = info.block.key;
            }
            return info;
        }

        function buildPaletteKeyMap(structurePalette) {
            const map = new Map();
            structurePalette.forEach((entry, idx) => {
                map.set(paletteEntryKey(entry), idx);
            });
            return map;
        }

        function detectEditableLayer(structurePalette, blocksList) {
            const counts = new Map();
            for (const block of blocksList) {
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;
                const y = block.pos.value.list[1];
                counts.set(y, (counts.get(y) || 0) + 1);
            }

            let bestY = -1;
            let bestCount = 0;
            counts.forEach((count, y) => {
                if (count > bestCount || (count === bestCount && y > bestY)) {
                    bestY = y;
                    bestCount = count;
                }
            });
            return bestY;
        }

        function getStructureSize(nbtRoot) {
            return nbtRoot.value.size && nbtRoot.value.size.value ? nbtRoot.value.size.value.list : [];
        }

        function detectNooblineZ(nbtRoot, structurePalette, blocksList) {
            const size = getStructureSize(nbtRoot);
            const declaredZ = size[2] || 0;
            const zCounts = new Map();
            let minZ = Infinity;
            let maxZ = -Infinity;

            for (const block of blocksList) {
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;
                const z = block.pos.value.list[2];
                zCounts.set(z, (zCounts.get(z) || 0) + 1);
                if (z < minZ) minZ = z;
                if (z > maxZ) maxZ = z;
            }

            if (!Number.isFinite(minZ)) return null;

            // MapArtCraft schematic NBTs add a scaffold/noobline row before the 128 artwork rows.
            // For a normal 1x1 map that makes the structure 128x129, with artwork at z=1..128.
            const looksLikeMapartcraftDepth = declaredZ >= 129 || (maxZ - minZ + 1) > 128;
            return looksLikeMapartcraftDepth && zCounts.has(minZ) ? minZ : null;
        }

        function isNooblineBlock(lf, block) {
            return lf.nooblineZ !== null &&
                block.pos.value.list[2] === lf.nooblineZ;
        }

        function collectVisibleArtworkBlocks(structurePalette, blocksList, nooblineZ) {
            const visible = new Map();
            for (const block of blocksList) {
                const pos = block.pos.value.list;
                if (nooblineZ !== null && pos[2] === nooblineZ) continue;

                const entry = structurePalette[block.state.value];
                if (!entry) continue;

                const key = `${pos[0]},${pos[2]}`;
                const existing = visible.get(key);
                if (!existing || pos[1] > existing.block.pos.value.list[1]) {
                    visible.set(key, {
                        block,
                        blockInfo: BLOCK_BY_KEY.get(paletteEntryKey(entry)) || null
                    });
                }
            }
            return Array.from(visible.values()).filter(item => item.blockInfo);
        }

        function buildTopMapBlockByRawXZ(structurePalette, blocksList) {
            const columns = new Map();
            for (const block of blocksList) {
                const pos = block.pos.value.list;
                const entry = structurePalette[block.state.value];
                if (!entry || !BLOCK_BY_KEY.has(paletteEntryKey(entry))) continue;

                const key = `${pos[0]},${pos[2]}`;
                const existing = columns.get(key);
                if (!existing || pos[1] > existing.y) {
                    columns.set(key, { y: pos[1], block });
                }
            }
            return columns;
        }

        function visibleBlocksAreStaircased(visibleBlocks) {
            if (visibleBlocks.length === 0) return false;
            const firstY = visibleBlocks[0].block.pos.value.list[1];
            return visibleBlocks.some(visible => visible.block.pos.value.list[1] !== firstY);
        }

        function inferSupportBlockFromLoadedFiles() {
            const counts = new Map();
            for (const lf of loadedFiles) {
                for (const cell of lf.editableCellsByLocal.values()) {
                    const support = blockAt(lf, cell.rawX, cell.rawY - 1, cell.rawZ);
                    if (!support) continue;
                    const entry = lf.structurePalette[support.state.value];
                    if (!entry) continue;
                    const key = paletteEntryKey(entry);
                    if (SUPPORT_BLOCK_OPTIONS.some(option => option.key !== NO_SUPPORT_BLOCK_KEY && option.key === key)) {
                        counts.set(key, (counts.get(key) || 0) + 1);
                    }
                }
            }

            let bestKey = null;
            let bestCount = 0;
            counts.forEach((count, key) => {
                if (count > bestCount) {
                    bestKey = key;
                    bestCount = count;
                }
            });

            selectedSupportBlock = SUPPORT_BLOCK_OPTIONS.find(option => option.key === bestKey) || DEFAULT_SUPPORT_BLOCK;
            renderSupportSelect();
        }

        function decodeMapartPreset(encodedPreset) {
            if (!encodedPreset || !/^[0-9a-zQ-ZA-P]+$/.test(encodedPreset)) return null;
            const selections = [];
            const presetRegex = /([0-9a-z]+)(?=([Q-ZA-P]+))/g;
            let match;
            const digitMap = { Q: "0", R: "1", S: "2", T: "3", U: "4", V: "5", W: "6", X: "7", Y: "8", Z: "9" };

            while ((match = presetRegex.exec(encodedPreset)) !== null) {
                const colorId = parseInt(match[1], 36);
                const encodedBlock = match[2]
                    .replace(/[Q-Z]/g, char => digitMap[char])
                    .toLowerCase();
                const presetIndex = parseInt(encodedBlock, 26);
                if (Number.isFinite(colorId) && Number.isFinite(presetIndex)) {
                    selections.push({ mapartId: colorId, presetIndex });
                }
            }
            return selections;
        }

        function encodeMapartPresetIndex(presetIndex) {
            const digitMap = ["Q", "R", "S", "T", "U", "V", "W", "X", "Y", "Z"];
            return Math.max(0, Number(presetIndex) || 0)
                .toString(26)
                .replace(/[0-9]/g, digit => digitMap[Number(digit)])
                .replace(/[a-p]/g, char => char.toUpperCase());
        }

        function encodeCurrentMapartPreset() {
            return MAP_COLOR_DATABASE
                .map(color => {
                    const block = selectedBlockForColor(color);
                    const presetIndex = block && block.mapartPresetIndex !== null ? block.mapartPresetIndex : 0;
                    return color.mapartId.toString(36) + encodeMapartPresetIndex(presetIndex);
                })
                .join("");
        }

        function currentPaletteProfileText() {
            const preset = encodeCurrentMapartPreset();
            const staircasingEnabled = paletteMode === "staircased";
            const lines = [
                "; paint.net Palette File",
                "; Generated by NBT Mapart Editor",
                `; Link to preset: https://mike2b2t.github.io/mapartcraft/?preset=${preset}`,
                `; staircasing: ${staircasingEnabled ? "enabled" : "disabled"}`,
                "; unobtainable colours: disabled",
                `; palette mode: ${paletteMode}`,
                ""
            ];

            for (const color of MAP_COLOR_DATABASE) {
                const block = selectedBlockForColor(color);
                lines.push(`; ${color.mapartId} ${color.label}: ${block ? block.displayName : "Default"}`);
            }

            lines.push("");
            if (staircasingEnabled) {
                for (const color of MAP_COLOR_DATABASE) {
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "dark")));
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "normal")));
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "light")));
                }
                lines.push("FF-64-64-64");
                lines.push("FF-64-64-64");
                lines.push("FF-64-64-64");
            } else {
                for (const color of MAP_COLOR_DATABASE) {
                    lines.push(rgbToPaletteHex(rgbForMapTone(color, "normal")));
                }
            }

            return lines.join("\n") + "\n";
        }

        function profileModeFromText(text) {
            const modeMatch = text.match(/;\s*palette mode:\s*(carpet|fullblock|staircased)/i);
            if (modeMatch) return modeMatch[1].toLowerCase();
            if (/;\s*staircasing:\s*enabled/i.test(text)) return "staircased";
            if (/;\s*staircasing:\s*disabled/i.test(text)) return "fullblock";
            return null;
        }

        function shouldApplyProfileMode(profileMode) {
            if (!profileMode || profileMode === paletteMode) return false;
            if (loadedFiles.length === 0) return true;
            if (profileMode === "staircased" && usesBlockPaletteMode()) return true;
            return profileMode === "carpet" && paletteMode === "carpet";
        }

        function importPaletteProfileText(text) {
            const presetMatch = text.match(/[?&]preset=([0-9a-zQ-ZA-P]+)/) || text.match(/preset\s*[:=]\s*([0-9a-zQ-ZA-P]+)/i);
            if (!presetMatch) {
                setPaletteStatus("No MapArtCraft preset link found in palette file.");
                return;
            }

            const selections = decodeMapartPreset(presetMatch[1]);
            if (!selections) {
                setPaletteStatus("Could not decode the MapArtCraft preset.");
                return;
            }

            let applied = 0;
            let fallback = 0;
            let skipped = 0;
            selections.forEach(selection => {
                const color = COLOR_BY_MAPART_ID.get(selection.mapartId);
                if (!color) {
                    skipped++;
                    return;
                }

                const block = MAPART_BLOCK_BY_COLOR_AND_PRESET.get(`${selection.mapartId}:${selection.presetIndex}`);
                if (block) {
                    selectedBlockByColorId[color.id] = block.key;
                    applied++;
                } else {
                    selectedBlockByColorId[color.id] = color.blocks[0].key;
                    fallback++;
                }
            });

            const profileMode = profileModeFromText(text);
            if (shouldApplyProfileMode(profileMode)) {
                setPaletteMode(profileMode, "", false);
            } else {
                renderPaletteRows();
            }
            updateCursorPreview(lastMouseX, lastMouseZ);
            const modeNote = profileMode ? ` Mode: ${profileMode}.` : "";
            setPaletteStatus(`Imported profile: ${applied} matched, ${fallback} fallback, ${skipped} skipped.${modeNote}`);
        }

        document.getElementById('paletteProfileInput').addEventListener('change', async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            try {
                importPaletteProfileText(await readTextFileAsync(file));
            } catch (error) {
                setPaletteStatus("Failed to import palette profile.");
                console.error(error);
            }
        });

        // --- 3. MULTI-FILE PARSER AND STITCHER ---
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            originalFileName = files[0].name.replace('.nbt', '').replace(/_[0-9\-]+_[0-9\-]+$/, '');
            document.getElementById('saveZipBtn').innerText = "Processing...";
            resetPaletteSelectionsToDefaults();
            loadedFiles = [];
            mapWidth = 0;
            mapHeight = 0;
            gridMap = [];
            
            let minGridX = Infinity, maxGridX = -Infinity;
            let minGridZ = Infinity, maxGridZ = -Infinity;

            for (const file of files) {
                try {
                    const dataBuffer = await readFileAsync(file);
                    let data = new Uint8Array(dataBuffer);
                    try { data = pako.ungzip(data); } catch (err) {}
                    
                    const parser = new NBTParser(data);
                    const nbtRoot = parser.readTag();

                    if (!nbtRoot || !nbtRoot.value.size || !nbtRoot.value.blocks) {
                        console.warn(`Skipping ${file.name}: Not a valid structure.`);
                        continue;
                    }

                    let structurePalette;
                    if (nbtRoot.value.palette) {
                        structurePalette = nbtRoot.value.palette.value.list;
                    } else if (nbtRoot.value.palettes) {
                        structurePalette = nbtRoot.value.palettes.value.list[0].list; 
                    } else {
                        console.warn(`Skipping ${file.name}: No palette found.`);
                        continue;
                    }

                    const blocksList = nbtRoot.value.blocks.value.list;
                    const editableLayerY = detectEditableLayer(structurePalette, blocksList);
                    if (editableLayerY === -1) {
                        console.warn(`Skipping ${file.name}: No known map-color blocks found.`);
                        continue;
                    }
                    const nooblineZ = detectNooblineZ(nbtRoot, structurePalette, blocksList);
                    const visibleBlocks = collectVisibleArtworkBlocks(structurePalette, blocksList, nooblineZ);
                    const topMapBlockByRawXZ = buildTopMapBlockByRawXZ(structurePalette, blocksList);

                    let fMinX = Infinity, fMinZ = Infinity;
                    
                    for (const visible of visibleBlocks) {
                        const px = visible.block.pos.value.list[0];
                        const pz = visible.block.pos.value.list[2];
                        if (px < fMinX) fMinX = px;
                        if (pz < fMinZ) fMinZ = pz;
                    }

                    if (!Number.isFinite(fMinX) || !Number.isFinite(fMinZ)) {
                        console.warn(`Skipping ${file.name}: No editable blocks found on detected layer.`);
                        continue;
                    }

                    let gX = 0, gZ = 0;
                    const match = file.name.match(/_([0-9\-]+)_([0-9\-]+)\.nbt$/);
                    if (match) {
                        gX = parseInt(match[1]);
                        gZ = parseInt(match[2]);
                    }

                    if (gX < minGridX) minGridX = gX;
                    if (gX > maxGridX) maxGridX = gX;
                    if (gZ < minGridZ) minGridZ = gZ;
                    if (gZ > maxGridZ) maxGridZ = gZ;

                    const loadedFile = {
                        name: file.name,
                        nbtRoot: nbtRoot,
                        blocksList: blocksList,
                        structurePalette: structurePalette,
                        paletteKeyToIndex: buildPaletteKeyMap(structurePalette),
                        layerY: editableLayerY,
                        nooblineZ: nooblineZ,
                        minX: fMinX,
                        minZ: fMinZ,
                        gridX: gX,
                        gridZ: gZ,
                        visibleBlocks: visibleBlocks,
                        topMapBlockByRawXZ: topMapBlockByRawXZ,
                        staircased: visibleBlocksAreStaircased(visibleBlocks),
                        editableCellsByLocal: new Map(),
                        supportCreatedKeys: new Set()
                    };
                    rebuildBlockLookup(loadedFile);
                    loadedFiles.push(loadedFile);

                } catch (error) {
                    console.error(`Error loading ${file.name}:`, error);
                }
            }

            if (loadedFiles.length === 0) {
                alert("No valid map files could be loaded.");
                document.getElementById('saveZipBtn').innerText = "Download as ZIP Folder";
                return;
            }

            const carpetOnlyImport = loadedFiles.every(lf =>
                lf.visibleBlocks.length > 0 &&
                lf.visibleBlocks.every(visible => isCarpetBlockOption(visible.blockInfo.block))
            );
            const staircasedImport = !carpetOnlyImport && loadedFiles.some(lf => lf.staircased);
            const importedMode = carpetOnlyImport ? "carpet" : (staircasedImport ? "staircased" : "fullblock");
            const importedSelections = carpetOnlyImport ? 0 : applyImportedBlockSelections();
            setPaletteMode(
                importedMode,
                carpetOnlyImport
                    ? "Carpet-only NBT detected. Switched to the carpet palette."
                    : staircasedImport
                        ? `Staircased full-block NBT detected. Preserving block heights and matched ${importedSelections} dropdowns from imported blocks.`
                        : `Flat full-block or mixed NBT detected. Matched ${importedSelections} dropdowns from imported blocks.`,
                false
            );

            // Calculate exact total size based on the furthest global block mapped
            let maxGlobalXNeeded = 0;
            let maxGlobalZNeeded = 0;
            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;
                for (const visible of lf.visibleBlocks) {
                    const b = visible.block;
                    const localX = b.pos.value.list[0] - lf.minX;
                    const localZ = b.pos.value.list[2] - lf.minZ;
                    const globalX = offsetX + localX;
                    const globalZ = offsetZ + localZ;
                    if (globalX > maxGlobalXNeeded) maxGlobalXNeeded = globalX;
                    if (globalZ > maxGlobalZNeeded) maxGlobalZNeeded = globalZ;
                }
            }

            mapWidth = maxGlobalXNeeded + 1;
            mapHeight = maxGlobalZNeeded + 1;
            gridMap = new Array(mapWidth * mapHeight).fill(null);

            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;

                for (const visible of lf.visibleBlocks) {
                    const b = visible.block;
                    const blockInfo = visible.blockInfo;
                    const localX = b.pos.value.list[0] - lf.minX;
                    const localZ = b.pos.value.list[2] - lf.minZ;
                    const globalX = offsetX + localX;
                    const globalZ = offsetZ + localZ;
                    
                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                        const cell = {
                            blockRef: b,
                            file: lf,
                            rawX: b.pos.value.list[0],
                            rawY: b.pos.value.list[1],
                            rawZ: b.pos.value.list[2],
                            localX,
                            localZ,
                            globalX,
                            globalZ,
                            colorId: blockInfo.color.id,
                            blockKey: blockInfo.block.key
                        };
                        gridMap[globalZ * mapWidth + globalX] = cell;
                        lf.editableCellsByLocal.set(`${localX},${localZ}`, cell);
                    }
                }
            }

            if (usesBlockPaletteMode()) {
                inferSupportBlockFromLoadedFiles();
            } else {
                renderSupportSelect();
            }

            canvas.width = mapWidth;
            canvas.height = mapHeight;
            previewCanvas.width = mapWidth;
            previewCanvas.height = mapHeight;

            currentScale = Math.min(4, 512 / Math.max(mapWidth, mapHeight));
            applyZoom();

            canvasContainer.scrollLeft = (canvas.offsetWidth - canvasContainer.offsetWidth) / 2;
            canvasContainer.scrollTop = (canvas.offsetHeight - canvasContainer.offsetHeight) / 2;
            
            undoStack = [];
            redoStack = [];
            updateButtons();
            renderFullCanvas();
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);

            document.getElementById('saveZipBtn').innerText = "Download as ZIP Folder";
        });

        // --- SUPPORT BLOCKS ---
        function cellByLocal(lf, localX, localZ) {
            return lf.editableCellsByLocal.get(`${localX},${localZ}`);
        }

        function isEditableArtworkBlock(lf, block) {
            if (!block) return false;
            const pos = block.pos.value.list;
            const cell = cellByLocal(lf, pos[0] - lf.minX, pos[2] - lf.minZ);
            return !!(cell && cell.blockRef === block);
        }

        function cellNeedsSupport(cell) {
            if (!usesBlockPaletteMode()) return false;
            const info = updateCellMetadata(cell);
            return !!(info && info.block.supportRequired);
        }

        function directSupportPositionsForCell(cell) {
            const y = cell.rawY - 1;
            if (y < 0) return [];

            const pos = { x: cell.rawX, y, z: cell.rawZ };
            return pos.z === cell.file.nooblineZ ? [] : [pos];
        }

        function optimizedSupportPositionsForCell(cell) {
            const y = cell.rawY - 1;
            if (y < 0) return [];

            return [
                { x: cell.rawX, y, z: cell.rawZ },
                { x: cell.rawX, y, z: cell.rawZ + 1 }
            ].concat(cell.rawZ > 0 ? [{ x: cell.rawX, y, z: cell.rawZ - 1 }] : [])
             .filter(pos => pos.z !== cell.file.nooblineZ);
        }

        function supportPositionsForCell(cell) {
            return paletteMode === "staircased"
                ? directSupportPositionsForCell(cell)
                : optimizedSupportPositionsForCell(cell);
        }

        function supportChangeRecordForCell(cell) {
            return {
                cell,
                previousSupportPositions: cellNeedsSupport(cell) ? supportPositionsForCell(cell) : []
            };
        }

        function normalizeSupportChangeRecords(changedItems) {
            return changedItems
                .map(item => item && item.cell ? item : { cell: item, previousSupportPositions: [] })
                .filter(record => record.cell);
        }

        function createSupportBlockAt(lf, pos) {
            if (!supportGenerationEnabled()) return;
            if (pos.y < 0 || blockAt(lf, pos.x, pos.y, pos.z)) return;
            const state = ensurePaletteState(lf, selectedSupportBlock);
            const supportBlock = {
                pos: { type: 9, name: "pos", value: { type: 3, list: [pos.x, pos.y, pos.z] } },
                state: { type: 3, name: "state", value: state }
            };
            lf.blocksList.push(supportBlock);
            const key = coordKey(pos.x, pos.y, pos.z);
            lf.blockLookup.set(key, supportBlock);
            lf.supportCreatedKeys.add(key);
        }

        function syncSupportsForCells(changedCells) {
            if (!usesBlockPaletteMode()) return;

            const byFile = new Map();
            for (const record of normalizeSupportChangeRecords(changedCells)) {
                const cell = record.cell;
                if (!byFile.has(cell.file)) byFile.set(cell.file, []);
                byFile.get(cell.file).push(record);
            }

            byFile.forEach((records, lf) => {
                const affectedCells = new Map();
                const expired = new Map();

                for (const record of records) {
                    const cell = record.cell;
                    for (const pos of record.previousSupportPositions || []) {
                        expired.set(coordKey(pos.x, pos.y, pos.z), pos);
                    }

                    for (let dz = -2; dz <= 2; dz++) {
                        const neighbor = cellByLocal(lf, cell.localX, cell.localZ + dz);
                        if (neighbor) affectedCells.set(`${neighbor.localX},${neighbor.localZ}`, neighbor);
                    }
                }

                const desired = new Map();
                if (supportGenerationEnabled()) {
                    affectedCells.forEach(cell => {
                        const positions = supportPositionsForCell(cell);
                        if (cellNeedsSupport(cell)) {
                            positions.forEach(pos => desired.set(coordKey(pos.x, pos.y, pos.z), pos));
                        }
                    });
                }

                expired.forEach((pos, key) => {
                    if (desired.has(key)) return;
                    const existing = blockAt(lf, pos.x, pos.y, pos.z);
                    if (existing && !isEditableArtworkBlock(lf, existing) && lf.supportCreatedKeys.has(key)) {
                        removeBlockFromFile(lf, existing);
                        lf.supportCreatedKeys.delete(key);
                    }
                });

                desired.forEach(pos => {
                    const existing = blockAt(lf, pos.x, pos.y, pos.z);
                    if (!existing) {
                        createSupportBlockAt(lf, pos);
                    }
                });
            });
        }

        function rebuildAllSupports() {
            if (loadedFiles.length === 0 || !usesBlockPaletteMode()) return;
            for (const lf of loadedFiles) {
                for (const key of Array.from(lf.supportCreatedKeys)) {
                    const existing = lf.blockLookup.get(key);
                    if (existing) removeBlockFromFile(lf, existing);
                    lf.supportCreatedKeys.delete(key);
                }
            }
            if (!supportGenerationEnabled()) return;
            syncSupportsForCells(gridMap.filter(Boolean));
        }

        function updateStructureSize(lf) {
