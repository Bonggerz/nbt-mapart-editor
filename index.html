            }

            restoreFullscreenHud();
            if (fullscreenRestoreView) {
                currentScale = fullscreenRestoreView.scale;
                applyZoom();
                requestAnimationFrame(() => {
                    canvasContainer.scrollLeft = fullscreenRestoreView.scrollLeft;
                    canvasContainer.scrollTop = fullscreenRestoreView.scrollTop;
                    fullscreenRestoreView = null;
                    updateCursorPreview(lastMouseX, lastMouseZ);
                });
            }
        });

        window.addEventListener('resize', () => {
            if (isTextToolPopupOpen()) positionTextToolPopup();
            if (colorPickerWindow.classList.contains("visible")) positionColorPickerWindow();
            if (isCanvasFullscreen()) {
                fitCanvasToFullscreen();
                if (fullscreenHudOverlay) {
                    fullscreenHudOverlay.querySelectorAll(".fullscreen-hud-panel").forEach(panel => {
                        clampHudPanel(panel, parseFloat(panel.style.left) || 0, parseFloat(panel.style.top) || 0);
                    });
                }
            }
        });

        canvasContainer.addEventListener('wheel', function(e) {
            lastClientX = e.clientX;
            lastClientY = e.clientY;

            if (paletteDragActive) {
                e.preventDefault();
                restorePaletteDragScroll();
                return;
            }

            if (isToolScrollKeyHeld) {
                e.preventDefault();
                toolScrollDelta += e.deltaY || e.deltaX;

                if (Math.abs(toolScrollDelta) >= 40) {
                    const direction = toolScrollDelta > 0 ? 1 : -1;
                    toolScrollDelta = 0;
                    cycleToolByWheel(direction, e);
                }
                return;
            }

            if (loadedFiles.length === 0) return;
            e.preventDefault(); 
            
            const rectBefore = canvas.getBoundingClientRect();
            const containerRectBefore = canvasContainer.getBoundingClientRect();
            const mouseContentX = e.clientX - containerRectBefore.left - canvasContainer.clientLeft;
            const mouseContentY = e.clientY - containerRectBefore.top - canvasContainer.clientTop;
            const renderedScaleX = rectBefore.width / mapWidth;
            const renderedScaleY = rectBefore.height / mapHeight;
            const mapXUnderMouse = (e.clientX - rectBefore.left) / renderedScaleX;
            const mapZUnderMouse = (e.clientY - rectBefore.top) / renderedScaleY;

            const zoomSpeed = 0.15;
            let direction = e.deltaY > 0 ? -1 : 1;
            
            currentScale += direction * zoomSpeed * currentScale; 
            if (currentScale < minimumCanvasScale()) currentScale = minimumCanvasScale();
            if (currentScale > 30) currentScale = 30;
            
            applyZoom();

            const rectAfter = canvas.getBoundingClientRect();
            const containerRectAfter = canvasContainer.getBoundingClientRect();
            const canvasContentLeft = rectAfter.left - containerRectAfter.left - canvasContainer.clientLeft + canvasContainer.scrollLeft;
            const canvasContentTop = rectAfter.top - containerRectAfter.top - canvasContainer.clientTop + canvasContainer.scrollTop;
            const newRenderedScaleX = rectAfter.width / mapWidth;
            const newRenderedScaleY = rectAfter.height / mapHeight;
            const maxScrollLeft = Math.max(0, canvasContainer.scrollWidth - canvasContainer.clientWidth);
            const maxScrollTop = Math.max(0, canvasContainer.scrollHeight - canvasContainer.clientHeight);
            canvasContainer.scrollLeft = Math.max(0, Math.min(maxScrollLeft, canvasContentLeft + mapXUnderMouse * newRenderedScaleX - mouseContentX));
            canvasContainer.scrollTop = Math.max(0, Math.min(maxScrollTop, canvasContentTop + mapZUnderMouse * newRenderedScaleY - mouseContentY));
            
            const {x, z} = getMouseCoords(e);
            updateCursorPreview(x, z);
            
        }, { passive: false });

        // --- AUTO-DETECT EXPORT LOGIC ---
        function downloadBlob(dataArray, fileName) {
            const blob = new Blob([dataArray], { type: "application/octet-stream" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link); 
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }

        function downloadText(text, fileName) {
            const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }

        function saveCurrentProfile() {
            downloadText(currentPaletteProfileText(), `${originalFileName || "nbt_mapart"}_profile.txt`);
            setPaletteStatus("Saved palette profile from current dropdown selections.");
        }

        function paletteEntryOrAir(lf, state) {
            return lf.structurePalette[state] || { Name: nbtStringTag("Name", "minecraft:air") };
        }

        function nooblineBlocksForFile(lf) {
            if (!lf || lf.nooblineZ === null) return [];
            return lf.blocksList.filter(block => isNooblineBlock(lf, block));
        }

        function nooblineFallbackForFile(lf) {
            if (!lf || lf.nooblineZ === null) return null;

            const nooblineBlock = nooblineBlocksForFile(lf)[0];
            if (nooblineBlock) {
                return {
                    file: lf,
                    state: nooblineBlock.state.value,
                    y: nooblineBlock.pos.value.list[1]
                };
            }

            return {
                file: lf,
                state: ensurePaletteState(lf, DEFAULT_SUPPORT_BLOCK),
                y: lf.layerY
            };
        }

        function nooblineFallbackForFiles(files) {
            for (const lf of files) {
                const fallback = nooblineFallbackForFile(lf);
                if (fallback) return fallback;
            }
            return null;
        }

        function combinedNooblineBlocks(minGridX, minGridZ, width) {
            const frontFiles = loadedFiles.filter(lf => lf.nooblineZ !== null && lf.gridZ === minGridZ);
            const fallback = nooblineFallbackForFiles(frontFiles.length > 0 ? frontFiles : loadedFiles);
            if (!fallback) return [];

            const nooblineBlocks = [];
            const usedX = new Set();

            for (const lf of frontFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                for (const block of nooblineBlocksForFile(lf)) {
                    const pos = block.pos.value.list;
                    const x = offsetX + pos[0] - lf.minX;
                    if (x < 0 || x >= width || usedX.has(x)) continue;

                    nooblineBlocks.push({
                        x,
                        y: pos[1],
                        z: -1,
                        state: block.state.value,
                        file: lf
                    });
                    usedX.add(x);
                }
            }

            for (let x = 0; x < width; x++) {
                if (usedX.has(x)) continue;
                nooblineBlocks.push({
                    x,
                    y: fallback.y,
                    z: -1,
                    state: fallback.state,
                    file: fallback.file
                });
            }

            return nooblineBlocks;
        }

        function nooblineBlocksForChunk(lf, cX, cZ, chunkW, chunkH) {
            const fallback = nooblineFallbackForFile(lf);
            if (!fallback) return [];

            const chunkBlocks = [];
            const usedX = new Set();
            const chunkStartX = cX * chunkW;

            if (cZ === 0) {
                for (const block of nooblineBlocksForFile(lf)) {
                    const pos = block.pos.value.list;
                    const globalX = pos[0] - lf.minX;
                    const normX = globalX - chunkStartX;
                    if (normX < 0 || normX >= chunkW || usedX.has(normX)) continue;

                    chunkBlocks.push({
                        normX,
                        rawY: pos[1],
                        normZ: -1,
                        state: block.state.value,
                        file: lf
                    });
                    usedX.add(normX);
                }
            } else {
                const previousGlobalZ = cZ * chunkH - 1;
                for (let x = 0; x < chunkW; x++) {
                    const globalX = chunkStartX + x;
                    const cell = globalX >= 0 && globalX < mapWidth && previousGlobalZ >= 0 && previousGlobalZ < mapHeight
                        ? gridMap[previousGlobalZ * mapWidth + globalX]
                        : null;
                    chunkBlocks.push({
                        normX: x,
                        rawY: cell ? cell.rawY : fallback.y,
                        normZ: -1,
                        state: fallback.state,
                        file: fallback.file
                    });
                    usedX.add(x);
                }
            }

            for (let x = 0; x < chunkW; x++) {
                if (usedX.has(x)) continue;
                chunkBlocks.push({
                    normX: x,
                    rawY: fallback.y,
                    normZ: -1,
                    state: fallback.state,
                    file: fallback.file
                });
            }

            return chunkBlocks;
        }

        function hasVisiblePaintLayers() {
            return editorLayers.some(layer => layer.kind === "paint" && layer.visible && layer.cells.size > 0);
        }

        function exportNeedsLayerFlattening() {
            return hasVisiblePaintLayers() || editorLayers.some(layer => layer.kind === "base" && !layer.visible);
        }

        function captureLoadedFileStructuralState() {
            return loadedFiles.map(lf => ({
                lf,
                blocksList: lf.blocksList.slice(),
                supportCreatedKeys: new Set(lf.supportCreatedKeys)
            }));
        }

        function restoreLoadedFileStructuralState(states) {
            for (const state of states) {
                state.lf.blocksList.splice(0, state.lf.blocksList.length, ...state.blocksList);
                state.lf.supportCreatedKeys = new Set(state.supportCreatedKeys);
                rebuildBlockLookup(state.lf);
                updateStructureSize(state.lf);
            }
        }

        function applyVisibleLayersToBaseForExport() {
            if (!exportNeedsLayerFlattening()) return;

            const targetPixels = [];
            const supportRecordCells = new Set();
            const toneOverridesByColumn = new Map();
            const airBlock = makeBlock("Air", "minecraft:air");

            for (const cell of gridMap) {
                if (!cell) continue;
                const pixel = compositePixelAt(cell.globalX, cell.globalZ);

                const currentInfo = updateCellMetadata(cell);
                const targetBlock = pixel && pixel.block ? pixel.block : airBlock;
                const targetColor = pixel && pixel.color ? pixel.color : null;
                const currentTone = paletteMode === "staircased" ? staircasedToneForCell(cell) : null;
                const targetTone = pixel && pixel.tone ? normalizeTone(pixel.tone) : null;
                const stateChanged = !currentInfo || !targetColor || currentInfo.color.id !== targetColor.id || currentInfo.block.key !== targetBlock.key;
                const toneChanged = manualShadingAvailable() && targetTone && currentTone !== targetTone;
                if (!stateChanged && !toneChanged) continue;

                targetPixels.push({ cell, color: targetColor, block: targetBlock, tone: targetTone });
                supportRecordCells.add(cell);

                if (toneChanged) {
                    if (!toneOverridesByColumn.has(cell.globalX)) toneOverridesByColumn.set(cell.globalX, new Map());
                    toneOverridesByColumn.get(cell.globalX).set(cell, targetTone);
                    collectColumnCells(cell.globalX).forEach(columnCell => supportRecordCells.add(columnCell));
                }
            }

            if (targetPixels.length === 0) return;

            const supportRecords = Array.from(supportRecordCells, cell => supportChangeRecordForCell(cell));

            for (const target of targetPixels) {
                const state = ensurePaletteState(target.cell.file, target.block);
                target.cell.blockRef.state.value = state;
                target.cell.colorId = target.color ? target.color.id : null;
                target.cell.blockKey = target.block.key;
            }

            toneOverridesByColumn.forEach((overrides, globalX) => {
                solveColumnTones(globalX, overrides);
            });

            syncSupportsForCells(supportRecords);
        }

        async function withFlattenedLayersForExport(callback) {
            if (!exportNeedsLayerFlattening()) {
                return await callback();
            }

            const editorSnapshot = createEditorSnapshot();
            const fileStates = captureLoadedFileStructuralState();
            try {
                applyVisibleLayersToBaseForExport();
                return await callback();
            } finally {
                applySnapshot(editorSnapshot);
                restoreLoadedFileStructuralState(fileStates);
                renderFullCanvas();
            }
        }

        function createCombinedNbtRoot() {
            if (loadedFiles.length === 0) throw new Error("Upload files first.");

            const minGridX = Math.min(...loadedFiles.map(lf => lf.gridX));
            const minGridZ = Math.min(...loadedFiles.map(lf => lf.gridZ));
            const sourceBlocks = [];

            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;

                for (const block of lf.blocksList) {
                    if (isNooblineBlock(lf, block)) continue;

                    const pos = block.pos.value.list;
                    const globalX = offsetX + pos[0] - lf.minX;
                    const globalZ = offsetZ + pos[2] - lf.minZ;
                    let finalState = block.state.value;

                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                        const cell = gridMap[globalZ * mapWidth + globalX];
                        if (cell && cell.blockRef === block) {
                            finalState = cell.blockRef.state.value;
                        }
                    }

                    sourceBlocks.push({
                        x: globalX,
                        y: pos[1],
                        z: globalZ,
                        state: finalState,
                        file: lf
                    });
                }
            }

            if (sourceBlocks.length === 0) throw new Error("No blocks available to export.");

            const maxSourceX = sourceBlocks.reduce((max, block) => Math.max(max, block.x), -1);
            const nooblineWidth = Math.max(mapWidth, maxSourceX + 1);
            sourceBlocks.push(...combinedNooblineBlocks(minGridX, minGridZ, nooblineWidth));

            let minX = Infinity, minY = Infinity, minZ = Infinity;
            let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
            for (const block of sourceBlocks) {
                if (block.x < minX) minX = block.x;
                if (block.y < minY) minY = block.y;
                if (block.z < minZ) minZ = block.z;
                if (block.x > maxX) maxX = block.x;
                if (block.y > maxY) maxY = block.y;
                if (block.z > maxZ) maxZ = block.z;
            }

            const unifiedPalette = [];
            const paletteMap = new Map();
            const finalNbtBlocks = [];

            for (const block of sourceBlocks) {
                const paletteEntry = paletteEntryOrAir(block.file, block.state);
                const blockKey = paletteEntryKey(paletteEntry);

                if (!paletteMap.has(blockKey)) {
                    paletteMap.set(blockKey, unifiedPalette.length);
                    unifiedPalette.push(paletteEntry);
                }

                finalNbtBlocks.push({
                    pos: { type: 9, name: "pos", value: { type: 3, list: [block.x - minX, block.y - minY, block.z - minZ] } },
                    state: { type: 3, name: "state", value: paletteMap.get(blockKey) }
                });
            }

            const firstFile = loadedFiles[0];
            return {
                type: 10, name: "", value: {
                    DataVersion: { type: 3, name: "DataVersion", value: firstFile.nbtRoot.value.DataVersion ? firstFile.nbtRoot.value.DataVersion.value : 2586 },
                    size: { type: 9, name: "size", value: { type: 3, list: [maxX - minX + 1, maxY - minY + 1, maxZ - minZ + 1] } },
                    palette: { type: 9, name: "palette", value: { type: 10, list: unifiedPalette } },
                    blocks: { type: 9, name: "blocks", value: { type: 10, list: finalNbtBlocks } },
                    entities: { type: 9, name: "entities", value: { type: 10, list: [] } }
                }
            };
        }

        async function downloadCombinedNbt() {
            if (loadedFiles.length === 0) { alert("Upload files first."); return; }

            const button = document.getElementById('saveSingleBtn');
            const originalText = button.innerText;
            button.innerText = "Building NBT...";

            try {
                await withFlattenedLayersForExport(async () => {
                    const writer = new NBTWriter();
                    writer.writeTag(createCombinedNbtRoot());
                    downloadBlob(pako.gzip(writer.getOutput()), `${originalFileName || "mapart"}_combined.nbt`);
                });
            } catch (error) {
                alert("Failed to export single NBT: " + error.message);
            }

            button.innerText = originalText;
        }

        async function processExports(asZip) {
            if (loadedFiles.length === 0) { alert("Upload files first."); return; }
            
            const btnId = asZip ? 'saveZipBtn' : 'saveIndivBtn';
            const originalText = document.getElementById(btnId).innerText;
            document.getElementById(btnId).innerText = asZip ? "Compressing ZIP..." : "Downloading...";
            
            try {
                await withFlattenedLayersForExport(async () => {
                const zip = new JSZip();
                const needsSplit = loadedFiles.length === 1 && (mapWidth > 128 || mapHeight > 128);
                let filesToExport = []; 
                
                if (needsSplit) {
                    const chunkW = 128;
                    const chunkH = 128;
                    const lf = loadedFiles[0];
                    let maxExportGlobalX = mapWidth - 1;
                    let maxExportGlobalZ = mapHeight - 1;
                    for (const b of lf.blocksList) {
                        if (isNooblineBlock(lf, b)) continue;
                        const globalX = b.pos.value.list[0] - lf.minX;
                        const globalZ = b.pos.value.list[2] - lf.minZ;
                        if (globalX > maxExportGlobalX) maxExportGlobalX = globalX;
                        if (globalZ > maxExportGlobalZ) maxExportGlobalZ = globalZ;
                    }
                    const cols = Math.ceil((maxExportGlobalX + 1) / chunkW);
                    const rows = Math.ceil((maxExportGlobalZ + 1) / chunkH);

                    for (let cZ = 0; cZ < rows; cZ++) {
                        for (let cX = 0; cX < cols; cX++) {
                            let chunkBlocks = [];
                            let cMinX = Infinity, cMinY = Infinity, cMinZ = Infinity;
                            let cMaxX = -Infinity, cMaxY = -Infinity, cMaxZ = -Infinity;

                            for (const b of lf.blocksList) {
                                if (isNooblineBlock(lf, b)) continue;
                                const rawX = b.pos.value.list[0];
                                const rawY = b.pos.value.list[1];
                                const rawZ = b.pos.value.list[2];
                                
                                const globalX = rawX - lf.minX;
                                const globalZ = rawZ - lf.minZ;
                                
                                const targetCX = Math.max(0, Math.min(cols - 1, Math.floor(globalX / chunkW)));
                                const targetCZ = Math.max(0, Math.min(rows - 1, Math.floor(globalZ / chunkH)));

                                if (targetCX === cX && targetCZ === cZ) {
                                    let finalState = b.state.value;
                                    
                                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                                        const cell = gridMap[globalZ * mapWidth + globalX];
                                        if (cell && cell.blockRef === b) {
                                            finalState = cell.blockRef.state.value;
                                        }
                                    }

                                    if (rawX < cMinX) cMinX = rawX;
                                    if (rawX > cMaxX) cMaxX = rawX;
                                    if (rawY < cMinY) cMinY = rawY;
                                    if (rawY > cMaxY) cMaxY = rawY;
                                    if (rawZ < cMinZ) cMinZ = rawZ;
                                    if (rawZ > cMaxZ) cMaxZ = rawZ;

                                    const normX = globalX - (cX * chunkW);
                                    const normZ = globalZ - (cZ * chunkH);

                                    chunkBlocks.push({ normX, rawY, normZ, state: finalState, file: lf });
                                }
                            }

                            if (chunkBlocks.length === 0) continue;

                            for (const nooblineBlock of nooblineBlocksForChunk(lf, cX, cZ, chunkW, chunkH)) {
                                chunkBlocks.push(nooblineBlock);
                                if (nooblineBlock.rawY < cMinY) cMinY = nooblineBlock.rawY;
                                if (nooblineBlock.rawY > cMaxY) cMaxY = nooblineBlock.rawY;
                            }

                            const unifiedPalette = [];
                            const paletteMap = new Map();
                            const finalNbtBlocks = [];
                            let cMinNormZ = Infinity;
                            let cMaxNormZ = -Infinity;

                            for (const cb of chunkBlocks) {
                                if (cb.normZ < cMinNormZ) cMinNormZ = cb.normZ;
                                if (cb.normZ > cMaxNormZ) cMaxNormZ = cb.normZ;
                            }

                            for (const cb of chunkBlocks) {
                                const origPaletteTag = paletteEntryOrAir(cb.file, cb.state);
                                const blockKey = paletteEntryKey(origPaletteTag);
                                
                                if (!paletteMap.has(blockKey)) {
                                    paletteMap.set(blockKey, unifiedPalette.length);
                                    unifiedPalette.push(origPaletteTag);
                                }
                                const newId = paletteMap.get(blockKey);

                                finalNbtBlocks.push({
                                    pos: { type: 9, name: "pos", value: { type: 3, list: [cb.normX, cb.rawY - cMinY, cb.normZ - cMinNormZ] } },
                                    state: { type: 3, name: "state", value: newId }
                                });
                            }

                            const chunkNbtRoot = {
                                type: 10, name: "", value: {
                                    DataVersion: { type: 3, name: "DataVersion", value: lf.nbtRoot.value.DataVersion ? lf.nbtRoot.value.DataVersion.value : 2586 },
                                    size: { type: 9, name: "size", value: { type: 3, list: [128, cMaxY - cMinY + 1, cMaxNormZ - cMinNormZ + 1] } },
                                    palette: { type: 9, name: "palette", value: { type: 10, list: unifiedPalette } },
                                    blocks: { type: 9, name: "blocks", value: { type: 10, list: finalNbtBlocks } },
                                    entities: { type: 9, name: "entities", value: { type: 10, list: [] } }
                                }
                            };

                            const writer = new NBTWriter();
                            writer.writeTag(chunkNbtRoot);
                            filesToExport.push({ name: `${originalFileName}_${cX}_${cZ}.nbt`, data: pako.gzip(writer.getOutput()) });
                        }
                    }
                } else {
                    for (let i = 0; i < loadedFiles.length; i++) {
                        const lf = loadedFiles[i];
                        updateStructureSize(lf);
                        const writer = new NBTWriter();
                        writer.writeTag(lf.nbtRoot);
                        filesToExport.push({ name: lf.name, data: pako.gzip(writer.getOutput()) });
                    }
                }
                
                if (asZip) {
                    for (const f of filesToExport) zip.file(f.name, f.data);
                    const content = await zip.generateAsync({type:"blob"});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(content);
                    link.download = needsSplit ? `${originalFileName}_split.zip` : `${originalFileName}_edited.zip`;
                    link.click();
                } else {
                    for (const f of filesToExport) {
                        downloadBlob(f.data, f.name);
                        await new Promise(resolve => setTimeout(resolve, 200));
                    }
                }
                
                });
            } catch (error) {
                alert("Failed to export: " + error.message);
            }
            document.getElementById(btnId).innerText = originalText;
        }

        document.getElementById('saveProfileBtn').addEventListener('click', saveCurrentProfile);
        document.getElementById('saveZipBtn').addEventListener('click', () => processExports(true));
        document.getElementById('saveSingleBtn').addEventListener('click', downloadCombinedNbt);
        document.getElementById('saveIndivBtn').addEventListener('click', () => processExports(false));

    </script>
