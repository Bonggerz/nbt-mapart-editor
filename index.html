            if (!lf.nbtRoot.value.size || !lf.nbtRoot.value.size.value || !lf.nbtRoot.value.size.value.list) return;
            let maxX = 0, maxY = 0, maxZ = 0;
            for (const block of lf.blocksList) {
                const pos = block.pos.value.list;
                if (pos[0] > maxX) maxX = pos[0];
                if (pos[1] > maxY) maxY = pos[1];
                if (pos[2] > maxZ) maxZ = pos[2];
            }
            lf.nbtRoot.value.size.value.list = [maxX + 1, maxY + 1, maxZ + 1];
        }

        // --- DRAWING AND RENDERING ---
        function previousStaircaseY(cell) {
            const previousGlobalZ = cell.globalZ - 1;
            if (previousGlobalZ >= 0) {
                const previousCell = gridMap[previousGlobalZ * mapWidth + cell.globalX];
                if (previousCell) return previousCell.rawY;
            }

            const previousColumn = cell.file.topMapBlockByRawXZ
                ? cell.file.topMapBlockByRawXZ.get(`${cell.rawX},${cell.rawZ - 1}`)
                : null;
            return previousColumn ? previousColumn.y : null;
        }

        function staircasedToneForCell(cell) {
            if (paletteMode !== "staircased") return "normal";

            const previousY = previousStaircaseY(cell);
            if (previousY === null) return "normal";
            if (cell.rawY > previousY) return "light";
            if (cell.rawY < previousY) return "dark";
            return "normal";
        }

        function rgbForCellColor(cell, color) {
            return rgbForMapTone(color, staircasedToneForCell(cell));
        }

        function rgbToCss(rgb) {
            return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
        }

        function renderFullCanvas() {
            if (mapWidth === 0 || mapHeight === 0) return;
            const imageData = ctx.createImageData(mapWidth, mapHeight);
            
            for(let i=0; i<imageData.data.length; i++) imageData.data[i] = 0; 

            for(let i = 0; i < gridMap.length; i++) {
                const cell = gridMap[i];
                if (cell) {
                    const blockInfo = updateCellMetadata(cell);
                    
                    if (blockInfo) {
                        const [r, g, b] = rgbForCellColor(cell, blockInfo.color);
                        
                        const pxIdx = i * 4;
                        imageData.data[pxIdx] = r;
                        imageData.data[pxIdx+1] = g;
                        imageData.data[pxIdx+2] = b;
                        imageData.data[pxIdx+3] = 255;
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function applyBrush(cx, cz, updateCanvasDirectly) {
            const size = parseInt(document.getElementById('brushSize').value) || 1;
            const offsetStart = Math.floor(size / 2);
            const offsetEnd = size - offsetStart - 1; 
            
            let changed = false;
            const changedCells = [];
            const targetBlock = selectedBlockForColor(selectedColor);
            for(let bx = cx - offsetStart; bx <= cx + offsetEnd; bx++) {
                for(let bz = cz - offsetStart; bz <= cz + offsetEnd; bz++) {
                    if (bx >= 0 && bx < mapWidth && bz >= 0 && bz < mapHeight) {
                        const cell = gridMap[bz * mapWidth + bx];
                        
                        if (cell) {
                            const targetPaletteIndex = ensurePaletteState(cell.file, targetBlock);
                            
                            if (cell.blockRef.state.value !== targetPaletteIndex) {
                                const supportChange = supportChangeRecordForCell(cell);
                                cell.blockRef.state.value = targetPaletteIndex;
                                cell.colorId = selectedColor.id;
                                cell.blockKey = targetBlock.key;
                                changedCells.push(supportChange);
                                changed = true;
                                if (updateCanvasDirectly) {
                                    ctx.fillStyle = rgbToCss(rgbForCellColor(cell, selectedColor));
                                    ctx.fillRect(bx, bz, 1, 1);
                                }
                            }
                        }
                    }
                }
            }
            if (changedCells.length > 0) syncSupportsForCells(changedCells);
            return changed;
        }

        function cellAtGlobal(x, z) {
            if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) return null;
            return gridMap[z * mapWidth + x] || null;
        }

        function currentTextToolSize() {
            return textToolSize.value === "5" ? 5 : 7;
        }

        function glyphForTextChar(char, size) {
            const glyphs = size === 5 ? TEXT_GLYPHS_5 : TEXT_GLYPHS_7;
            return glyphs[char.toUpperCase()] || glyphs["?"];
        }

        function textPixelsFor(text, size) {
            const pixels = [];
            const lines = String(text || "").split(/\r?\n/);
            const lineHeight = size + 1;

            lines.forEach((line, lineIndex) => {
                let cursorX = 0;
                for (const char of line) {
                    const glyph = glyphForTextChar(char, size);
                    const glyphWidth = Math.max(...glyph.map(row => row.length));

                    glyph.forEach((row, rowIndex) => {
                        for (let col = 0; col < row.length; col++) {
                            const marker = row[col];
                            if (marker !== "." && marker !== " ") {
                                pixels.push({
                                    x: cursorX + col,
                                    z: lineIndex * lineHeight + rowIndex
                                });
                            }
                        }
                    });

                    cursorX += glyphWidth + 1;
                }
            });

            return pixels;
        }

        function previewTextAt(anchorX, anchorZ, text, size) {
            for (const pixel of textPixelsFor(text, size)) {
                const x = anchorX + pixel.x;
                const z = anchorZ + pixel.z;
                if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) continue;

                previewCtx.fillStyle = previewFillStyleAt(x, z);
                previewCtx.fillRect(x, z, 1, 1);
            }
        }

        function applyTextAt(anchorX, anchorZ, text, size, updateCanvasDirectly) {
            const pixels = textPixelsFor(text, size);
            if (pixels.length === 0) return false;

            let changed = false;
            const changedCells = [];
            const targetBlock = selectedBlockForColor(selectedColor);

            for (const pixel of pixels) {
                const x = anchorX + pixel.x;
                const z = anchorZ + pixel.z;
                const cell = cellAtGlobal(x, z);
                if (!cell) continue;

                const targetPaletteIndex = ensurePaletteState(cell.file, targetBlock);
                if (cell.blockRef.state.value !== targetPaletteIndex) {
                    const supportChange = supportChangeRecordForCell(cell);
                    cell.blockRef.state.value = targetPaletteIndex;
                    cell.colorId = selectedColor.id;
                    cell.blockKey = targetBlock.key;
                    changedCells.push(supportChange);
                    changed = true;

                    if (updateCanvasDirectly) {
                        ctx.fillStyle = rgbToCss(rgbForCellColor(cell, selectedColor));
                        ctx.fillRect(x, z, 1, 1);
                    }
                }
            }

            if (changedCells.length > 0) syncSupportsForCells(changedCells);
            return changed;
        }

        function isTextToolPopupOpen() {
            return !!(textToolPopup && textToolPopup.classList.contains("visible"));
        }

        function validTextAnchor(x, z) {
            return Number.isFinite(x) && Number.isFinite(z) && x >= 0 && x < mapWidth && z >= 0 && z < mapHeight;
        }

        function defaultTextToolAnchor() {
            if (validTextAnchor(lastMouseX, lastMouseZ)) {
                return { x: lastMouseX, z: lastMouseZ };
            }

            if (mapWidth > 0 && mapHeight > 0) {
                const canvasRect = canvas.getBoundingClientRect();
                const containerRect = canvasContainer.getBoundingClientRect();
                const centerClientX = Math.max(canvasRect.left, Math.min(canvasRect.right - 1, containerRect.left + containerRect.width / 2));
                const centerClientY = Math.max(canvasRect.top, Math.min(canvasRect.bottom - 1, containerRect.top + containerRect.height / 2));
                const scaleX = mapWidth / canvasRect.width;
                const scaleY = mapHeight / canvasRect.height;
                return {
                    x: Math.max(0, Math.min(mapWidth - 1, Math.floor((centerClientX - canvasRect.left) * scaleX))),
                    z: Math.max(0, Math.min(mapHeight - 1, Math.floor((centerClientY - canvasRect.top) * scaleY)))
                };
            }

            return { x: 0, z: 0 };
        }

        function clampTextToolPopupPosition(left, top) {
            if (!textToolPopup) return { left, top };

            const padding = 12;
            const rect = textToolPopup.getBoundingClientRect();
            const width = rect.width || textToolPopup.offsetWidth || 240;
            const height = rect.height || textToolPopup.offsetHeight || 160;
            const maxLeft = Math.max(padding, window.innerWidth - width - padding);
            const maxTop = Math.max(padding, window.innerHeight - height - padding);

            return {
                left: Math.max(padding, Math.min(maxLeft, left)),
                top: Math.max(padding, Math.min(maxTop, top))
            };
        }

        function defaultTextToolPopupPosition() {
            const padding = 12;
            const gap = 12;
            const canvasRect = canvasContainer.getBoundingClientRect();
            const popupRect = textToolPopup.getBoundingClientRect();
            const popupWidth = popupRect.width || textToolPopup.offsetWidth || 240;
            let left = canvasRect.left - popupWidth - gap;
            if (left < padding) left = canvasRect.left + padding;
            const top = canvasRect.top + padding;
            return clampTextToolPopupPosition(left, top);
        }

        function positionTextToolPopup() {
            if (!textToolPopup) return;

            if (!textToolPopupWasDragged || !textToolPopupPosition) {
                textToolPopupPosition = defaultTextToolPopupPosition();
            } else {
                textToolPopupPosition = clampTextToolPopupPosition(textToolPopupPosition.left, textToolPopupPosition.top);
            }

            textToolPopup.style.left = `${textToolPopupPosition.left}px`;
            textToolPopup.style.top = `${textToolPopupPosition.top}px`;
        }

        function startTextToolPopupDrag(event) {
            if (event.button !== 0) return;
            const rect = textToolPopup.getBoundingClientRect();
            activeTextToolPopupDrag = {
                pointerId: event.pointerId,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            try {
                event.currentTarget.setPointerCapture(event.pointerId);
            } catch (error) {
                // Pointer capture is best-effort; document capture handles release.
            }
            event.preventDefault();
            event.stopPropagation();
        }

        function moveTextToolPopupDrag(event) {
            if (!activeTextToolPopupDrag) return;
            textToolPopupWasDragged = true;
            textToolPopupPosition = clampTextToolPopupPosition(
                event.clientX - activeTextToolPopupDrag.offsetX,
                event.clientY - activeTextToolPopupDrag.offsetY
            );
            positionTextToolPopup();
            event.preventDefault();
        }

        function finishTextToolPopupDrag(event) {
            if (!activeTextToolPopupDrag) return;
            if (textToolDragHandle && activeTextToolPopupDrag.pointerId !== undefined) {
                try {
                    textToolDragHandle.releasePointerCapture(activeTextToolPopupDrag.pointerId);
                } catch (error) {
                    // The browser may already have released it.
                }
            }
            activeTextToolPopupDrag = null;
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
        }

        function refreshTextToolPreview() {
            if (!isTextToolPopupOpen() || !textToolAnchor) {
                previewCtx.clearRect(0, 0, mapWidth, mapHeight);
                hideCursorSelectionFrame();
                return;
            }

            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            showCursorSelectionFrame(textToolAnchor.x, textToolAnchor.z);

            const text = textToolInput.value;
            if (text) {
                previewTextAt(textToolAnchor.x, textToolAnchor.z, text, currentTextToolSize());
            }
        }

        function showTextToolPopup(x, z) {
            textToolAnchor = { x, z };
            textToolPopup.classList.add("visible");
            positionTextToolPopup();
            refreshTextToolPreview();
            textToolInput.focus();
            textToolInput.select();
        }

        function hideTextToolPopup(refreshPreview = true) {
            if (!textToolPopup) return;
            textToolPopup.classList.remove("visible");
            textToolAnchor = null;
            finishTextToolPopupDrag();
            if (refreshPreview) updateCursorPreview(lastMouseX, lastMouseZ);
        }

        function placeTextToolText() {
            if (!textToolAnchor) return;

            const text = textToolInput.value;
            if (!text) {
                textToolInput.focus();
                return;
            }

            saveCurrentStateToUndo();
            if (!applyTextAt(textToolAnchor.x, textToolAnchor.z, text, currentTextToolSize(), true)) {
                undoStack.pop();
                updateButtons();
            }

            refreshTextToolPreview();
            textToolInput.focus();
        }

        function keepTextPreviewIfActive() {
            if (activeTool === "text" && isTextToolPopupOpen() && textToolAnchor) {
                refreshTextToolPreview();
                return true;
            }
            return false;
        }

        function selectColorFromCell(x, z) {
            const cell = cellAtGlobal(x, z);
            if (!cell) return false;

            const info = updateCellMetadata(cell);
            if (!info || !info.color || !info.block) return false;

            selectedColor = info.color;
            if (info.color.blocks.some(block => block.key === info.block.key)) {
                selectedBlockByColorId[info.color.id] = info.block.key;
            }

            if (heldHotbarSlot !== null) {
                const snapshot = currentHotbarSnapshot(info.color);
                if (snapshot) {
                    hotbarSlots[heldHotbarSlot] = snapshot;
                    activeHotbarSlot = heldHotbarSlot;
                }
            } else {
                syncActiveHotbarSlot();
            }

            renderPaletteRows();
            updateCursorPreview(x, z);
            return true;
        }

        function cellMatchesSource(cell, sourceColorId, sourceBlockKey) {
            const info = cell ? updateCellMetadata(cell) : null;
            return !!(info && info.color.id === sourceColorId && info.block.key === sourceBlockKey);
        }

        function applyBucketFill(cx, cz) {
            const startCell = cellAtGlobal(cx, cz);
            if (!startCell) return false;

            const sourceInfo = updateCellMetadata(startCell);
            const targetBlock = selectedBlockForColor(selectedColor);
            if (!sourceInfo || !sourceInfo.color || !sourceInfo.block || !targetBlock) return false;

            const sourceColorId = sourceInfo.color.id;
            const sourceBlockKey = sourceInfo.block.key;
            if (sourceColorId === selectedColor.id && sourceBlockKey === targetBlock.key) return false;

            const changedCells = [];
            const visited = new Set();
            const stack = [{ x: cx, z: cz }];
            let changed = false;

            while (stack.length > 0) {
                const { x, z } = stack.pop();
                if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) continue;

                const index = z * mapWidth + x;
                if (visited.has(index)) continue;
                visited.add(index);

                const cell = gridMap[index];
                if (!cellMatchesSource(cell, sourceColorId, sourceBlockKey)) continue;

                const targetPaletteIndex = ensurePaletteState(cell.file, targetBlock);
                if (cell.blockRef.state.value !== targetPaletteIndex) {
                    const supportChange = supportChangeRecordForCell(cell);
                    cell.blockRef.state.value = targetPaletteIndex;
                    cell.colorId = selectedColor.id;
                    cell.blockKey = targetBlock.key;
                    changedCells.push(supportChange);
                    changed = true;
                }

                stack.push(
                    { x: x + 1, z },
                    { x: x - 1, z },
                    { x, z: z + 1 },
                    { x, z: z - 1 }
                );
            }

            if (changedCells.length > 0) {
                syncSupportsForCells(changedCells);
                renderFullCanvas();
            }
            return changed;
        }

        function drawLine(x0, y0, x1, y1, updateCanvasDirectly) {
            let dx = Math.abs(x1 - x0);
            let dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1;
            let sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;
            let changed = false;

            while(true) {
                if (applyBrush(x0, y0, updateCanvasDirectly)) changed = true;
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
            return changed;
        }

        // --- PREVIEW CURSOR LAYER ---
        function previewFillStyleAt(x, z) {
            const cell = cellAtGlobal(x, z);
            const rgb = cell ? rgbForCellColor(cell, selectedColor) : rgbForMapTone(selectedColor, "normal");
            return rgbToCss(rgb);
        }

        function previewBrush(cx, cz, size, offsetStart) {
            const offsetEnd = size - offsetStart - 1;
            for (let bx = cx - offsetStart; bx <= cx + offsetEnd; bx++) {
                for (let bz = cz - offsetStart; bz <= cz + offsetEnd; bz++) {
                    if (bx < 0 || bx >= mapWidth || bz < 0 || bz >= mapHeight) continue;
                    previewCtx.fillStyle = previewFillStyleAt(bx, bz);
                    previewCtx.fillRect(bx, bz, 1, 1);
                }
            }
        }

        function previewLine(x0, y0, x1, y1, size, offsetStart) {
            let dx = Math.abs(x1 - x0);
            let dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1;
            let sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;

            while(true) {
                previewBrush(x0, y0, size, offsetStart);
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
        }

        function hideCursorSelectionFrame() {
            if (cursorSelectionFrame) cursorSelectionFrame.style.display = "none";
        }

        function showCursorSelectionFrame(x, z) {
            if (!cursorSelectionFrame || x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) {
                hideCursorSelectionFrame();
                return;
            }

            const canvasRect = canvas.getBoundingClientRect();
            const wrapperRect = canvas.parentElement.getBoundingClientRect();
            const cellWidth = canvasRect.width / mapWidth;
            const cellHeight = canvasRect.height / mapHeight;

            cursorSelectionFrame.style.display = "block";
            cursorSelectionFrame.style.left = `${canvasRect.left - wrapperRect.left + x * cellWidth}px`;
            cursorSelectionFrame.style.top = `${canvasRect.top - wrapperRect.top + z * cellHeight}px`;
            cursorSelectionFrame.style.width = `${cellWidth}px`;
            cursorSelectionFrame.style.height = `${cellHeight}px`;
        }

        function updateCursorPreview(x, z) {
            if (mapWidth === 0 || loadedFiles.length === 0) {
                hideCursorSelectionFrame();
                return;
            }
            
            previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            
            if (isPanning) {
                if (!keepTextPreviewIfActive()) hideCursorSelectionFrame();
                return;
            }

            const size = parseInt(document.getElementById('brushSize').value) || 1;
            const offsetStart = Math.floor(size / 2);

            if (activeTool === 'text') {
                if (keepTextPreviewIfActive()) return;
                if (!validTextAnchor(x, z)) {
                    hideCursorSelectionFrame();
                    return;
                }
                showCursorSelectionFrame(x, z);
                return;
            }

            if (x < 0 || x >= mapWidth || z < 0 || z >= mapHeight) {
                hideCursorSelectionFrame();
                return;
            }

            showCursorSelectionFrame(x, z);

            if (activeTool === 'picker') return;

            if (isDrawing && activeTool === 'line') {
                previewLine(lineStartX, lineStartZ, x, z, size, offsetStart);
                return; 
            }

            if (activeTool === 'bucket') {
                previewCtx.fillStyle = previewFillStyleAt(x, z);
                previewCtx.fillRect(x, z, 1, 1);
                return;
            }
            
            previewBrush(x, z, size, offsetStart);
        }

        // --- HISTORY (UNDO/REDO) ---
        function saveCurrentStateToUndo() {
            const snapshot = new Int32Array(gridMap.length);
            for(let i=0; i<gridMap.length; i++) {
                snapshot[i] = gridMap[i] ? gridMap[i].blockRef.state.value : -1;
            }
            undoStack.push(snapshot);
            redoStack = []; 
            updateButtons();
        }

        function applySnapshot(snapshot) {
            const changedCells = [];
            for(let i=0; i<gridMap.length; i++) {
                const cell = gridMap[i];
                if (cell && snapshot[i] !== -1 && cell.blockRef.state.value !== snapshot[i]) {
                    const supportChange = supportChangeRecordForCell(cell);
                    cell.blockRef.state.value = snapshot[i];
                    updateCellMetadata(cell);
                    changedCells.push(supportChange);
                }
            }
            if (changedCells.length > 0) syncSupportsForCells(changedCells);
            renderFullCanvas();
        }

        function undoLastChange() {
            if (undoStack.length === 0) return;
            const currentState = new Int32Array(gridMap.length);
            for(let i=0; i<gridMap.length; i++) currentState[i] = gridMap[i] ? gridMap[i].blockRef.state.value : -1;
            redoStack.push(currentState);
            
            const previousState = undoStack.pop();
            applySnapshot(previousState);
            updateButtons();
        }

        function redoLastChange() {
            if (redoStack.length === 0) return;
            const currentState = new Int32Array(gridMap.length);
            for(let i=0; i<gridMap.length; i++) currentState[i] = gridMap[i] ? gridMap[i].blockRef.state.value : -1;
            undoStack.push(currentState);
            
            const nextState = redoStack.pop();
            applySnapshot(nextState);
            updateButtons();
        }

        undoBtn.addEventListener('click', undoLastChange);
        redoBtn.addEventListener('click', redoLastChange);

        function updateButtons() {
            undoBtn.disabled = undoStack.length === 0;
            redoBtn.disabled = redoStack.length === 0;
        }

        function getMouseCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = mapWidth / rect.width;
            const scaleY = mapHeight / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const z = Math.floor((e.clientY - rect.top) * scaleY);
            return {x, z};
        }

        // --- MOUSE EVENTS ---
        canvasContainer.addEventListener('contextmenu', e => e.preventDefault());

        canvasContainer.addEventListener('mouseleave', () => {
            if (keepTextPreviewIfActive()) return;
            if (previewCtx && mapWidth > 0) previewCtx.clearRect(0, 0, mapWidth, mapHeight);
            hideCursorSelectionFrame();
        });

        canvasContainer.addEventListener('mousedown', (e) => { 
            if (loadedFiles.length === 0) return;
            
            if (e.button === 0) { 
                const {x, z} = getMouseCoords(e);

                if (activeTool === 'text') {
                    lastMouseX = x;
                    lastMouseZ = z;
                    showTextToolPopup(x, z);
                    return;
                }

                if (activeTool === 'picker') {
                    const picked = selectColorFromCell(x, z);
                    lastMouseX = x;
                    lastMouseZ = z;
                    if (picked) restoreToolAfterPicker();
                    updateCursorPreview(x, z);
                    return;
                }

                if (activeTool === 'bucket') {
                    saveCurrentStateToUndo();
                    if (!applyBucketFill(x, z)) {
                        undoStack.pop();
                        updateButtons();
                    }
                    lastMouseX = x;
                    lastMouseZ = z;
                    updateCursorPreview(x, z);
                    return;
                }

                saveCurrentStateToUndo(); 
                isDrawing = true; 
                hasDrawnInCurrentStroke = false;
                
                if (activeTool === 'line') {
                    lineStartX = x;
                    lineStartZ = z;
                } else {
                    if (applyBrush(x, z, true)) {
                        hasDrawnInCurrentStroke = true;
                    }
                }
                lastMouseX = x;
                lastMouseZ = z;
                updateCursorPreview(x, z);
            } 
            else if (e.button === 2) { 
                isPanning = true;
                startPanX = e.clientX;
                startPanY = e.clientY;
                startScrollLeft = canvasContainer.scrollLeft;
                startScrollTop = canvasContainer.scrollTop;
                document.body.style.cursor = 'grab';
                updateCursorPreview(-1, -1); 
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            if (activeHudDrag || targetIsInFullscreenHud(e.target)) return;
            const {x, z} = getMouseCoords(e);

            if (isDrawing) {
                if (activeTool === 'line') {
                    // Line preview layer handles visuals
                } else {
                    if (x !== lastMouseX || z !== lastMouseZ) {
                        if (drawLine(lastMouseX, lastMouseZ, x, z, true)) {
                            hasDrawnInCurrentStroke = true;
                        }
                    }
                }
            } else if (isPanning) {
                const dx = e.clientX - startPanX;
                const dy = e.clientY - startPanY;
                canvasContainer.scrollLeft = startScrollLeft - dx;
                canvasContainer.scrollTop = startScrollTop - dy;
            }
            
            lastMouseX = x;
            lastMouseZ = z;
            if (!isPanning) updateCursorPreview(x, z);
        });
        
        window.addEventListener('mouseup', (e) => { 
            if (isDrawing) {
                if (activeTool === 'line') {
                    const {x, z} = getMouseCoords(e);
                    if (drawLine(lineStartX, lineStartZ, x, z, true)) {
                        hasDrawnInCurrentStroke = true;
                    }
                }

                if (!hasDrawnInCurrentStroke) {
                    undoStack.pop();
                    updateButtons();
                }
            }

            isDrawing = false; 
            isPanning = false;
            document.body.style.cursor = 'default';
            
            const {x, z} = getMouseCoords(e);
            updateCursorPreview(x, z);
        });

        function applyZoom() {
            const w = Math.floor(mapWidth * currentScale) + 'px';
            const h = Math.floor(mapHeight * currentScale) + 'px';
            canvas.style.width = w; canvas.style.height = h;
            previewCanvas.style.width = w; previewCanvas.style.height = h;
        }

        function isCanvasFullscreen() {
            return document.fullscreenElement === canvasContainer;
        }

        function minimumCanvasScale() {
            return isCanvasFullscreen() ? 0.1 : 0.5;
        }

        function centerCanvasView() {
            canvasContainer.scrollLeft = Math.max(0, (canvasContainer.scrollWidth - canvasContainer.clientWidth) / 2);
            canvasContainer.scrollTop = Math.max(0, (canvasContainer.scrollHeight - canvasContainer.clientHeight) / 2);
        }

        function fitCanvasToFullscreen() {
            if (!isCanvasFullscreen() || mapWidth === 0 || mapHeight === 0) return;

            const fitScale = Math.min(
                canvasContainer.clientWidth / mapWidth,
                canvasContainer.clientHeight / mapHeight
            );
            currentScale = Math.max(minimumCanvasScale(), Math.min(30, fitScale));
            applyZoom();

            requestAnimationFrame(() => {
                centerCanvasView();
                updateCursorPreview(lastMouseX, lastMouseZ);
            });
        }

        function targetIsInFullscreenHud(target) {
            return !!(fullscreenHudOverlay && target && fullscreenHudOverlay.contains(target));
        }

        function clampHudPanel(panel, left, top) {
            const maxLeft = Math.max(0, window.innerWidth - panel.offsetWidth);
            const maxTop = Math.max(0, window.innerHeight - panel.offsetHeight);
            panel.style.left = `${Math.max(0, Math.min(maxLeft, left))}px`;
            panel.style.top = `${Math.max(0, Math.min(maxTop, top))}px`;
        }

        function startHudPanelDrag(event) {
            if (event.button !== 0) return;
            try {
                event.currentTarget.setPointerCapture(event.pointerId);
            } catch (error) {
                // Pointer capture is best-effort; capture-phase release still handles the drag.
            }
            const panel = event.currentTarget.parentElement;
            const rect = panel.getBoundingClientRect();
            activeHudDrag = {
                panel,
                pointerId: event.pointerId,
                pointerTarget: event.currentTarget,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            panel.classList.add("dragging");
            event.preventDefault();
            event.stopPropagation();
        }

        function finishHudPanelDrag(event) {
            if (!activeHudDrag) return;
            activeHudDrag.panel.classList.remove("dragging");
            if (activeHudDrag.pointerTarget && activeHudDrag.pointerId !== undefined) {
                try {
                    activeHudDrag.pointerTarget.releasePointerCapture(activeHudDrag.pointerId);
                } catch (error) {
                    // The pointer may already be released by the browser.
                }
            }
            activeHudDrag = null;
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
        }

        function createFullscreenHudPanel(title, className, left, top, hint = "") {
            const panel = document.createElement("div");
            panel.className = `fullscreen-hud-panel ${className}`;
            panel.style.left = `${left}px`;
            panel.style.top = `${top}px`;

            const header = document.createElement("div");
            header.className = "fullscreen-hud-title";
            header.addEventListener("pointerdown", startHudPanelDrag);

            const titleText = document.createElement("span");
            titleText.textContent = title;
            header.appendChild(titleText);

            if (hint) {
                const hintText = document.createElement("span");
                hintText.className = "fullscreen-hud-title-hint";
                hintText.textContent = hint;
                header.appendChild(hintText);
            }

            const body = document.createElement("div");
            body.className = "fullscreen-hud-body";

            panel.appendChild(header);
            panel.appendChild(body);
            fullscreenHudOverlay.appendChild(panel);

        function moveElementToFullscreenPanel(element, body) {
            if (!element || !element.parentNode) return;
            const placeholder = document.createComment(`fullscreen-placeholder-${element.id || element.className || "node"}`);
            element.parentNode.insertBefore(placeholder, element);
            fullscreenHudMoveRecords.push({ element, placeholder });
            body.appendChild(element);
        }

        function setupFullscreenHud() {
            if (fullscreenHudOverlay) return;

            fullscreenHudVisible = true;
            fullscreenHudMoveRecords = [];
            fullscreenHudOverlay = document.createElement("div");
            fullscreenHudOverlay.className = "fullscreen-hud";
            canvasContainer.appendChild(fullscreenHudOverlay);
            moveElementToFullscreenPanel(instantTooltip, canvasContainer);

            const stopHudEvent = event => {
                if (event.target.closest(".fullscreen-hud-panel")) event.stopPropagation();
            };
            ["mousedown", "mouseup", "click", "dblclick", "contextmenu", "pointerdown", "pointerup"].forEach(type => {
                fullscreenHudOverlay.addEventListener(type, stopHudEvent);
            });
            fullscreenHudOverlay.addEventListener("wheel", stopHudEvent, { passive: false });

            const paletteWidth = Math.min(340, Math.max(220, window.innerWidth - 40));
            const hotbarWidth = Math.min(480, Math.max(260, window.innerWidth - 40));
            const toolsPanel = createFullscreenHudPanel("Tools", "fullscreen-hud-tools", 18, 18);
            const historyPanel = createFullscreenHudPanel("Undo / Redo", "fullscreen-hud-history", 18, 112);
            const paletteHudPanel = createFullscreenHudPanel("Palette", "fullscreen-hud-palette", Math.max(18, window.innerWidth - paletteWidth - 18), 18);
            const hotbarPanel = createFullscreenHudPanel("Hotbar", "fullscreen-hud-hotbar", Math.max(18, (window.innerWidth - hotbarWidth) / 2), Math.max(18, window.innerHeight - 88), "Press H to hide/show GUI");

            historyPanel.body.classList.add("fullscreen-hud-controls-body");

            moveElementToFullscreenPanel(toolGroup, toolsPanel.body);
            moveElementToFullscreenPanel(undoBtn, historyPanel.body);
            moveElementToFullscreenPanel(redoBtn, historyPanel.body);
            moveElementToFullscreenPanel(palettePanel, paletteHudPanel.body);
            moveElementToFullscreenPanel(hotbarArea, hotbarPanel.body);

            [toolsPanel.panel, historyPanel.panel, paletteHudPanel.panel, hotbarPanel.panel].forEach(panel => {
                clampHudPanel(panel, parseFloat(panel.style.left) || 0, parseFloat(panel.style.top) || 0);

        function restoreFullscreenHud() {
            if (!fullscreenHudOverlay) return;

            for (const record of fullscreenHudMoveRecords) {
                if (record.placeholder.parentNode) {
                    record.placeholder.parentNode.insertBefore(record.element, record.placeholder);
                    record.placeholder.remove();
                }
            }

            fullscreenHudMoveRecords = [];
            fullscreenHudOverlay.remove();
            fullscreenHudOverlay = null;
            activeHudDrag = null;
            fullscreenHudVisible = true;
        }

        async function toggleCanvasFullscreen() {
            if (!document.fullscreenElement) {
                fullscreenRestoreView = {
                    scale: currentScale,
                    scrollLeft: canvasContainer.scrollLeft,
                    scrollTop: canvasContainer.scrollTop
                };

                try {
                    await canvasContainer.requestFullscreen();
                } catch (error) {
                    fullscreenRestoreView = null;
                    setPaletteStatus("Fullscreen mode is not available in this browser.");
                }
                return;
            }

            if (isCanvasFullscreen()) {
                await document.exitFullscreen();
            }
        }

        fullscreenBtn.addEventListener('click', toggleCanvasFullscreen);

        document.addEventListener("pointermove", (event) => {
            if (!activeHudDrag) return;
            clampHudPanel(
                activeHudDrag.panel,
                event.clientX - activeHudDrag.offsetX,
                event.clientY - activeHudDrag.offsetY

        document.addEventListener("pointerup", finishHudPanelDrag, true);
        document.addEventListener("pointercancel", finishHudPanelDrag, true);

        document.addEventListener('fullscreenchange', () => {
            const fullscreenActive = isCanvasFullscreen();
            fullscreenBtn.textContent = fullscreenActive ? "Exit Fullscreen" : "Fullscreen";

            if (fullscreenActive) {
                setupFullscreenHud();
                requestAnimationFrame(fitCanvasToFullscreen);
                return;
            }

            restoreFullscreenHud();
            if (fullscreenRestoreView) {
                currentScale = fullscreenRestoreView.scale;
                applyZoom();
                requestAnimationFrame(() => {
                    canvasContainer.scrollLeft = fullscreenRestoreView.scrollLeft;
                    canvasContainer.scrollTop = fullscreenRestoreView.scrollTop;
                    fullscreenRestoreView = null;
                    updateCursorPreview(lastMouseX, lastMouseZ);
                });
            }
        });

        window.addEventListener('resize', () => {
            if (isTextToolPopupOpen()) positionTextToolPopup();
            if (isCanvasFullscreen()) {
                fitCanvasToFullscreen();
                if (fullscreenHudOverlay) {
                    fullscreenHudOverlay.querySelectorAll(".fullscreen-hud-panel").forEach(panel => {
                        clampHudPanel(panel, parseFloat(panel.style.left) || 0, parseFloat(panel.style.top) || 0);
                    });
                }
            }
        });

        canvasContainer.addEventListener('wheel', function(e) {
            lastClientX = e.clientX;
            lastClientY = e.clientY;

            if (isToolScrollKeyHeld) {
                e.preventDefault();
                toolScrollDelta += e.deltaY || e.deltaX;

                if (Math.abs(toolScrollDelta) >= 40) {
                    const direction = toolScrollDelta > 0 ? 1 : -1;
                    toolScrollDelta = 0;
                    cycleToolByWheel(direction, e);
                }
                return;
            }

            if (loadedFiles.length === 0) return;
            e.preventDefault(); 
            
            const rectBefore = canvas.getBoundingClientRect();
            const containerRectBefore = canvasContainer.getBoundingClientRect();
            const mouseContentX = e.clientX - containerRectBefore.left - canvasContainer.clientLeft;
            const mouseContentY = e.clientY - containerRectBefore.top - canvasContainer.clientTop;
            const renderedScaleX = rectBefore.width / mapWidth;
            const renderedScaleY = rectBefore.height / mapHeight;
            const mapXUnderMouse = (e.clientX - rectBefore.left) / renderedScaleX;
            const mapZUnderMouse = (e.clientY - rectBefore.top) / renderedScaleY;

            const zoomSpeed = 0.15;
            let direction = e.deltaY > 0 ? -1 : 1;
            
            currentScale += direction * zoomSpeed * currentScale; 
            if (currentScale < minimumCanvasScale()) currentScale = minimumCanvasScale();
            if (currentScale > 30) currentScale = 30;
            
            applyZoom();

            const rectAfter = canvas.getBoundingClientRect();
            const containerRectAfter = canvasContainer.getBoundingClientRect();
            const canvasContentLeft = rectAfter.left - containerRectAfter.left - canvasContainer.clientLeft + canvasContainer.scrollLeft;
            const canvasContentTop = rectAfter.top - containerRectAfter.top - canvasContainer.clientTop + canvasContainer.scrollTop;
            const newRenderedScaleX = rectAfter.width / mapWidth;
            const newRenderedScaleY = rectAfter.height / mapHeight;
            const maxScrollLeft = Math.max(0, canvasContainer.scrollWidth - canvasContainer.clientWidth);
            const maxScrollTop = Math.max(0, canvasContainer.scrollHeight - canvasContainer.clientHeight);
            canvasContainer.scrollLeft = Math.max(0, Math.min(maxScrollLeft, canvasContentLeft + mapXUnderMouse * newRenderedScaleX - mouseContentX));
            canvasContainer.scrollTop = Math.max(0, Math.min(maxScrollTop, canvasContentTop + mapZUnderMouse * newRenderedScaleY - mouseContentY));
            
            const {x, z} = getMouseCoords(e);
            updateCursorPreview(x, z);
            
        }, { passive: false });

        // --- AUTO-DETECT EXPORT LOGIC ---
        function downloadBlob(dataArray, fileName) {
            const blob = new Blob([dataArray], { type: "application/octet-stream" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link); 
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }

        function downloadText(text, fileName) {
            const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }

        function saveCurrentProfile() {
            downloadText(currentPaletteProfileText(), `${originalFileName || "nbt_mapart"}_profile.txt`);
            setPaletteStatus("Saved palette profile from current dropdown selections.");
        }

        function paletteEntryOrAir(lf, state) {
            return lf.structurePalette[state] || { Name: nbtStringTag("Name", "minecraft:air") };
        }

        function nooblineBlocksForFile(lf) {
            if (!lf || lf.nooblineZ === null) return [];
            return lf.blocksList.filter(block => isNooblineBlock(lf, block));
        }

        function nooblineFallbackForFile(lf) {
            if (!lf || lf.nooblineZ === null) return null;

            const nooblineBlock = nooblineBlocksForFile(lf)[0];
            if (nooblineBlock) {
                return {
                    file: lf,
                    state: nooblineBlock.state.value,
                    y: nooblineBlock.pos.value.list[1]
                };
            }

            return {
                file: lf,
                state: ensurePaletteState(lf, DEFAULT_SUPPORT_BLOCK),
                y: lf.layerY
            };
        }

        function nooblineFallbackForFiles(files) {
            for (const lf of files) {
                const fallback = nooblineFallbackForFile(lf);
                if (fallback) return fallback;
            }
            return null;
        }

        function combinedNooblineBlocks(minGridX, minGridZ, width) {
            const frontFiles = loadedFiles.filter(lf => lf.nooblineZ !== null && lf.gridZ === minGridZ);
            const fallback = nooblineFallbackForFiles(frontFiles.length > 0 ? frontFiles : loadedFiles);
            if (!fallback) return [];

            const nooblineBlocks = [];
            const usedX = new Set();

            for (const lf of frontFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                for (const block of nooblineBlocksForFile(lf)) {
                    const pos = block.pos.value.list;
                    const x = offsetX + pos[0] - lf.minX;
                    if (x < 0 || x >= width || usedX.has(x)) continue;

                    nooblineBlocks.push({
                        x,
                        y: pos[1],
                        z: -1,
                        state: block.state.value,
                        file: lf
                    });
                    usedX.add(x);
                }
            }

            for (let x = 0; x < width; x++) {
                if (usedX.has(x)) continue;
                nooblineBlocks.push({
                    x,
                    y: fallback.y,
                    z: -1,
                    state: fallback.state,
                    file: fallback.file
                });
            }

            return nooblineBlocks;
        }

        function nooblineBlocksForChunk(lf, cX, cZ, chunkW, chunkH) {
            const fallback = nooblineFallbackForFile(lf);
            if (!fallback) return [];

            const chunkBlocks = [];
            const usedX = new Set();
            const chunkStartX = cX * chunkW;

            if (cZ === 0) {
                for (const block of nooblineBlocksForFile(lf)) {
                    const pos = block.pos.value.list;
                    const globalX = pos[0] - lf.minX;
                    const normX = globalX - chunkStartX;
                    if (normX < 0 || normX >= chunkW || usedX.has(normX)) continue;

                    chunkBlocks.push({
                        normX,
                        rawY: pos[1],
                        normZ: -1,
                        state: block.state.value,
                        file: lf
                    });
                    usedX.add(normX);
                }
            } else {
                const previousGlobalZ = cZ * chunkH - 1;
                for (let x = 0; x < chunkW; x++) {
                    const globalX = chunkStartX + x;
                    const cell = globalX >= 0 && globalX < mapWidth && previousGlobalZ >= 0 && previousGlobalZ < mapHeight
                        ? gridMap[previousGlobalZ * mapWidth + globalX]
                        : null;
                    chunkBlocks.push({
                        normX: x,
                        rawY: cell ? cell.rawY : fallback.y,
                        normZ: -1,
                        state: fallback.state,
                        file: fallback.file
                    });
                    usedX.add(x);
                }
            }

            for (let x = 0; x < chunkW; x++) {
                if (usedX.has(x)) continue;
                chunkBlocks.push({
                    normX: x,
                    rawY: fallback.y,
                    normZ: -1,
                    state: fallback.state,
                    file: fallback.file
                });
            }

            return chunkBlocks;
        }

        function createCombinedNbtRoot() {
            if (loadedFiles.length === 0) throw new Error("Upload files first.");

            const minGridX = Math.min(...loadedFiles.map(lf => lf.gridX));
            const minGridZ = Math.min(...loadedFiles.map(lf => lf.gridZ));
            const sourceBlocks = [];

            for (const lf of loadedFiles) {
                const offsetX = (lf.gridX - minGridX) * 128;
                const offsetZ = (lf.gridZ - minGridZ) * 128;

                for (const block of lf.blocksList) {
                    if (isNooblineBlock(lf, block)) continue;

                    const pos = block.pos.value.list;
                    const globalX = offsetX + pos[0] - lf.minX;
                    const globalZ = offsetZ + pos[2] - lf.minZ;
                    let finalState = block.state.value;

                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                        const cell = gridMap[globalZ * mapWidth + globalX];
                        if (cell && cell.blockRef === block) {
                            finalState = cell.blockRef.state.value;
                        }
                    }

                    sourceBlocks.push({
                        x: globalX,
                        y: pos[1],
                        z: globalZ,
                        state: finalState,
                        file: lf
                    });
                }
            }

            if (sourceBlocks.length === 0) throw new Error("No blocks available to export.");

            const maxSourceX = sourceBlocks.reduce((max, block) => Math.max(max, block.x), -1);
            const nooblineWidth = Math.max(mapWidth, maxSourceX + 1);
            sourceBlocks.push(...combinedNooblineBlocks(minGridX, minGridZ, nooblineWidth));

            let minX = Infinity, minY = Infinity, minZ = Infinity;
            let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
            for (const block of sourceBlocks) {
                if (block.x < minX) minX = block.x;
                if (block.y < minY) minY = block.y;
                if (block.z < minZ) minZ = block.z;
                if (block.x > maxX) maxX = block.x;
                if (block.y > maxY) maxY = block.y;
                if (block.z > maxZ) maxZ = block.z;
            }

            const unifiedPalette = [];
            const paletteMap = new Map();
            const finalNbtBlocks = [];

            for (const block of sourceBlocks) {
                const paletteEntry = paletteEntryOrAir(block.file, block.state);
                const blockKey = paletteEntryKey(paletteEntry);

                if (!paletteMap.has(blockKey)) {
                    paletteMap.set(blockKey, unifiedPalette.length);
                    unifiedPalette.push(paletteEntry);
                }

                finalNbtBlocks.push({
                    pos: { type: 9, name: "pos", value: { type: 3, list: [block.x - minX, block.y - minY, block.z - minZ] } },
                    state: { type: 3, name: "state", value: paletteMap.get(blockKey) }
                });
            }

            const firstFile = loadedFiles[0];
            return {
                type: 10, name: "", value: {
                    DataVersion: { type: 3, name: "DataVersion", value: firstFile.nbtRoot.value.DataVersion ? firstFile.nbtRoot.value.DataVersion.value : 2586 },
                    size: { type: 9, name: "size", value: { type: 3, list: [maxX - minX + 1, maxY - minY + 1, maxZ - minZ + 1] } },
                    palette: { type: 9, name: "palette", value: { type: 10, list: unifiedPalette } },
                    blocks: { type: 9, name: "blocks", value: { type: 10, list: finalNbtBlocks } },
                    entities: { type: 9, name: "entities", value: { type: 10, list: [] } }
                }
            };
        }

        function downloadCombinedNbt() {
            if (loadedFiles.length === 0) { alert("Upload files first."); return; }

            const button = document.getElementById('saveSingleBtn');
            const originalText = button.innerText;
            button.innerText = "Building NBT...";

            try {
                const writer = new NBTWriter();
                writer.writeTag(createCombinedNbtRoot());
                downloadBlob(pako.gzip(writer.getOutput()), `${originalFileName || "mapart"}_combined.nbt`);
            } catch (error) {
                alert("Failed to export single NBT: " + error.message);
            }

            button.innerText = originalText;
        }

        async function processExports(asZip) {
            if (loadedFiles.length === 0) { alert("Upload files first."); return; }
            
            const btnId = asZip ? 'saveZipBtn' : 'saveIndivBtn';
            const originalText = document.getElementById(btnId).innerText;
            document.getElementById(btnId).innerText = asZip ? "Compressing ZIP..." : "Downloading...";
            
            try {
                const zip = new JSZip();
                const needsSplit = loadedFiles.length === 1 && (mapWidth > 128 || mapHeight > 128);
                let filesToExport = []; 
                
                if (needsSplit) {
                    const chunkW = 128;
                    const chunkH = 128;
                    const lf = loadedFiles[0];
                    let maxExportGlobalX = mapWidth - 1;
                    let maxExportGlobalZ = mapHeight - 1;
                    for (const b of lf.blocksList) {
                        if (isNooblineBlock(lf, b)) continue;
                        const globalX = b.pos.value.list[0] - lf.minX;
                        const globalZ = b.pos.value.list[2] - lf.minZ;
                        if (globalX > maxExportGlobalX) maxExportGlobalX = globalX;
                        if (globalZ > maxExportGlobalZ) maxExportGlobalZ = globalZ;
                    }
                    const cols = Math.ceil((maxExportGlobalX + 1) / chunkW);
                    const rows = Math.ceil((maxExportGlobalZ + 1) / chunkH);

                    for (let cZ = 0; cZ < rows; cZ++) {
                        for (let cX = 0; cX < cols; cX++) {
                            let chunkBlocks = [];
                            let cMinX = Infinity, cMinY = Infinity, cMinZ = Infinity;
                            let cMaxX = -Infinity, cMaxY = -Infinity, cMaxZ = -Infinity;

                            for (const b of lf.blocksList) {
                                if (isNooblineBlock(lf, b)) continue;
                                const rawX = b.pos.value.list[0];
                                const rawY = b.pos.value.list[1];
                                const rawZ = b.pos.value.list[2];
                                
                                const globalX = rawX - lf.minX;
                                const globalZ = rawZ - lf.minZ;
                                
                                const targetCX = Math.max(0, Math.min(cols - 1, Math.floor(globalX / chunkW)));
                                const targetCZ = Math.max(0, Math.min(rows - 1, Math.floor(globalZ / chunkH)));

                                if (targetCX === cX && targetCZ === cZ) {
                                    let finalState = b.state.value;
                                    
                                    if (globalX >= 0 && globalX < mapWidth && globalZ >= 0 && globalZ < mapHeight) {
                                        const cell = gridMap[globalZ * mapWidth + globalX];
                                        if (cell && cell.blockRef === b) {
                                            finalState = cell.blockRef.state.value;
                                        }
                                    }

                                    if (rawX < cMinX) cMinX = rawX;
                                    if (rawX > cMaxX) cMaxX = rawX;
                                    if (rawY < cMinY) cMinY = rawY;
                                    if (rawY > cMaxY) cMaxY = rawY;
                                    if (rawZ < cMinZ) cMinZ = rawZ;
                                    if (rawZ > cMaxZ) cMaxZ = rawZ;

                                    const normX = globalX - (cX * chunkW);
                                    const normZ = globalZ - (cZ * chunkH);

                                    chunkBlocks.push({ normX, rawY, normZ, state: finalState, file: lf });
                                }
                            }

                            if (chunkBlocks.length === 0) continue;

                            for (const nooblineBlock of nooblineBlocksForChunk(lf, cX, cZ, chunkW, chunkH)) {
                                chunkBlocks.push(nooblineBlock);
                                if (nooblineBlock.rawY < cMinY) cMinY = nooblineBlock.rawY;
                                if (nooblineBlock.rawY > cMaxY) cMaxY = nooblineBlock.rawY;
                            }

                            const unifiedPalette = [];
                            const paletteMap = new Map();
                            const finalNbtBlocks = [];
                            let cMinNormZ = Infinity;
                            let cMaxNormZ = -Infinity;

                            for (const cb of chunkBlocks) {
                                if (cb.normZ < cMinNormZ) cMinNormZ = cb.normZ;
                                if (cb.normZ > cMaxNormZ) cMaxNormZ = cb.normZ;
                            }

                            for (const cb of chunkBlocks) {
                                const origPaletteTag = paletteEntryOrAir(cb.file, cb.state);
                                const blockKey = paletteEntryKey(origPaletteTag);
                                
                                if (!paletteMap.has(blockKey)) {
                                    paletteMap.set(blockKey, unifiedPalette.length);
                                    unifiedPalette.push(origPaletteTag);
                                }
                                const newId = paletteMap.get(blockKey);

                                finalNbtBlocks.push({
                                    pos: { type: 9, name: "pos", value: { type: 3, list: [cb.normX, cb.rawY - cMinY, cb.normZ - cMinNormZ] } },
                                    state: { type: 3, name: "state", value: newId }
                                });
                            }

                            const chunkNbtRoot = {
                                type: 10, name: "", value: {
                                    DataVersion: { type: 3, name: "DataVersion", value: lf.nbtRoot.value.DataVersion ? lf.nbtRoot.value.DataVersion.value : 2586 },
                                    size: { type: 9, name: "size", value: { type: 3, list: [128, cMaxY - cMinY + 1, cMaxNormZ - cMinNormZ + 1] } },
                                    palette: { type: 9, name: "palette", value: { type: 10, list: unifiedPalette } },
                                    blocks: { type: 9, name: "blocks", value: { type: 10, list: finalNbtBlocks } },
                                    entities: { type: 9, name: "entities", value: { type: 10, list: [] } }
                                }
                            };

                            const writer = new NBTWriter();
                            writer.writeTag(chunkNbtRoot);
                            filesToExport.push({ name: `${originalFileName}_${cX}_${cZ}.nbt`, data: pako.gzip(writer.getOutput()) });
                        }
                    }
                } else {
                    for (let i = 0; i < loadedFiles.length; i++) {
                        const lf = loadedFiles[i];
                        updateStructureSize(lf);
                        const writer = new NBTWriter();
                        writer.writeTag(lf.nbtRoot);
                        filesToExport.push({ name: lf.name, data: pako.gzip(writer.getOutput()) });
                    }
                }
                
                if (asZip) {
                    for (const f of filesToExport) zip.file(f.name, f.data);
                    const content = await zip.generateAsync({type:"blob"});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(content);
                    link.download = needsSplit ? `${originalFileName}_split.zip` : `${originalFileName}_edited.zip`;
                    link.click();
                } else {
                    for (const f of filesToExport) {
                        downloadBlob(f.data, f.name);
                        await new Promise(resolve => setTimeout(resolve, 200));
                    }
                }
                
            } catch (error) {
                alert("Failed to export: " + error.message);
            }
            document.getElementById(btnId).innerText = originalText;
        }

        document.getElementById('saveProfileBtn').addEventListener('click', saveCurrentProfile);
        document.getElementById('saveZipBtn').addEventListener('click', () => processExports(true));
        document.getElementById('saveSingleBtn').addEventListener('click', downloadCombinedNbt);
        document.getElementById('saveIndivBtn').addEventListener('click', () => processExports(false));

    </script>
