<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBT Mapart Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        html {
            height: 100%;
            overflow: hidden;
        }
        :root {
            --editor-panel-height: min(700px, calc(100vh - 172px));
            --hotbar-height: 46px;
            --hotbar-gap: 8px;
            --workarea-height: calc(var(--editor-panel-height) - var(--hotbar-height) - var(--hotbar-gap));
            --hotbar-slot-size: clamp(24px, calc((var(--workarea-height) - 60px) / 10), 38px);
            --left-panel-width: clamp(230px, 17vw, 320px);
            --side-panel-width: clamp(240px, 18vw, 340px);
            --palette-row-height: clamp(27px, 3.7vh, 37px);
            --palette-swatch-size: clamp(21px, 2.7vh, 27px);
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 4px 12px 8px;
        }
        h1 {
            margin: 4px 0 2px;
            font-size: 30px;
            line-height: 1.1;
        }
        p {
            margin: 0 0 8px;
            color: #a6adc8;
        }
        
        .toolbar {
            background-color: #313244;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            max-width: calc(100vw - 24px);
            flex: 0 0 auto;
        }
        
        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #45475a;
            padding: 4px 10px;
            border-radius: 5px;
        }

        .tool-group select, .tool-group input {
            background-color: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #6c7086;
            padding: 5px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        button {
            background-color: #89b4fa;
            color: #11111b;
            border: none;
            padding: 8px 13px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background-color: #b4befe; }
        button:disabled {
            background-color: #45475a;
            color: #6c7086;
            cursor: not-allowed;
        }

        #saveIndivBtn { background-color: #a6e3a1; }
        #saveIndivBtn:hover:not(:disabled) { background-color: #b3f0af; }
        
        body[data-palette-mode="carpet"] {
            --side-panel-width: 240px;
        }

        .editor-container {
            display: grid;
            grid-template-columns: var(--left-panel-width) auto var(--side-panel-width);
            gap: 16px;
            background-color: #313244;
            padding: 12px;
            border-radius: 8px;
            justify-content: center;
            align-items: stretch;
            flex: 0 1 auto;
            min-height: 0;
            max-width: calc(100vw - 24px);
        }

        .left-sidebar {
            display: grid;
            grid-template-rows: minmax(128px, 1fr) auto minmax(100px, 0.68fr);
            gap: 10px;
            min-height: 0;
            height: var(--editor-panel-height);
            max-height: 700px;
            width: var(--left-panel-width);
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 6px;
            overflow: hidden;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex: 0 0 auto;
            padding: 7px 8px;
            background: #45475a;
            border-bottom: 1px solid #6c7086;
            font-size: 12px;
            font-weight: bold;
        }

        .sidebar-header-actions {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sidebar-body {
            flex: 1 1 auto;
            min-height: 0;
            padding: 8px;
            overflow: auto;
            scrollbar-width: thin;
            scrollbar-color: #45475a #1e1e2e;
        }

        .tool-sidebar .sidebar-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
        }

        .tool-sidebar .tool-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            min-height: 0;
            padding: 0;
            background: transparent;
        }

        .tool-select-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .tool-icon-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 5px;
            width: 100%;
        }

        .tool-icon-btn {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            min-height: 27px;
            padding: 0;
            border: 2px solid #6c7086;
            border-radius: 5px;
            background: #313244;
            color: #cdd6f4;
            display: grid;
            place-items: center;
            box-shadow: inset 0 0 0 1px #11111b;
        }

        .tool-icon-btn:hover:not(:disabled) {
            background: #313244;
            border-color: #89b4fa;
        }

        .tool-icon-btn.active {
            border-color: #a6e3a1;
            background: #3a3d52;
        }

        .tool-icon-btn:disabled {
            opacity: 0.35;
            background: #1e1e2e;
            border-color: #45475a;
            cursor: default;
        }

        .tool-icon-btn.tool-placeholder,
        .tool-icon-btn.tool-placeholder:hover,
        .tool-icon-btn.tool-placeholder:disabled {
            opacity: 1;
            background: #1e1e2e;
            border-color: #45475a;
            color: #45475a;
            cursor: default;
            pointer-events: none;
        }

        .tool-controls-row {
            display: grid;
            grid-template-columns: auto 54px auto minmax(0, 1fr);
            gap: 7px;
            align-items: center;
            margin-top: auto;
        }

        .tool-control {
            display: contents;
            min-width: 0;
            color: #cdd6f4;
            font-size: 12px;
            line-height: 1.1;
        }

        .tool-control-text {
            align-self: center;
            white-space: nowrap;
        }

        .tool-control select,
        .tool-control input {
            width: 100%;
            min-width: 0;
            height: 25px;
            background-color: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #6c7086;
            padding: 3px 5px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        }

        .tool-icon {
            position: relative;
            display: block;
            width: 24px;
            height: 24px;
            color: currentColor;
        }

        .tool-icon::before,
        .tool-icon::after {
            content: "";
            position: absolute;
            box-sizing: border-box;
        }

        .tool-icon.brush::before {
            left: 4px;
            top: 13px;
            width: 16px;
            height: 5px;
            border-radius: 5px 5px 3px 3px;
            background: currentColor;
            transform: rotate(-42deg);
        }

        .tool-icon.brush::after {
            left: 13px;
            top: 3px;
            width: 5px;
            height: 14px;
            border: 2px solid currentColor;
            border-bottom: 0;
            border-radius: 4px 4px 0 0;
            transform: rotate(-42deg);
        }

        .tool-icon.line::before {
            left: 3px;
            top: 11px;
            width: 19px;
            height: 3px;
            background: currentColor;
            transform: rotate(-38deg);
            border-radius: 2px;
        }

        .tool-svg {
            width: 29px;
            height: 29px;
            display: block;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.85;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tool-svg .thin {
            stroke-width: 1.25;
        }

        .tool-svg .fill {
            fill: currentColor;
            stroke: none;
        }

        .tool-svg .dash {
            stroke-width: 1.45;
            stroke-dasharray: 3.8 3.8;
        }

        .tool-svg .loose-dash {
            stroke-width: 1.45;
            stroke-dasharray: 4.8 4.2;
        }

        .tool-svg .bold {
            stroke-width: 2;
        }

        .tool-icon.rectangle::before,
        .tool-icon.rect-select::before {
            left: 4px;
            top: 6px;
            width: 16px;
            height: 13px;
            border: 2px solid currentColor;
        }

        .tool-icon.rect-select::before {
            border-style: dashed;
        }

        .tool-icon.circle::before {
            left: 4px;
            top: 6px;
            width: 16px;
            height: 13px;
            border: 2px solid currentColor;
            border-radius: 50%;
        }

        .tool-icon.curve::before {
            left: 5px;
            top: 2px;
            width: 12px;
            height: 19px;
            border-right: 3px solid currentColor;
            border-radius: 50%;
            transform: rotate(-8deg);
        }

        .tool-icon.curve::after {
            left: 11px;
            top: 2px;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            box-shadow: -5px 17px 0 currentColor;
        }

        .tool-icon.bucket::before {
            left: 5px;
            top: 6px;
            width: 13px;
            height: 11px;
            border: 2px solid currentColor;
            border-radius: 2px;
            transform: rotate(-32deg);
        }

        .tool-icon.bucket::after {
            right: 2px;
            bottom: 3px;
            width: 7px;
            height: 7px;
            background: currentColor;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
        }

        .tool-icon.picker::before {
            left: 5px;
            top: 3px;
            width: 8px;
            height: 15px;
            border: 2px solid currentColor;
            border-radius: 4px 4px 2px 2px;
            transform: rotate(45deg);
        }

        .tool-icon.picker::after {
            left: 13px;
            top: 14px;
            width: 8px;
            height: 3px;
            background: currentColor;
            transform: rotate(45deg);
            border-radius: 2px;
        }

        .tool-icon.text::before {
            content: "T";
            left: 5px;
            top: 0;
            font-size: 22px;
            line-height: 24px;
            font-weight: 900;
            font-family: Arial, sans-serif;
        }

        .tool-icon.lasso-select::before {
            left: 3px;
            top: 6px;
            width: 17px;
            height: 12px;
            border: 2px dashed currentColor;
            border-radius: 50% 45% 50% 35%;
            transform: rotate(-18deg);
        }

        .tool-icon.lasso-select::after {
            left: 16px;
            top: 16px;
            width: 7px;
            height: 3px;
            background: currentColor;
            transform: rotate(36deg);
            border-radius: 2px;
        }

        .tool-icon.empty::before {
            left: 7px;
            top: 11px;
            width: 10px;
            height: 2px;
            background: #6c7086;
            border-radius: 2px;
        }

        .quick-palette {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            gap: 6px;
            align-content: start;
            min-height: 100%;
            border: 1px dashed transparent;
            border-radius: 5px;
        }

        .quick-palette.drag-over {
            border-color: #89b4fa;
            background: rgba(137, 180, 250, 0.08);
        }

        .quick-palette-item {
            position: relative;
            min-width: 30px;
            aspect-ratio: 1 / 1;
            border: 2px solid #6c7086;
            border-radius: 5px;
            background: #313244;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px #11111b;
        }

        .quick-palette-item.active {
            border-color: #a6e3a1;
        }

        .hex-palette {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0 10px;
            min-width: max-content;
        }

        .hex-row {
            display: flex;
            gap: 2px;
        }

        .hex-row + .hex-row {
            margin-top: -2px;
        }

        .hex-swatch {
            --hex-color: #313244;
            --hex-frame: transparent;
            --hex-frame-width: 0px;
            width: 14px;
            height: 16px;
            display: block;
            flex: 0 0 auto;
            appearance: none;
            padding: 0;
            border: 0;
            border-radius: 0;
            position: relative;
            z-index: 0;
            overflow: visible;
            background: transparent !important;
            cursor: pointer;
            outline: none;
            box-shadow: none;
        }

        .hex-swatch::before,
        .hex-swatch::after {
            content: "";
            position: absolute;
            inset: 0;
            clip-path: polygon(50% 2%, 96% 26%, 96% 74%, 50% 98%, 4% 74%, 4% 26%);
            pointer-events: none;
        }

        .hex-swatch::before {
            background: var(--hex-color);
            z-index: 1;
        }

        .hex-swatch::after {
            inset: calc(var(--hex-frame-width) * -1);
            background: var(--hex-frame);
            opacity: 0;
            z-index: 0;
        }

        .hex-swatch.active {
            --hex-frame: #a6e3a1;
            --hex-frame-width: 3px;
        }

        .hex-swatch:hover {
            --hex-frame: #89b4fa;
            --hex-frame-width: 3px;
        }

        .hex-swatch.active:hover {
            --hex-frame: #a6e3a1;
        }

        .hex-swatch:focus,
        .hex-swatch:focus-visible {
            outline: none;
            box-shadow: none;
        }

        .hex-swatch:focus-visible {
            --hex-frame: #f9e2af;
            --hex-frame-width: 3px;
        }

        .hex-swatch.active::after,
        .hex-swatch:hover::after,
        .hex-swatch:focus-visible::after {
            opacity: 1;
        }

        .color-picker-icon {
            position: relative;
            display: inline-block;
            width: 13px;
            height: 13px;
            top: 1px;
            border-radius: 50%;
            background: conic-gradient(#f38ba8, #f9e2af, #a6e3a1, #89dceb, #89b4fa, #cba6f7, #f38ba8);
            box-shadow: inset 0 0 0 2px #11111b;
        }

        .color-picker-window {
            position: fixed;
            left: 80px;
            top: 80px;
            z-index: 1001;
            display: none;
            width: min(620px, calc(100vw - 24px));
            max-height: calc(100vh - 32px);
            overflow: hidden;
            background: #1e1e2e;
            border: 1px solid #6c7086;
            border-radius: 8px;
            color: #cdd6f4;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.48);
        }

        .color-picker-window.visible {
            display: flex;
            flex-direction: column;
        }

        .color-picker-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex: 0 0 auto;
            padding: 8px 10px;
            background: #45475a;
            border-bottom: 1px solid #6c7086;
            cursor: move;
            font-size: 12px;
            font-weight: bold;
            user-select: none;
        }

        .color-picker-close {
            width: 24px;
            height: 22px;
            padding: 0;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1;
        }

        .color-picker-body {
            overflow: auto;
            padding: 14px;
            scrollbar-width: thin;
            scrollbar-color: #45475a #1e1e2e;
        }

        .color-picker-window .hex-palette {
            padding: 12px 0 18px;
        }

        .color-picker-window .hex-row {
            gap: 4px;
        }

        .color-picker-window .hex-row + .hex-row {
            margin-top: -4px;
        }

        .color-picker-window .hex-swatch {
            width: 28px;
            height: 32px;
        }

        .color-picker-slots {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0 2px;
            border-top: 1px solid #45475a;
            min-width: max-content;
        }

        .picker-slot {
            --hex-color: #11111b;
            --hex-frame: #6c7086;
            --hex-frame-width: 2px;
        }

        .picker-slot::after {
            opacity: 1;
        }

        .picker-slot.selected {
            --hex-frame: #89b4fa;
            --hex-frame-width: 3px;
        }

        .picker-slot.filled {
            --hex-frame: transparent;
            --hex-frame-width: 0px;
        }

        .picker-slot.filled::after {
            opacity: 0;
        }

        .picker-slot.filled.selected {
            --hex-frame: #89b4fa;
            --hex-frame-width: 3px;
        }

        .picker-slot.filled.selected::after {
            opacity: 1;
        }

        .bin-icon {
            position: relative;
            display: inline-block;
            width: 12px;
            height: 11px;
            top: 3px;
            border: 2px solid currentColor;
            border-top: 0;
            border-radius: 0 0 2px 2px;
            box-sizing: border-box;
        }

        .bin-icon::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -5px;
            width: 14px;
            height: 2px;
            background: currentColor;
            border-radius: 2px;
            transform: translateX(-50%);
        }

        .bin-icon::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -8px;
            width: 6px;
            height: 2px;
            background: currentColor;
            border-radius: 2px;
            transform: translateX(-50%);
        }

        .empty-sidebar-note {
            grid-column: 1 / -1;
            color: #a6adc8;
            font-size: 12px;
            line-height: 1.25;
            padding: 4px;
        }

        .layers-list {
            display: grid;
            gap: 5px;
        }

        .layer-row {
            display: grid;
            grid-template-columns: 24px minmax(0, 1fr) 20px 24px;
            gap: 5px;
            align-items: center;
            min-height: 30px;
            padding: 4px;
            background: #313244;
            border: 1px solid #45475a;
            border-radius: 5px;
            cursor: pointer;
        }

        .layer-row.active {
            border-color: #a6e3a1;
            background: #3a3d52;
        }

        .layer-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }

        .layer-btn,
        .sidebar-icon-btn {
            width: 24px;
            height: 22px;
            padding: 0;
            border-radius: 4px;
            font-size: 11px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-icon-btn.is-disabled,
        .sidebar-icon-btn.is-disabled:hover {
            background-color: #45475a;
            color: #6c7086;
            cursor: not-allowed;
        }

        .sidebar-icon-btn.is-disabled .color-picker-icon {
            opacity: 0.45;
            filter: saturate(0.45);
        }

        .layer-btn.active {
            background: #a6e3a1;
        }

        .layer-visibility {
            position: relative;
        }

        .eye-icon {
            position: relative;
            width: 14px;
            height: 9px;
            border: 2px solid #11111b;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
        }

        .eye-icon::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 4px;
            height: 4px;
            background: #11111b;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .layer-visibility.hidden .eye-icon::after {
            content: "";
            position: absolute;
            left: -4px;
            top: 2px;
            width: 20px;
            height: 3px;
            background: #ff334f;
            border-radius: 2px;
            transform: rotate(-35deg);
            transform-origin: center;
            box-shadow: 0 0 0 1px #313244;
        }

        .layer-lock-toggle.active {
            background: #a6e3a1;
        }

        .layer-lock-toggle .lock-icon {
            top: 3px;
        }

        .lock-icon,
        .layer-lock-indicator {
            position: relative;
            display: inline-block;
            width: 12px;
            height: 9px;
            border: 2px solid currentColor;
            border-radius: 2px;
            box-sizing: border-box;
        }

        .lock-icon::before,
        .layer-lock-indicator::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -8px;
            width: 8px;
            height: 8px;
            border: 2px solid currentColor;
            border-bottom: 0;
            border-radius: 6px 6px 0 0;
            transform: translateX(-50%);
            box-sizing: border-box;
        }

        .layer-lock-indicator {
            color: #f9e2af;
            justify-self: center;
            top: 3px;
        }

        .layer-lock-indicator.empty {
            visibility: hidden;
        }

        .layer-btn.delete {
            background: #f38ba8;
        }

        .layer-btn:disabled {
            opacity: 0.45;
        }

        .canvas-column {
            display: flex;
            flex-direction: column;
            gap: var(--hotbar-gap);
            min-height: 0;
            height: var(--editor-panel-height);
            max-height: 700px;
            width: var(--workarea-height);
            max-width: 700px;
        }

        .canvas-container {
            height: var(--workarea-height);
            max-height: 700px;
            width: var(--workarea-height);
            max-width: 700px;
            aspect-ratio: 1 / 1;
            overflow: auto;
            background-color: #11111b;
            border: 2px solid #45475a;
            display: flex;
            scrollbar-width: thin;
            scrollbar-color: #45475a #1e1e2e;
            position: relative;
        }

        .canvas-container:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            aspect-ratio: auto;
            border: 0;
            border-radius: 0;
            background: #000;
            scrollbar-color: #45475a #000;
        }

        .fullscreen-hud {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .fullscreen-hud.hidden {
            display: none;
        }

        .fullscreen-hud-panel {
            position: fixed;
            min-width: 160px;
            max-width: calc(100vw - 40px);
            background: rgba(49, 50, 68, 0.95);
            border: 1px solid #6c7086;
            border-radius: 8px;

        .canvas-wrapper {
            margin: auto;
            display: flex;
            position: relative;
        }

        canvas {
            image-rendering: pixelated;
            display: block;

        #mapCanvas { cursor: crosshair; }

        #previewCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; 
        }

        .shape-selection-box {
            position: absolute;
            display: none;
            border: 2px dashed #11111b;
            background: rgba(255, 255, 255, 0.04);
            pointer-events: auto;
            cursor: move;
            z-index: 4;
        }

        .shape-selection-box.visible {
            display: block;
        }

        .shape-selection-box.selection-mode .shape-selection-handle {
            display: none;
        }

        .shape-selection-handle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f5f5f5;
            border: 1px solid #11111b;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.35);
        }

        .shape-selection-handle[data-handle="nw"] {
            left: -5px;
            top: -5px;
            cursor: nwse-resize;
        }

        .shape-selection-handle[data-handle="n"] {
            left: 50%;
            top: -5px;
            transform: translateX(-50%);
            cursor: ns-resize;
        }

        .shape-selection-handle[data-handle="ne"] {
            right: -5px;
            top: -5px;
            cursor: nesw-resize;
        }

        .shape-selection-handle[data-handle="e"] {
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            cursor: ew-resize;
        }

        .shape-selection-handle[data-handle="se"] {
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
        }

        .shape-selection-handle[data-handle="s"] {
            left: 50%;
            bottom: -5px;
            transform: translateX(-50%);
            cursor: ns-resize;
        }

        .shape-selection-handle[data-handle="sw"] {
            left: -5px;
            bottom: -5px;
            cursor: nesw-resize;
        }

        .shape-selection-handle[data-handle="w"] {
            left: -5px;
            top: 50%;
            transform: translateY(-50%);
            cursor: ew-resize;
        }

        .cursor-selection-frame {
            position: absolute;
            display: none;
            border: 2px solid #000;
            pointer-events: none;
            z-index: 3;
        }

        .hotbar-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            height: var(--hotbar-height);
            flex: 0 0 var(--hotbar-height);
            min-width: 0;
        }

        .hotbar-strip {
            display: grid;
            grid-template-columns: repeat(9, var(--hotbar-slot-size));
            gap: 0;
            height: var(--hotbar-slot-size);
        }

        .hotbar-slot,
        .selected-block-preview {
            width: var(--hotbar-slot-size);
            height: var(--hotbar-slot-size);
            padding: 3px;
            border: 2px solid #6c7086;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px #11111b;
        }

        .hotbar-slot {
            border-radius: 0;
            cursor: pointer;
            position: relative;
        }

        .hotbar-slot:first-child {
            border-radius: 6px 0 0 6px;
        }

        .hotbar-slot:last-child {
            border-radius: 0 6px 6px 0;
        }

        .hotbar-slot + .hotbar-slot {
            border-left-width: 1px;
        }

        .hotbar-slot:hover,
        .hotbar-slot.assign-target,
        .hotbar-slot.drop-target {
            background: #1e1e2e;
            border-color: #89b4fa;
            z-index: 1;
        }

        .hotbar-slot:hover:not(:disabled) {
            background: #1e1e2e;
        }

        .hotbar-slot.active {
            background: #1e1e2e;
            border-color: #a6e3a1;
            z-index: 2;
        }

        .hotbar-slot.empty::after {
            content: attr(data-slot);
            position: absolute;
            right: 4px;
            bottom: 2px;
            font-size: 10px;
            line-height: 1;
            color: #6c7086;
            font-weight: bold;
        }

        .hotbar-slot-fill,
        .selected-block-fill {
            width: 100%;
            height: 100%;
            border-radius: 3px;
            background: #313244;
            border: 1px solid #11111b;
        }

        .selected-block-preview {
            flex: 0 0 var(--hotbar-slot-size);
            border-radius: 6px;
            border-color: #a6e3a1;
            cursor: default;
        }

        .palette {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding-right: 10px;
        }

        .palette-row {
            display: grid;
            grid-template-columns: calc(var(--palette-swatch-size) + 10px) minmax(0, 1fr);
            place-items: center;
            justify-items: center;
            gap: 5px;
            height: var(--palette-row-height);
            background: #45475a;
            border: 2px solid transparent;
            border-radius: 5px;
            padding: 0 5px;
            cursor: pointer;
            font-size: 12px;
            color: #cdd6f4;
        }
        .palette-row.active { border-color: #a6e3a1; }
        .palette-row span {
            justify-self: start;
            align-self: center;
        }
        .palette-row.manual-shading {
            grid-template-columns: calc((var(--palette-swatch-size) * 3) + 14px) minmax(0, 1fr);
        }
        .shade-swatches {
            display: grid;
            grid-template-columns: repeat(3, var(--palette-swatch-size));
            gap: 4px;
            justify-self: center;
            align-self: center;
        }
        .tone-swatch {
            cursor: pointer;
            position: relative;
        }
        .tone-swatch.active {
            border-color: #a6e3a1;
            box-shadow: 0 0 0 2px #1e1e2e, 0 0 0 4px #a6e3a1;
            z-index: 1;
        }
        .palette.carpet-mode {
            width: 220px;
            gap: 4px;
            flex: 0 0 auto;
            overflow-y: visible;
        }
        .palette.carpet-mode .palette-row {
            grid-template-columns: calc(var(--palette-swatch-size) + 10px) minmax(0, 1fr);
        }
        .palette-row select {
            min-width: 0;
            width: 100%;
            justify-self: stretch;
            align-self: center;
            height: calc(var(--palette-row-height) - 8px);
            background-color: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #6c7086;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1;
        }
        .color-swatch {
            width: var(--palette-swatch-size);
            height: var(--palette-swatch-size);
            justify-self: center;
            align-self: center;
            display: block;
            border-radius: 4px;
            border: 1px solid #11111b;
        }

        .palette-status {
            flex: 0 0 auto;
            font-size: 12px;
            line-height: 1.25;
            color: #a6adc8;
            max-width: 340px;
            min-height: 16px;
            margin-bottom: 8px;
            overflow-wrap: anywhere;
        }
        body[data-palette-mode="carpet"] #profileImportControl,
        body[data-palette-mode="carpet"] #saveProfileBtn,
        body[data-palette-mode="carpet"] #lockPaletteBtn,
        body[data-palette-mode="carpet"] #shadingModeBtn,
        body[data-palette-mode="carpet"] #supportBlockLabel,
        body[data-palette-mode="carpet"] #supportBlockSelect {
            display: none;
        }

        body[data-palette-mode="carpet"] .tool-controls-row {
            grid-template-columns: auto 60px;
        }
        .palette-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: var(--editor-panel-height);
            max-height: 700px;
            width: var(--side-panel-width);
        }
        .palette-panel h3 {
            flex: 0 0 auto;
            margin: 0 0 8px;
        }
        .palette-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex: 0 0 auto;
            margin-bottom: 8px;
        }
        .palette-header h3 {
            margin: 0;
        }
        .palette-header button {
            padding: 6px 8px;
            font-size: 11px;
        }
        .palette-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .palette-icon-btn {
            width: 30px;
            height: 28px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            font-size: 12px;
            line-height: 1;
            white-space: nowrap;
        }
        .palette-icon-btn.active {
            background-color: #a6e3a1;
            border-color: #c3f5bf;
        }
        .palette-icon-btn:disabled {
            opacity: 0.55;
        }
        body[data-palette-mode="carpet"] .palette-panel {
            width: var(--side-panel-width);
        }

        .license-notice {
            position: fixed;
            left: 10px;
            bottom: 8px;
            z-index: 20;
            max-width: calc(100vw - 20px);
            padding: 5px 8px;
            border-radius: 5px;
            background: rgba(30, 30, 46, 0.9);
            border: 1px solid #45475a;
            color: #a6adc8;
            font-size: 11px;
            line-height: 1.3;
            pointer-events: auto;
        }

        .license-notice a {
            color: #89b4fa;
            text-decoration: none;
            font-weight: 600;
        }

        .license-notice a:hover {
            text-decoration: underline;
        }

        .instant-tooltip {
            position: fixed;
            z-index: 3000;
            max-width: 260px;
            padding: 6px 8px;
            border-radius: 5px;
            background: #11111b;
            border: 1px solid #6c7086;
            color: #cdd6f4;
            font-size: 12px;
            line-height: 1.25;
            pointer-events: none;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
            opacity: 0;
            transform: translate(-9999px, -9999px);
            transition: none;
        }

        .instant-tooltip.visible {
            opacity: 1;
        }

        .tool-scroll-tooltip {
            position: fixed;
            z-index: 1001;
            max-width: 220px;
            padding: 7px 10px;
            border-radius: 6px;
            background: rgba(17, 17, 27, 0.94);
            border: 1px solid #89b4fa;
            color: #cdd6f4;
            font-size: 13px;
            line-height: 1.2;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.42);
            opacity: 0;
            transform: translate(-9999px, -9999px);
            transition: opacity 0.08s ease;
        }

        .tool-scroll-tooltip.visible {
            opacity: 1;
        }

        .text-tool-popup {
            position: fixed;
            z-index: 1002;
            display: none;
            min-width: 240px;
            border-radius: 8px;
            background: rgba(49, 50, 68, 0.97);
            border: 1px solid #6c7086;
            color: #cdd6f4;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.45);
            font-size: 12px;
            overflow: hidden;
        }

        .text-tool-popup.visible {
            display: grid;
        }

        .text-tool-title {
            background: #45475a;
            border-bottom: 1px solid #6c7086;
            cursor: move;
            font-weight: bold;
            padding: 7px 9px;
            user-select: none;
        }

        .text-tool-body {
            display: grid;
            gap: 8px;
            padding: 10px;
        }

        .text-tool-popup label {
            display: grid;
            gap: 4px;
            font-weight: bold;
        }

        .text-tool-popup input,
        .text-tool-popup select {
            background-color: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #6c7086;
            padding: 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .text-tool-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .text-tool-actions button {
            padding: 6px 10px;
            font-size: 12px;
        }
    </style>

    <h1>NBT Mapart Editor</h1>

        // --- 1. MINIMAL NBT PARSER & WRITER ---
        class NBTParser {
            constructor(buffer) {
                this.view = new DataView(buffer.buffer, buffer.byteOffset, buffer.byteLength);
                this.offset = 0;
                this.decoder = new TextDecoder('utf-8');
            }
            readTag() {
                if (this.offset >= this.view.byteLength) return null;
                const type = this.readByte();
                if (type === 0) return { type: 0 };
                const name = this.readString();
                const value = this.readValue(type);
                return { type, name, value };
            }
            readByte() { const v = this.view.getInt8(this.offset); this.offset += 1; return v; }
            readShort() { const v = this.view.getInt16(this.offset); this.offset += 2; return v; }
            readInt() { const v = this.view.getInt32(this.offset); this.offset += 4; return v; }
            readLong() { const v = this.view.getBigInt64(this.offset); this.offset += 8; return v; }
            readFloat() { const v = this.view.getFloat32(this.offset); this.offset += 4; return v; }
            readDouble() { const v = this.view.getFloat64(this.offset); this.offset += 8; return v; }
            readString() {
                const len = this.readShort();
                const bytes = new Uint8Array(this.view.buffer, this.view.byteOffset + this.offset, len);
                this.offset += len;
                return this.decoder.decode(bytes);
            }
            readValue(type) {
                let len, val, elementType;
                switch(type) {
                    case 1: return this.readByte();
                    case 2: return this.readShort();
                    case 3: return this.readInt();
                    case 4: return this.readLong();
                    case 5: return this.readFloat();
                    case 6: return this.readDouble();
                    case 7: 
                        len = this.readInt(); 
                        val = new Int8Array(this.view.buffer, this.view.byteOffset + this.offset, len);
                        this.offset += len; return val;
                    case 8: return this.readString();
                    case 9:
                        elementType = this.readByte();
                        len = this.readInt();
                        val = { type: elementType, list: [] };
                        for (let i = 0; i < len; i++) val.list.push(this.readValue(elementType));
                        return val;
                    case 10:
                        val = {};
                        while (true) {
                            const tag = this.readTag();
                            if (tag.type === 0) break;
                            val[tag.name] = tag;
                        }
                        return val;
                    case 11:
                        len = this.readInt();
                        val = new Int32Array(len);
                        for(let i=0; i<len; i++) val[i] = this.readInt();
                        return val;
                    case 12:
                        len = this.readInt();
                        val = new BigInt64Array(len);
                        for(let i=0; i<len; i++) val[i] = this.readLong();
                        return val;
                    default: throw new Error("Unknown NBT type: " + type);
                }
            }
        }

        class NBTWriter {
            constructor() {
                this.buffer = new Uint8Array(1024 * 1024 * 30); // 30MB buffer for huge files
                this.view = new DataView(this.buffer.buffer);
                this.offset = 0;
                this.encoder = new TextEncoder('utf-8');
            }
            writeByte(v) { this.view.setInt8(this.offset, v); this.offset += 1; }
            writeShort(v) { this.view.setInt16(this.offset, v); this.offset += 2; }
            writeInt(v) { this.view.setInt32(this.offset, v); this.offset += 4; }
            writeLong(v) { this.view.setBigInt64(this.offset, BigInt(v)); this.offset += 8; }
            writeFloat(v) { this.view.setFloat32(this.offset, v); this.offset += 4; }
            writeDouble(v) { this.view.setFloat64(this.offset, v); this.offset += 8; }
            writeString(str) {
                const bytes = this.encoder.encode(str);
                this.writeShort(bytes.length);
                this.buffer.set(bytes, this.offset);
                this.offset += bytes.length;
            }
            writeTag(tag) {
                this.writeByte(tag.type);
                if (tag.type === 0) return;
                this.writeString(tag.name || "");
                this.writeValue(tag.type, tag.value);
            }
            writeValue(type, value) {
                switch(type) {
                    case 1: this.writeByte(value); break;
                    case 2: this.writeShort(value); break;
                    case 3: this.writeInt(value); break;
                    case 4: this.writeLong(value); break;
                    case 5: this.writeFloat(value); break;
                    case 6: this.writeDouble(value); break;
                    case 7:
                        this.writeInt(value.length);
                        this.buffer.set(new Int8Array(value.buffer, value.byteOffset, value.byteLength), this.offset);
                        this.offset += value.length; break;
                    case 8: this.writeString(value); break;
                    case 9:
                        this.writeByte(value.type);
                        this.writeInt(value.list.length);
                        for (let i = 0; i < value.list.length; i++) this.writeValue(value.type, value.list[i]);
                        break;
                    case 10:
                        for (const key in value) this.writeTag(value[key]);
                        this.writeByte(0); 
                        break;
                    case 11:
                        this.writeInt(value.length);
                        for(let i=0; i<value.length; i++) this.writeInt(value[i]); break;
                    case 12:
                        this.writeInt(value.length);
                        for(let i=0; i<value.length; i++) this.writeLong(value[i]); break;
                }
            }
            getOutput() { return new Uint8Array(this.buffer.buffer, 0, this.offset); }
        }

        // --- 2. EDITOR LOGIC ---
        function stateKey(name, properties = {}) {
            const propEntries = Object.keys(properties).sort().map(key => `${key}=${properties[key]}`);
            return `${name}|${propEntries.join(';')}`;
        }

        function makeBlock(displayName, name, supportRequired = false, properties = {}, mapartPresetIndex = null) {
            return {
                displayName,
                name,
                properties,
                supportRequired,
                mapartPresetIndex,
                key: stateKey(name, properties)
            };
        }

        function titleWords(text) {
            return text.split('_').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join(' ');
        }

        function blockDisplayName(name, properties = {}) {
            const baseName = titleWords(name.replace(/^minecraft:/, ""));
            const notes = [];
            if (properties.axis) notes.push(`axis ${properties.axis}`);
            Object.keys(properties).sort().forEach(key => {
                if (key !== "axis") notes.push(`${key} ${properties[key]}`);
            });
            return notes.length ? `${baseName} (${notes.join(", ")})` : baseName;
        }

            const rect = instantTooltip.getBoundingClientRect();

            if (left + rect.width + padding > window.innerWidth) {

            if (top + rect.height + padding > window.innerHeight) {

            let left = clientX - rect.width / 2;

            if (top < padding) top = clientY + offset;

                left = window.innerWidth - rect.width - padding;

            if (left < padding) left = padding;

        function rgbFromHex(hex) {
            return [

        function baseRgbFromNormalHex(hex) {
            return rgbFromHex(hex).map(channel => {
                for (let base = 0; base <= 255; base++) {
                    if (Math.floor(base * 220 / 255) === channel) return base;
                }
                return Math.max(0, Math.min(255, Math.round(channel * 255 / 220)));
            });

            const baseHex = MAP_COLOR_BASE_HEX_OVERRIDES.get(color.mapartId);

        function rgbForMapTone(color, tone = "normal") {
            if (tone === "normal") return rgbFromHex(color.hex);

        function rgbToHsl(rgb) {
            const r = rgb[0] / 255;
            const g = rgb[1] / 255;
            const b = rgb[2] / 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h = 0;
            let s = 0;
            const l = (max + min) / 2;

            if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                if (max === r) {
                    h = (g - b) / d + (g < b ? 6 : 0);
                } else if (max === g) {
                    h = (b - r) / d + 2;
                } else {
                    h = (r - g) / d + 4;
                }
                h /= 6;
            }

            return { h, s, l };
        }

        function saveQuickPalette() {
            try {
                localStorage.setItem(QUICK_PALETTE_STORAGE_KEY, JSON.stringify(quickPaletteItems));
            } catch (error) {
                // Browser storage can fail in private modes; the palette still works for this session.
            }
        }

        function loadQuickPalette() {
            try {
                const parsed = JSON.parse(localStorage.getItem(QUICK_PALETTE_STORAGE_KEY) || "[]");
                quickPaletteItems = Array.isArray(parsed)
                    ? parsed.map(validPaletteItem).filter(Boolean)
                    : [];
            } catch (error) {
                quickPaletteItems = [];
            }
        }

        function quickPaletteItemsMatch(a, b) {
            return !!(a && b &&
                a.colorId === b.colorId &&
                a.blockKey === b.blockKey &&
                (a.tone || null) === (b.tone || null));
        }

        function quickPaletteIndexOf(item) {
            const valid = validPaletteItem(item);
            if (!valid) return -1;
            return quickPaletteItems.findIndex(existing => quickPaletteItemsMatch(existing, valid));
        }

        function quickPaletteItemIsActive(item) {
            const info = layerCellInfo(item);
            return !!(info &&
                selectedColor === info.color &&
                selectedBlockForColor(info.color).key === info.block.key &&
                (!manualShadingActive() || selectedTone === (info.tone || "normal")));
        }

        function hexPaletteItemIsActive(item) {
            const info = layerCellInfo(item);
            const activeTone = paletteMode === "staircased" ? selectedTone : selectedDisplayTone();
            return !!(info &&
                selectedColor === info.color &&
                selectedBlockForColor(info.color).key === info.block.key &&
                activeTone === (info.tone || "normal"));
        }

        function activeQuickPaletteIndex() {
            return quickPaletteItems.findIndex(quickPaletteItemIsActive);
        }

        function colorPickerSlotInfo(slot) {
            return slot ? layerCellInfo(slot) : null;
        }

        function updateQuickPaletteButtons() {
            if (deleteQuickPaletteBtn) {
                deleteQuickPaletteBtn.disabled = activeQuickPaletteIndex() === -1;
            }
            if (clearQuickPaletteBtn) {
                clearQuickPaletteBtn.disabled = quickPaletteItems.length === 0 && !colorPickerSlots.some(Boolean);
            }
        }

        function selectQuickPaletteItem(item) {
            const info = layerCellInfo(item);
            if (!info) return;
            selectedColor = info.color;
            selectedBlockByColorId[info.color.id] = info.block.key;
            selectedTone = info.tone || "normal";
            if (heldHotbarSlot !== null) {
                assignHotbarSlot(heldHotbarSlot, info.color, selectedDisplayTone());
            } else {
                syncActiveHotbarSlot();
            }
            renderPaletteRows();
            renderCustomPaletteViews();
            updateCursorPreview(lastMouseX, lastMouseZ);
        }

        function addQuickPaletteItem(item, replaceIndex = null, options = {}) {
            const saveUndo = options.saveUndo !== false;
            const dedupe = options.dedupe === true;
            const valid = validPaletteItem(item);
            if (!valid) return;
            if (dedupe && replaceIndex === null) {
                const existingIndex = quickPaletteIndexOf(valid);
                if (existingIndex !== -1) {
                    renderCustomPaletteViews();
                    return;
                }
            }
            if (saveUndo) saveCurrentStateToUndo();
            if (replaceIndex !== null && replaceIndex >= 0 && replaceIndex < quickPaletteItems.length) {
                quickPaletteItems[replaceIndex] = valid;
            } else {
                quickPaletteItems.push(valid);
            }
            saveQuickPalette();
            renderCustomPaletteViews();
        }

        function syncQuickPaletteFromPickerSlot(previousItem, nextItem) {
            const validNext = validPaletteItem(nextItem);
            if (!validNext) return;

            const previousIndex = previousItem ? quickPaletteIndexOf(previousItem) : -1;
            const nextIndex = quickPaletteIndexOf(validNext);

            if (previousIndex !== -1) {
                if (nextIndex !== -1 && nextIndex !== previousIndex) {
                    quickPaletteItems.splice(previousIndex, 1);
                } else {
                    quickPaletteItems[previousIndex] = validNext;
                }
            } else if (nextIndex === -1) {
                quickPaletteItems.push(validNext);
            }

            saveQuickPalette();
        }

        function deleteActiveQuickPaletteItem() {
            const index = activeQuickPaletteIndex();
            if (index === -1) return;
            const deletedItem = quickPaletteItems[index];
            saveCurrentStateToUndo();
            quickPaletteItems.splice(index, 1);
            colorPickerSlots = colorPickerSlots.map(slot =>
                quickPaletteItemsMatch(slot, deletedItem) ? null : slot
            );
            saveQuickPalette();
            renderCustomPaletteViews();
        }

        function selectedColorPickerSlotValid() {
            return selectedColorPickerSlotIndex >= 0 && selectedColorPickerSlotIndex < colorPickerSlots.length;
        }

        function nextEmptyColorPickerSlotIndex(startIndex = 0) {
            if (colorPickerSlots.length === 0) return -1;
            const normalizedStart = ((startIndex % colorPickerSlots.length) + colorPickerSlots.length) % colorPickerSlots.length;
            for (let offset = 0; offset < colorPickerSlots.length; offset++) {
                const index = (normalizedStart + offset) % colorPickerSlots.length;
                if (!colorPickerSlots[index]) return index;
            }
            return -1;
        }

        function setSelectedColorPickerSlot(index) {
            if (index < 0 || index >= colorPickerSlots.length) return;
            selectedColorPickerSlotIndex = index;
            const slot = colorPickerSlots[index];
            if (slot) {
                selectQuickPaletteItem(slot);
            } else {
                renderColorPickerSlots();
            }
        }

        function assignColorPickerSlot(item) {
            const valid = validPaletteItem(item);
            if (!valid) return;
            if (!selectedColorPickerSlotValid()) selectedColorPickerSlotIndex = 0;
            const previousSlot = colorPickerSlots[selectedColorPickerSlotIndex];
            saveCurrentStateToUndo();
            colorPickerSlots[selectedColorPickerSlotIndex] = valid;
            syncQuickPaletteFromPickerSlot(previousSlot, valid);
            selectQuickPaletteItem(valid);
        }

        function assignNextColorPickerSlot(item) {
            const valid = validPaletteItem(item);
            if (!colorPickerAvailable()) return false;
            if (!valid) return false;
            if (!selectedColorPickerSlotValid()) selectedColorPickerSlotIndex = 0;

            if (colorPickerSlots[selectedColorPickerSlotIndex]) {
                const emptyIndex = nextEmptyColorPickerSlotIndex(selectedColorPickerSlotIndex + 1);
                if (emptyIndex !== -1) selectedColorPickerSlotIndex = emptyIndex;
            }

            const targetIndex = selectedColorPickerSlotIndex;
            const previousSlot = colorPickerSlots[targetIndex];
            colorPickerSlots[targetIndex] = valid;
            syncQuickPaletteFromPickerSlot(previousSlot, valid);
            selectQuickPaletteItem(valid);

            const nextIndex = nextEmptyColorPickerSlotIndex(targetIndex + 1);
            selectedColorPickerSlotIndex = nextIndex !== -1 ? nextIndex : targetIndex;
            renderCustomPaletteViews();
            return true;
        }

        function clearColorPickerSlot(index) {
            if (index < 0 || index >= colorPickerSlots.length || !colorPickerSlots[index]) return;
            saveCurrentStateToUndo();
            colorPickerSlots[index] = null;
            selectedColorPickerSlotIndex = index;
            renderCustomPaletteViews();
        }

        function beginPaletteDrag() {
            paletteDragActive = true;
            paletteDragScrollLock = {
                left: canvasContainer.scrollLeft,
                top: canvasContainer.scrollTop
            };
        }

        function restorePaletteDragScroll() {
            if (!paletteDragScrollLock) return;
            canvasContainer.scrollLeft = paletteDragScrollLock.left;
            canvasContainer.scrollTop = paletteDragScrollLock.top;
        }

        function endPaletteDrag() {
            restorePaletteDragScroll();
            paletteDragActive = false;
            paletteDragScrollLock = null;
        }

        function handleCanvasPaletteDragEvent(event) {
            if (!paletteDragActive && !dragHasPaletteItem(event)) return;
            event.preventDefault();
            event.stopPropagation();
            if (event.dataTransfer) event.dataTransfer.dropEffect = "none";
            restorePaletteDragScroll();
        }

        function renderQuickPalette() {
            if (!quickPaletteElement) return;
            quickPaletteElement.innerHTML = "";
            updateQuickPaletteButtons();

            if (quickPaletteItems.length === 0) {
                const note = document.createElement("div");
                note.className = "empty-sidebar-note";
                note.textContent = "Drag colors or shade swatches here.";
                quickPaletteElement.appendChild(note);
                return;
            }

            quickPaletteItems.forEach((item, index) => {
                const info = layerCellInfo(item);
                if (!info) return;
                const baseCell = cellAtGlobal(lastMouseX, lastMouseZ);
                const button = document.createElement("button");
                button.type = "button";
                button.className = `quick-palette-item ${quickPaletteItemIsActive(item) ? "active" : ""}`;
                button.style.backgroundColor = rgbToCss(colorForLayerCell(item, baseCell) || rgbForMapTone(info.color, "normal"));
                button.dataset.tooltip = quickPaletteItemTooltip(item);
                button.draggable = true;
                button.addEventListener("click", () => selectQuickPaletteItem(item));
                button.addEventListener("dragstart", event => {
                    beginPaletteDrag();
                    updateQuickPaletteButtons();
                    event.dataTransfer.setData("application/json", JSON.stringify(item));
                    event.dataTransfer.setData("application/x-custom-palette-origin", "1");
                    event.dataTransfer.effectAllowed = "copyMove";
                });
                button.addEventListener("dragend", endPaletteDrag);
                quickPaletteElement.appendChild(button);
            });
        }

        function hexPaletteEntries() {
            const sourceColors = usesBlockPaletteMode() ? MAP_COLOR_DATABASE : paletteColorsForMode();
            const orderedColors = sourceColors
                .map(color => {
                    const hsl = rgbToHsl(rgbForMapTone(color, "normal"));
                    return {
                        color,
                        hsl,
                        gray: hsl.s < 0.08
                    };
                })
                .sort((a, b) => {
                    if (a.gray !== b.gray) return a.gray ? 1 : -1;
                    if (Math.abs(a.hsl.h - b.hsl.h) > 0.001) return a.hsl.h - b.hsl.h;
                    if (Math.abs(a.hsl.s - b.hsl.s) > 0.001) return b.hsl.s - a.hsl.s;
                    return a.hsl.l - b.hsl.l;
                });

            const entries = [];

            for (const { color } of orderedColors) {
                const block = selectedBlockForColor(color);
                if (!block) continue;

                for (const tone of colorPickerToneList()) {
                    const rgb = rgbForMapTone(color, tone);
                    entries.push({
                        item: { colorId: color.id, blockKey: block.key, tone: paletteMode === "staircased" ? tone : null },
                        rgb,
                        tone,
                        color,
                        block
                    });
                }
            }

            return entries;
        }

        function renderHexPalette() {
            if (!hexPaletteElement) return;
            hexPaletteElement.innerHTML = "";
            if (!colorPickerAvailable()) return;

            const entries = hexPaletteEntries();
            const rowLengths = colorPickerRowLengths(entries.length);
            let cursor = 0;

            for (let rowIndex = 0; rowIndex < rowLengths.length && cursor < entries.length; rowIndex++) {
                const row = document.createElement("div");
                row.className = "hex-row";

                const rowLength = rowLengths[rowIndex];
                for (let i = 0; i < rowLength && cursor < entries.length; i++, cursor++) {
                    const entry = entries[cursor];
                    const info = layerCellInfo(entry.item);
                    if (!info) continue;

                    const swatch = document.createElement("button");
                    swatch.type = "button";
                    swatch.className = `hex-swatch ${hexPaletteItemIsActive(entry.item) ? "active" : ""}`;
                    swatch.style.setProperty("--hex-color", rgbToCss(entry.rgb));
                    swatch.dataset.tooltip = quickPaletteItemTooltip(entry.item);
                    swatch.draggable = true;
                    swatch.addEventListener("click", () => assignColorPickerSlot(entry.item));
                    swatch.addEventListener("dragstart", event => {
                        beginPaletteDrag();
                        event.dataTransfer.setData("application/json", JSON.stringify(entry.item));
                        event.dataTransfer.setData("application/x-hex-palette-origin", "1");
                        event.dataTransfer.effectAllowed = "copy";
                    });
                    swatch.addEventListener("dragend", endPaletteDrag);
                    row.appendChild(swatch);
                }

                hexPaletteElement.appendChild(row);
            }
        }

        function renderColorPickerSlots() {
            if (!colorPickerSlotsElement) return;
            colorPickerSlotsElement.innerHTML = "";
            if (!colorPickerAvailable()) return;
            if (!selectedColorPickerSlotValid()) selectedColorPickerSlotIndex = 0;

            let cursor = 0;
            for (const rowLength of COLOR_PICKER_SLOT_ROW_LENGTHS) {
                const row = document.createElement("div");
                row.className = "hex-row";

                for (let i = 0; i < rowLength && cursor < colorPickerSlots.length; i++, cursor++) {
                    const slot = colorPickerSlots[cursor];
                    const info = colorPickerSlotInfo(slot);
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = `hex-swatch picker-slot ${info ? "filled" : ""} ${cursor === selectedColorPickerSlotIndex ? "selected" : ""}`;
                    if (info) {
                        button.style.setProperty("--hex-color", rgbToCss(colorForLayerCell(slot) || rgbForMapTone(info.color, "normal")));
                        button.dataset.tooltip = quickPaletteItemTooltip(slot);
                        button.draggable = true;
                        button.addEventListener("dragstart", event => {
                            beginPaletteDrag();
                            event.dataTransfer.setData("application/json", JSON.stringify(slot));
                            event.dataTransfer.effectAllowed = "copy";
                        });
                        button.addEventListener("dragend", endPaletteDrag);
                    } else {
                        button.dataset.tooltip = "Empty color slot";
                    }
                    const slotIndex = cursor;
                    button.addEventListener("click", () => setSelectedColorPickerSlot(slotIndex));
                    button.addEventListener("contextmenu", event => {
                        event.preventDefault();
                        event.stopPropagation();
                        clearColorPickerSlot(slotIndex);
                    });
                    row.appendChild(button);
                }

                colorPickerSlotsElement.appendChild(row);
            }
        }

        function renderCustomPaletteViews() {
            updateColorPickerButtonState();
            if (colorPickerTitle) {
                colorPickerTitle.textContent = paletteMode === "staircased"
                    ? "Staircased Color Picker"
                    : "Fullblock Color Picker";
            }
            if (hexPaletteElement) {
                hexPaletteElement.dataset.tooltip = paletteMode === "staircased"
                    ? "All Minecraft map colors and shadings"
                    : "Fullblock base map colors";
            }
            renderQuickPalette();
            renderHexPalette();
            renderColorPickerSlots();
        }

        function parseDraggedPaletteItem(event) {
            const raw = event.dataTransfer.getData("application/json");
            if (!raw) return null;
            try {
                return validPaletteItem(JSON.parse(raw));
            } catch (error) {
                return null;
            }
        }

        function dragHasPaletteItem(event) {
            return !!(event.dataTransfer && Array.from(event.dataTransfer.types || []).includes("application/json"));
        }

        function dragStartedFromQuickPalette(event) {
            return !!(event.dataTransfer && Array.from(event.dataTransfer.types || []).includes("application/x-custom-palette-origin"));
        }

        function dragStartedFromHexPalette(event) {
            return !!(event.dataTransfer && Array.from(event.dataTransfer.types || []).includes("application/x-hex-palette-origin"));
        }

        function createLayer(name, kind = "paint") {
            return {
                id: `layer-${nextLayerId++}`,
                name,
                kind,
                visible: true,
                locked: false,
                cells: kind === "paint" ? new Map() : null
            };
        }

        function resetEditorLayers() {
            nextLayerId = 1;
            const base = createLayer("Background", "base");
            editorLayers = [base];
            activeLayerId = base.id;
            renderLayers();
        }

        function activeLayer() {
            return editorLayers.find(layer => layer.id === activeLayerId) || editorLayers[0] || null;
        }

        function activeLayerIsBase() {
            const layer = activeLayer();
            return !!(layer && layer.kind === "base");
        }

        function layerIndexById(layerId) {
            return editorLayers.findIndex(layer => layer.id === layerId);
        }

        function layerIdNumber(layer) {
            const match = String(layer && layer.id || "").match(/^layer-(\d+)$/);
            return match ? Number(match[1]) : null;
        }

        function layerNameNumber(layer) {
            const match = String(layer && layer.name || "").trim().match(/^Layer\s+(\d+)$/i);
            return match ? Number(match[1]) : null;
        }

        function layerDisplayName(layer, index) {
            if (layer && layer.kind === "base") return "Background";
            const name = String(layer && layer.name || "").trim();
            if (name && name !== "Layer") return name;
            const idNumber = layerIdNumber(layer);
            return `Layer ${idNumber || index + 1}`;
        }

        function nextLayerName() {
            const maxNumber = editorLayers.reduce((max, layer) => {
                if (!layer || layer.kind !== "paint") return max;
                return Math.max(max, layerNameNumber(layer) || 0);
            }, 0);
            return `Layer ${Math.max(1, maxNumber + 1)}`;
        }

        function layerEntriesTopToBottom() {
            return editorLayers
                .map((layer, index) => ({ layer, index }))
                .reverse();
        }

        function layerCanPaint(layer = activeLayer()) {
            if (!layer) return false;
            if (!layer.visible) {
                setPaletteStatus("Active layer is hidden. Show it before painting.");
                return false;
            }
            if (layer.locked) {
                setPaletteStatus("Active layer is locked. Unlock it before painting.");
                return false;
            }
            return true;
        }

        function serializeLayer(layer) {
            return {
                id: layer.id,
                name: layer.name,
                kind: layer.kind,
                visible: layer.visible,
                locked: layer.locked,
                cells: layer.kind === "paint" ? Array.from(layer.cells.entries()) : []
            };
        }

        function deserializeLayer(raw) {
            const layer = {
                id: raw.id,
                name: raw.name,
                kind: raw.kind,
                visible: raw.visible !== false,
                locked: !!raw.locked,
                cells: raw.kind === "paint" ? new Map() : null
            };
            if (layer.kind === "paint" && Array.isArray(raw.cells)) {
                for (const [key, value] of raw.cells) {
                    const valid = validPaletteItem(value);
                    if (valid) layer.cells.set(key, valid);
                }
            }
            return layer;
        }

        function renderLayers() {
            if (!layersListElement) return;
            layersListElement.innerHTML = "";

            if (editorLayers.length === 0) {
                const note = document.createElement("div");
                note.className = "empty-sidebar-note";
                note.textContent = "Import an NBT to create the base layer.";
                layersListElement.appendChild(note);
            }

            layerEntriesTopToBottom().forEach(({ layer, index }) => {
                const row = document.createElement("div");
                row.className = `layer-row ${layer.id === activeLayerId ? "active" : ""}`;
                row.dataset.tooltip = layer.kind === "base" ? "Imported NBT base layer" : "Paint overlay layer";
                row.addEventListener("click", () => {
                    activeLayerId = layer.id;
                    renderLayers();
                    updateCursorPreview(lastMouseX, lastMouseZ);
                });

                const hide = document.createElement("button");
                hide.type = "button";
                hide.className = `layer-btn layer-visibility ${layer.visible ? "active" : "hidden"}`;
                hide.dataset.tooltip = layer.visible ? "Hide layer" : "Show layer";
                const eyeIcon = document.createElement("span");
                eyeIcon.className = "eye-icon";
                hide.appendChild(eyeIcon);
                hide.addEventListener("click", event => {
                    event.stopPropagation();
                    saveCurrentStateToUndo();
                    layer.visible = !layer.visible;
                    renderLayers();
                    renderFullCanvas();
                    updateCursorPreview(lastMouseX, lastMouseZ);
                });
                row.appendChild(hide);

                const name = document.createElement("div");
                name.className = "layer-name";
                name.textContent = layerDisplayName(layer, index);
                row.appendChild(name);

                const lockIndicator = document.createElement("span");
                lockIndicator.className = `layer-lock-indicator ${layer.locked ? "" : "empty"}`;
                if (layer.locked) lockIndicator.dataset.tooltip = "Layer is locked";
                row.appendChild(lockIndicator);

                const del = document.createElement("button");
                del.type = "button";
                del.className = "layer-btn delete";
                del.textContent = "X";
                del.disabled = layer.kind === "base";
                del.dataset.tooltip = layer.kind === "base" ? "Base layer cannot be deleted" : "Delete layer";
                del.addEventListener("click", event => {
                    event.stopPropagation();
                    if (layer.kind === "base") return;
                    saveCurrentStateToUndo();
                    const removeIndex = layerIndexById(layer.id);
                    editorLayers.splice(removeIndex, 1);
                    if (activeLayerId === layer.id) activeLayerId = (editorLayers[Math.min(removeIndex, editorLayers.length - 1)] || editorLayers[0]).id;
                    renderLayers();
                    renderFullCanvas();
                    updateCursorPreview(lastMouseX, lastMouseZ);
                });
                row.appendChild(del);

                layersListElement.appendChild(row);
            });

            const currentLayer = activeLayer();
            const currentIndex = layerIndexById(activeLayerId);
            if (addLayerBtn) addLayerBtn.disabled = mapWidth === 0 || mapHeight === 0;
            if (lockLayerBtn) {
                lockLayerBtn.disabled = !currentLayer;
                lockLayerBtn.classList.toggle("active", !!(currentLayer && currentLayer.locked));
                lockLayerBtn.dataset.tooltip = currentLayer && currentLayer.locked ? "Unlock selected layer" : "Lock selected layer";
            }
            if (moveLayerUpBtn) moveLayerUpBtn.disabled = !currentLayer || currentLayer.kind === "base" || currentIndex < 0 || currentIndex >= editorLayers.length - 1;
            if (moveLayerDownBtn) moveLayerDownBtn.disabled = !currentLayer || currentLayer.kind === "base" || currentIndex <= 1;
        }

        function addPaintLayer() {
            saveCurrentStateToUndo();
            const layer = createLayer(nextLayerName(), "paint");
            editorLayers.push(layer);
            activeLayerId = layer.id;
            renderLayers();
            renderFullCanvas();
        }

        function toggleActiveLayerLock() {
            const layer = activeLayer();
            if (!layer) return;
            saveCurrentStateToUndo();
            layer.locked = !layer.locked;
            renderLayers();
        }

        function moveActiveLayer(direction) {
            const index = layerIndexById(activeLayerId);
            const currentLayer = activeLayer();
            const nextIndex = index + direction;
            if (!currentLayer || currentLayer.kind === "base") return;
            if (index < 0 || nextIndex < 0 || nextIndex >= editorLayers.length) return;
            if (editorLayers[nextIndex] && editorLayers[nextIndex].kind === "base") return;
            saveCurrentStateToUndo();
            const [layer] = editorLayers.splice(index, 1);
            editorLayers.splice(nextIndex, 0, layer);
            renderLayers();
            renderFullCanvas();
        }

        function hotbarSlotFromKeyEvent(event) {
            if (/^[1-9]$/.test(event.key)) return Number(event.key) - 1;
            const digitMatch = event.code && event.code.match(/^Digit([1-9])$/);
            if (digitMatch) return Number(digitMatch[1]) - 1;
            const numpadMatch = event.code && event.code.match(/^Numpad([1-9])$/);
            if (numpadMatch) return Number(numpadMatch[1]) - 1;
            return null;
        }

        function shouldIgnoreHotbarKey(target) {
            if (!target) return false;
            const tag = target.tagName;
            return tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA" || target.isContentEditable;
        }

        function hotbarBlockForSlot(slot) {
            if (!slot) return null;
            const color = COLORS_BY_ID.get(slot.colorId);
            if (!color) return null;
            const block = color.blocks.find(option => option.key === slot.blockKey) || selectedBlockForColor(color);
            const tone = normalizeTone(slot.tone);
            return { color, block, tone };
        }

        function currentHotbarSnapshot(color = selectedColor, tone = selectedDisplayTone()) {
            const block = selectedBlockForColor(color);
            return block ? { colorId: color.id, blockKey: block.key, tone: normalizeTone(tone) } : null;
        }

        function hotbarSlotMatchesSelection(slot) {
            const current = currentHotbarSnapshot();
            return !!(slot && current &&
                slot.colorId === current.colorId &&
                slot.blockKey === current.blockKey &&
                (!manualShadingActive() || normalizeTone(slot.tone) === selectedTone));
        }

        function syncActiveHotbarSlot() {
            if (activeHotbarSlot !== null && hotbarSlotMatchesSelection(hotbarSlots[activeHotbarSlot])) return;
            const matchIndex = hotbarSlots.findIndex(hotbarSlotMatchesSelection);
            activeHotbarSlot = matchIndex === -1 ? null : matchIndex;
        }

        function assignHotbarSlot(slotIndex, color = selectedColor, tone = selectedDisplayTone()) {
            if (slotIndex === null || slotIndex < 0 || slotIndex >= hotbarSlots.length) return;
            const snapshot = currentHotbarSnapshot(color, tone);
            if (!snapshot) return;
            hotbarSlots[slotIndex] = snapshot;
            activeHotbarSlot = slotIndex;
            renderHotbar();
        }

        function assignHotbarSlotFromItem(slotIndex, item) {
            if (slotIndex === null || slotIndex < 0 || slotIndex >= hotbarSlots.length) return false;
            const valid = validPaletteItem(item);
            if (!valid) return false;
            hotbarSlots[slotIndex] = valid;
            activeHotbarSlot = slotIndex;
            const info = layerCellInfo(valid);
            if (info) {
                selectedColor = info.color;
                selectedBlockByColorId[info.color.id] = info.block.key;
                if (manualShadingAvailable()) selectedTone = normalizeTone(info.tone);
            }
            renderPaletteRows();
            renderHotbar();
            updateCursorPreview(lastMouseX, lastMouseZ);
            return true;
        }

        function selectHotbarSlot(slotIndex) {
            const info = hotbarBlockForSlot(hotbarSlots[slotIndex]);
            if (!info || !paletteColorsForMode().includes(info.color)) return false;
            selectedColor = info.color;
            if (info.block && info.color.blocks.some(block => block.key === info.block.key)) {
                selectedBlockByColorId[info.color.id] = info.block.key;
            }
            if (manualShadingAvailable()) {
                selectedTone = normalizeTone(info.tone);
            }
            activeHotbarSlot = slotIndex;
            renderPaletteRows();
            updateCursorPreview(lastMouseX, lastMouseZ);

        function renderHotbar() {

        function setPaletteMode(mode, message = "", refreshPreview = true) {
